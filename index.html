// ══════════════════════════════════════════════════════
// IndexedDB — Large file storage (images, PDFs, etc.)
// ══════════════════════════════════════════════════════
const IDB_NAME = 'boarddesk_files';
const IDB_STORE = 'files';
let _idb = null;

function idbOpen(){
  return new Promise((res,rej)=>{
    if(_idb){res(_idb);return;}
    const req=indexedDB.open(IDB_NAME,1);
    req.onupgradeneeded=e=>{
      const db=e.target.result;
      if(!db.objectStoreNames.contains(IDB_STORE))
        db.createObjectStore(IDB_STORE);
    };
    req.onsuccess=e=>{_idb=e.target.result;res(_idb);};
    req.onerror=()=>rej(req.error);
  });
}
function idbPut(key,value){
  return idbOpen().then(db=>new Promise((res,rej)=>{
    const tx=db.transaction(IDB_STORE,'readwrite');
    tx.objectStore(IDB_STORE).put(value,key);
    tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);
  }));
}
function idbGet(key){
  return idbOpen().then(db=>new Promise((res,rej)=>{
    const tx=db.transaction(IDB_STORE,'readonly');
    const req=tx.objectStore(IDB_STORE).get(key);
    req.onsuccess=()=>res(req.result);req.onerror=()=>rej(req.error);
  }));
}
function idbDeleteKeys(keys){
  return idbOpen().then(db=>new Promise((res,rej)=>{
    const tx=db.transaction(IDB_STORE,'readwrite');
    const store=tx.objectStore(IDB_STORE);
    keys.forEach(k=>store.delete(k));
    tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);
  }));
}
function idbGetAllKeys(){
  return idbOpen().then(db=>new Promise((res,rej)=>{
    const tx=db.transaction(IDB_STORE,'readonly');
    const req=tx.objectStore(IDB_STORE).getAllKeys();
    req.onsuccess=()=>res(req.result);req.onerror=()=>rej(req.error);
  }));
}

// Extract all fileData/src from board data, store in IDB, replace with ref key
// Works on a DEEP CLONE so S.items is never mutated
function captureBoardAsync(){
  const board = captureBoard();
  const writes = [];
  const usedKeys = new Set();

  // Reuse stable IDB keys from the live items (by id lookup)
  function getStableKey(liveItem, suffix){
    if(!liveItem) return suffix+Date.now()+'_'+Math.random().toString(36).slice(2,7);
    if(!liveItem._idbKey) liveItem._idbKey = suffix+Date.now()+'_'+Math.random().toString(36).slice(2,7);
    return liveItem._idbKey;
  }

  // ZUERST: große Daten aus items herausziehen und durch idb:-Keys ersetzen
  // Danach erst JSON.stringify (verhindert RangeError bei großen Dateien)
  board.items.forEach(item=>{
    const liveItem = S.items.find(x=>x.id===item.id);
    if(item.fileData && isVideo(item.name||'')){
      item.fileData = '__video_session_only__';
    } else if(item.fileData && !item.fileData.startsWith('idb:')){
      const key = 'idb:' + getStableKey(liveItem, 'f');
      if(liveItem) liveItem._idbKey = key.slice(4);
      writes.push(idbPut(key, item.fileData));
      item.fileData = key; // ersetzen VOR deep clone
      usedKeys.add(key);
    } else if(item.fileData && item.fileData.startsWith('idb:')){
      usedKeys.add(item.fileData);
    }
    if(item.src && item.src.startsWith('data:')){
      const key = 'idb:' + getStableKey(liveItem, 'i');
      if(liveItem) liveItem._idbKey = key.slice(4);
      writes.push(idbPut(key, item.src));
      item.src = key; // ersetzen VOR deep clone
      usedKeys.add(key);
    } else if(item.src && item.src.startsWith('idb:')){
      usedKeys.add(item.src);
    }
  });

  // Jetzt erst deep clone — items enthalten nur noch kurze idb:-Keys, kein base64 mehr
  board.items = JSON.parse(JSON.stringify(board.items));
  // Folder-Kinder: fileData ebenfalls in IDB auslagern
  board.items.forEach((item)=>{
    const liveItem = S.items.find(x=>x.id===item.id);
    if(item.children) item.children.forEach((ch,ci)=>{
      const liveCh = liveItem && liveItem.children && liveItem.children[ci];
      if(ch.fileData && !ch.fileData.startsWith('idb:')){
        const key = 'idb:' + getStableKey(liveCh, 'c');
        if(liveCh) liveCh._idbKey = key.slice(4);
        writes.push(idbPut(key, ch.fileData));
        ch.fileData = key;
        usedKeys.add(key);
      } else if(ch.fileData) usedKeys.add(ch.fileData);
    });
  });
  // bgImage
  if(board.bgImage && board.bgImage.startsWith('data:')){
    const key = 'idb:bg_'+(S._bgIdbKey||(S._bgIdbKey=Date.now().toString(36)));
    writes.push(idbPut(key, board.bgImage));
    board.bgImage = key;
    usedKeys.add(key);
  } else if(board.bgImage && board.bgImage.startsWith('idb:')) usedKeys.add(board.bgImage);

  return Promise.all(writes).then(()=>({board, usedKeys}));
}

// Restore IDB refs → actual data
function restoreBoardDataAsync(data){
  // Collect all IDB keys in this board
  const keys = new Set();
  function collectKeys(item){
    if(item.fileData && item.fileData.startsWith('idb:')) keys.add(item.fileData);
    if(item.src && item.src.startsWith('idb:')) keys.add(item.src);
    if(item.children) item.children.forEach(ch=>{
      if(ch.fileData && ch.fileData.startsWith('idb:')) keys.add(ch.fileData);
    });
  }
  (data.items||[]).forEach(collectKeys);
  if(data.bgImage && data.bgImage.startsWith('idb:')) keys.add(data.bgImage);
  if(keys.size===0) return Promise.resolve(data);
  // Fetch all at once
  return Promise.all([...keys].map(k=>idbGet(k).then(v=>({k,v})))).then(results=>{
    const map={};results.forEach(({k,v})=>{if(v)map[k]=v;});
    function rehydrateItem(item){
      if(item.fileData && map[item.fileData]) item.fileData=map[item.fileData];
      if(item.src && map[item.src]) item.src=map[item.src];
      if(item.children) item.children.forEach(ch=>{
        if(ch.fileData && map[ch.fileData]) ch.fileData=map[ch.fileData];
      });
    }
    (data.items||[]).forEach(rehydrateItem);
    if(data.bgImage && map[data.bgImage]) data.bgImage=map[data.bgImage];
    return data;
  });
}

// Clean up orphaned IDB entries (keys not referenced by any board)
function cleanupIdbOrphans(){
  idbGetAllKeys().then(allKeys=>{
    const store = loadStorage()||{boards:[]};
    const used = new Set();
    store.boards.forEach(b=>{
      (b.items||[]).forEach(it=>{
        if(it.fileData && it.fileData.startsWith('idb:')) used.add(it.fileData);
        if(it.src && it.src.startsWith('idb:')) used.add(it.src);
        (it.children||[]).forEach(ch=>{if(ch.fileData && ch.fileData.startsWith('idb:')) used.add(ch.fileData);});
      });
      if(b.bgImage && b.bgImage.startsWith('idb:')) used.add(b.bgImage);
    });
    const orphans=allKeys.filter(k=>!used.has(k));
    if(orphans.length) idbDeleteKeys(orphans);
  }).catch(()=>{});
}

const STORAGE_KEY = 'boarddesk_v1';
let _saveTimer = null;
let _boardPanelOpen = false;

// ── Serialise SVG drawings to string ──
function serializeDrawings(){
  // Serialize all per-layer SVGs + legacy draw-layer
  const result={};
  (S.layers||[]).forEach(l=>{
    const svg=document.getElementById('layer-svg-'+l.id);
    if(svg) result[l.id]=svg.innerHTML;
  });
  result._legacy=drawLayer.innerHTML;
  return JSON.stringify(result);
}
function deserializeDrawings(data){
  S.drawings=[];
  // Clear all existing layer SVGs
  const dc=$('draw-layers');
  if(dc) dc.innerHTML='';
  drawLayer.innerHTML='';
  if(!data) return;
  let parsed=null;
  try{ parsed=JSON.parse(data); }catch(e){ /* legacy HTML string */ }
  if(parsed && typeof parsed==='object'){
    Object.entries(parsed).forEach(([lid,html])=>{
      if(lid==='_legacy'){ drawLayer.innerHTML=html||''; return; }
      const layerId=parseInt(lid);
      const svg=ensureLayerSvg(layerId);
      svg.innerHTML=html||'';
      const els=[...svg.children].filter(c=>c.tagName!=='defs');
      els.forEach(el=>el.setAttribute('data-lid',layerId));
      S.drawings.push(...els);
    });
  } else if(typeof data==='string' && data.trim().startsWith('<')){
    // Old format: plain SVG innerHTML → assign to layer 1
    const svg=ensureLayerSvg(1);
    svg.innerHTML=data;
    S.drawings=[...svg.children].filter(c=>c.tagName!=='defs');
    S.drawings.forEach(el=>el.setAttribute('data-lid',1));
  }
  // Also collect legacy drawLayer children
  const legacy=[...drawLayer.children].filter(c=>c.tagName!=='defs');
  S.drawings.push(...legacy);
  // Re-apply layer visibility
  (S.layers||[]).forEach(layer=>{
    if(!layer.visible){
      S.drawings.filter(el=>el.getAttribute&&el.getAttribute('data-lid')==String(layer.id))
        .forEach(el=>el.style.display='none');
    }
  });
}

// ── Capture current board state as plain object ──
function captureBoard(){
  const name = $('board-name-display').textContent;
  // Serialize items — Video-fileData als Platzhalter speichern (zu groß für JSON)
  const items = S.items.map(it=>{
    const copy={...it};
    if(copy.fileData && isVideo(copy.name||'')) copy.fileData='__video_session_only__';
    return copy;
  });
  return {
    name,
    items,
    drawings: serializeDrawings(),
    zoom:S.zoom, panX:S.panX, panY:S.panY,
    gridVisible:S.gridVisible,
    bgImage:S.bgImage, bgOpacity:S.bgOpacity||85, bgSize:S.bgSize||'cover',
    bgColor:S.bgColor||'#0e0f11',
    layers:S.layers,activeLayerId:S.activeLayerId,nextLayerId:S.nextLayerId,
    savedAt: Date.now(),
  };
}

// ── Restore board state from plain object ──
function restoreBoard(data){
  // Clear canvas
  itemsLayer.innerHTML = '<div id="selection-box"></div>';
  S.items = [];
  S.selectedIds = new Set();
  S.nextId = 1;
  clearDrawings();

  if(!data) { resetView(); return; }

  // Restore name
  const nm = data.name||'Unbenanntes Board';
  $('board-name-display').textContent = nm;
  document.title = nm;

  // Restore items
  // Close any open folder windows before loading new board
  Object.keys(_folderWindows).forEach(k=>{if(_folderWindows[k])_folderWindows[k].remove();delete _folderWindows[k];});
  // Rehydrate IDB file refs then render items
  restoreBoardDataAsync(data).then(rehydrated=>{
    // Migration: Video-Items die fälschlich als preview-doc gespeichert wurden
    (rehydrated.items||[]).forEach(it=>{
      if(it.type==='file'&&isVideo(it.name||'')&&it.viewMode==='preview-doc'){
        it.viewMode='preview-video';
      }
    });
    // bgImage nach IDB-Auflösung setzen (war vorher idb:-Key)
    if(rehydrated.bgImage && !rehydrated.bgImage.startsWith('idb:')){
      setBgImage(rehydrated.bgImage, rehydrated.bgOpacity||85, rehydrated.bgSize||'cover');
    }
    (rehydrated.items||[]).forEach(it=>{
      if(it.id >= S.nextId) S.nextId = it.id+1;
      S.items.push(it);
      renderItem(it);
    });
    renderLayerList();
    applyLayerOrder();  // draw-layers/items-layer z-index nach Restore setzen
  }).catch(()=>{
    (data.items||[]).forEach(it=>{
      if(it.id >= S.nextId) S.nextId = it.id+1;
      S.items.push(it);
      renderItem(it);
    });
    renderLayerList();
  });

  // Restore drawings
  deserializeDrawings(data.drawings||'');

  // Restore view
  S.zoom = data.zoom||1;
  S.panX = data.panX||80;
  S.panY = data.panY||80;
  applyTransform();

  // Restore grid
  S.gridVisible = data.gridVisible!==false;
  $('grid-overlay').style.opacity = S.gridVisible?'.45':'0';
  $('tool-grid')?.classList.toggle('active',S.gridVisible);

  // Restore background — vollständig pro Board zurücksetzen
  if(data.bgImage && !data.bgImage.startsWith('idb:')){
    setBgImage(data.bgImage, data.bgOpacity||85, data.bgSize||'cover');
  } else if(!data.bgImage){
    // Hintergrund komplett entfernen
    S.bgImage=null; S.bgOpacity=85; S.bgSize='cover';
    const ov2=document.getElementById('bg-overlay');
    if(ov2){ ov2.style.backgroundImage='none'; ov2.style.opacity='0'; }
  }
  // idb:-bgImage wird nach restoreBoardDataAsync aufgelöst (siehe unten)
  // Restore bg color
  setBgColor(data.bgColor||'#0e0f11');
  // Restore layers
  if(data.layers&&data.layers.length){
    S.layers=data.layers;
    S.activeLayerId=data.activeLayerId||data.layers[0].id;
    S.nextLayerId=data.nextLayerId||data.layers.length+2;
    S.layers.forEach(l=>ensureLayerSvg(l.id));
  } else {
    S.layers=[{id:1,name:'Ebene 1',visible:true,locked:false}];
    S.activeLayerId=1;S.nextLayerId=2;
    // Assign all items to layer 1
    S.items.forEach(it=>{if(!it.layerId)it.layerId=1;});
  }
  // Update layer panel if open
  if($('layer-panel')?.classList.contains('open')) renderLayerList();
}

// ── Load all boards from localStorage ──
function saveStorage(store){
  try {
    const json = JSON.stringify(store);
    localStorage.setItem(STORAGE_KEY, json);
    return true;
  } catch(e){
    // localStorage full — show user warning
    console.warn('LPD-Vorarlberg: localStorage voll', e);
    const banner = document.getElementById('save-error-banner') || (() => {
      const b = document.createElement('div');
      b.id = 'save-error-banner';
      b.style.cssText = 'position:fixed;bottom:10px;left:50%;transform:translateX(-50%);background:#e74c3c;color:#fff;padding:8px 16px;border-radius:8px;font-size:12px;font-family:var(--mono);z-index:99999;pointer-events:auto;cursor:pointer;';
      b.textContent = '⚠ Speicher voll — Board-Export empfohlen! (Klicken zum Schließen)';
      b.onclick = () => b.remove();
      document.body.appendChild(b);
      setTimeout(() => b.remove(), 8000);
      return b;
    })();
    return false;
  }
}
function loadStorage(){
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)||'null'); } catch(e){ return null; }
}

// ── Autosave current board ──
function scheduleSave(){
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(()=>saveNow(), 3000); // 3s debounce — nicht zu oft speichern
}
function saveNow(){
  const store = loadStorage() || { boards:[], activeId:null };
  const id = store.activeId;
  if(!id) return;
  captureBoardAsync().then(({board})=>{
    const store2 = loadStorage() || { boards:[], activeId:null };
    const idx = store2.boards.findIndex(b=>b.id===id);
    if(idx>=0) store2.boards[idx] = {...store2.boards[idx], ...board};
    else store2.boards.push({id, ...board});
    saveStorage(store2);
    // Board-Liste nur neu rendern wenn Panel offen — sonst unnötiger DOM-Overhead
    if(_boardPanelOpen) renderBoardList(store2);
  }).catch(err=>{
    console.warn('Async save failed, trying sync:', err);
    const store3 = loadStorage() || { boards:[], activeId:null };
    const idx = store3.boards.findIndex(b=>b.id===id);
    const data = captureBoard();
    if(idx>=0) store3.boards[idx] = {...store3.boards[idx], ...data};
    else store3.boards.push({id, ...data});
    saveStorage(store3);
    if(_boardPanelOpen) renderBoardList(store3);
  });
}
function flashSave(){
  const el=$('save-indicator');
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(()=>el.classList.remove('show'),1500);
}

// ── Board panel ──
function toggleBoardPanel(){
  _boardPanelOpen=!_boardPanelOpen;
  $('board-panel').classList.toggle('open',_boardPanelOpen);
  $('boards-btn').classList.toggle('active',_boardPanelOpen);
  if(_boardPanelOpen){
    const store=loadStorage()||{boards:[],activeId:null};
    renderBoardList(store);
  }
}

function renderBoardList(store){
  const list=$('bp-list');
  list.innerHTML='';
  if(!store.boards.length){
    list.innerHTML='<div style="padding:16px;text-align:center;font-size:11px;font-family:var(--mono);color:var(--text-dimmer)">Noch keine gespeicherten Boards</div>';
    return;
  }
  store.boards.forEach(b=>{
    const isActive = b.id===store.activeId;
    const card=document.createElement('div');
    card.className='bp-card'+(isActive?' active':'');
    const itemCount=(b.items||[]).length;
    const saved=b.savedAt?new Date(b.savedAt).toLocaleString('de-DE',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'–';
    card.innerHTML=`
      <div class="bp-thumb">${getBoardEmoji(b)}</div>
      <div class="bp-info">
        <div class="bp-name">${escHtml(b.name||'Unbenannt')}</div>
        <div class="bp-meta">${itemCount} Elemente · ${saved}</div>
      </div>
      <div class="bp-actions">
        <button class="bp-act" title="Umbenennen" data-onclick="renameBoardById('${b.id}')">✏️</button>
        <button class="bp-act" title="Duplizieren" data-onclick="duplicateBoardById('${b.id}')">⧉</button>
        <button class="bp-act del" title="Löschen" data-onclick="deleteBoardById('${b.id}')">🗑</button>
      </div>`;
    if(!isActive) card.addEventListener('click',e=>{if(!e.target.closest('.bp-act'))switchBoard(b.id);});
    list.appendChild(card);
  });
}

function getBoardEmoji(b){
  // pick an emoji based on board name or content
  const name=(b.name||'').toLowerCase();
  if(name.includes('film')||name.includes('dreh')) return '🎬';
  if(name.includes('musik')||name.includes('music')) return '🎵';
  if(name.includes('plan')||name.includes('ablauf')) return '📅';
  if(name.includes('idee')||name.includes('idea')) return '💡';
  if(name.includes('research')||name.includes('recherche')) return '🔍';
  return '📋';
}

// ── Switch to another board ──
function switchBoard(id){
  saveNow(); // save current first
  const store=loadStorage()||{boards:[],activeId:null};
  store.activeId=id;
  saveStorage(store);
  const b=store.boards.find(x=>x.id===id);
  if(b) restoreBoard(b);
  renderBoardList(store);
}

  const b=store.boards.find(x=>x.id===id);

  const copy={...JSON.parse(JSON.stringify(b)),id:'board_'+Date.now(),name:b.name+' (Kopie)',savedAt:Date.now()};

// ── Delete board ──
function deleteBoardById(id){
  const store=loadStorage()||{boards:[],activeId:null};
  if(store.boards.length<=1){showInfo('Das letzte Board kann nicht gelöscht werden.');return;}
  const b=store.boards.find(x=>x.id===id);

  saveStorage(store);
  renderBoardList(store);
}

// ── Re-compress all images on current board ──
function recompressAllImages(maxPx, quality, onProgress, onDone){
  const imageItems = S.items.filter(it=>it.type==='image'&&it.src&&it.src.startsWith('data:'));
  if(!imageItems.length){onDone(0);return;}
  let done=0;
  const total=imageItems.length;
  function next(){
    if(done>=total){onDone(total);return;}
    const item=imageItems[done];
    compressImage(item.src, maxPx, quality, compressed=>{
      item.src=compressed;
      // Also update the rendered img element
      const el=$('item-'+item.id);
      if(el){const img=el.querySelector('img');if(img)img.src=compressed;}
      done++;
      if(onProgress) onProgress(done,total);
      // Process next after small delay to avoid blocking UI
      setTimeout(next, 10);
    });
  }
  next();
}

function showBoardSizeInfo(){
  // Estimate current board size
  let totalBytes=0;
  S.items.forEach(it=>{
    if(it.src&&it.src.startsWith('data:')) totalBytes+=it.src.length*0.75;
    if(it.fileData&&it.fileData.startsWith('data:')) totalBytes+=it.fileData.length*0.75;
    if(it.children) it.children.forEach(ch=>{
      if(ch.fileData&&ch.fileData.startsWith('data:')) totalBytes+=ch.fileData.length*0.75;
    });
  });
  const mb=(totalBytes/1024/1024).toFixed(1);
  const imgCount=S.items.filter(it=>it.type==='image').length;

  openModal(`
    <div class="modal-title">Board-Größe & Export</div>
    <div style="font-size:12px;font-family:var(--mono);color:var(--text-dim);margin-bottom:12px;line-height:1.8;">
      📊 Geschätzte Größe: <b style="color:var(--text)">${mb} MB</b><br>
      🖼 Bilder auf Canvas: <b style="color:var(--text)">${imgCount}</b><br>
      ${totalBytes>20*1024*1024?'⚠ Board sehr groß — Neukompress empfohlen':'✓ Größe OK für Export'}
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      <button class="modal-btn confirm" data-onclick="
        closeModal();
        const prog=document.createElement('div');
        prog.id='compress-prog';
        prog.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--accent);border-radius:10px;padding:10px 18px;font-size:12px;font-family:var(--mono);z-index:99999;';
        prog.textContent='Komprimiere 0 / ${imgCount}…';
        document.body.appendChild(prog);
        recompressAllImages(800, 0.60,
          (done,total)=>{prog.textContent='Komprimiere '+done+' / '+total+'…';},
          (total)=>{prog.remove();scheduleSave();showInfo('✓ '+total+' Bilder neu komprimiert');}
        );
      ">🗜 Bilder neu komprimieren (für Export)</button>
      <button class="modal-btn confirm" data-onclick="closeModal();exportBoard();">⬇ Board herunterladen</button>
      <button class="modal-btn cancel" data-onclick="closeModal()">Abbrechen</button>
    </div>
  `);
}

function exportBoard(){
  const board = captureBoard();
  // Deep clone so we can safely rehydrate idb: refs without mutating S.items
  const boardCopy = JSON.parse(JSON.stringify(board));
  const safeName = (boardCopy.name||'board').replace(/[^a-zA-Z0-9_\-äöüÄÖÜ]/g,'_');

  // Progress-Dialog mit Balken
  const _toast=document.createElement('div');
  _toast.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);'
    +'background:var(--surface);border:1px solid var(--accent);border-radius:14px;'
    +'padding:24px 32px;font-size:13px;font-family:var(--mono);z-index:99999;'
    +'min-width:320px;box-shadow:0 8px 40px rgba(0,0,0,.7);text-align:center;';
  _toast.innerHTML='\
    <div style="font-size:15px;font-weight:700;color:var(--text);margin-bottom:12px">💾 Board speichern</div>\
    <div id="_save_msg" style="color:var(--text-dim);margin-bottom:14px">Daten werden vorbereitet…</div>\
    <div style="background:var(--surface2);border-radius:8px;overflow:hidden;height:8px;">\
      <div id="_save_bar" style="height:100%;width:0%;background:var(--accent);border-radius:8px;transition:width .3s ease;"></div>\
    </div>\
    <div id="_save_pct" style="color:var(--text-dimmer);font-size:10px;margin-top:6px">0%</div>';
  document.body.appendChild(_toast);
  function _setProgress(pct, msg){
    const bar=document.getElementById('_save_bar');
    const lbl=document.getElementById('_save_msg');
    const pctEl=document.getElementById('_save_pct');
    if(bar) bar.style.width=pct+'%';
    if(lbl&&msg) lbl.textContent=msg;
    if(pctEl) pctEl.textContent=Math.round(pct)+'%';
  }
  _setProgress(10,'Bilder und Dateien laden…');

  restoreBoardDataAsync(boardCopy).then(full=>{
    _setProgress(60,'Datei wird erstellt…');
    const json = JSON.stringify(full, null, 2);
    const blob = new Blob([json], {type:'application/json'});
    const sizeMB = (blob.size/1024/1024).toFixed(1);

    const finish=(ok)=>{
      _setProgress(100, ok ? '✓ Gespeichert ('+sizeMB+' MB)' : '⬇ Download läuft ('+sizeMB+' MB)');
      document.getElementById('_save_bar').style.background=ok?'#2ecc71':'var(--accent)';
      setTimeout(()=>_toast.remove(),2000);
    };

    // File System Access API — speichert direkt lokal ohne Download-Dialog
    if(window.showSaveFilePicker){
      _setProgress(75,'Speicherort wählen…');
      window.showSaveFilePicker({
        suggestedName: safeName+'.json',
        types:[{description:'LPD-Vorarlberg Board',accept:{'application/json':['.json']}}]
      }).then(fh=>{ _setProgress(85,'Datei wird geschrieben…'); return fh.createWritable(); })
        .then(w=>w.write(blob).then(()=>w))
        .then(w=>w.close())
        .then(()=>finish(true))
        .catch(err=>{
          if(err.name==='AbortError'){_toast.remove();return;}
          _fallbackDownload(blob, safeName+'.json');
          finish(false);
        });
      return;
    }
    // Tauri: nativer Speichern-Dialog
    if(typeof window.BoardFile!=='undefined'&&window.BoardFile.isTauri){
      // BoardFile.save erwartet captureBoard()-Daten — wir nutzen direkt den JSON-Blob
      _toast.innerHTML='<span style="color:var(--accent)">💾</span> Speichern…';
      const reader=new FileReader();
      reader.onload=()=>{
        // Via Tauri-Bridge speichern
        import('@tauri-apps/api/core').then(({invoke})=>{
          const arr=Array.from(new Uint8Array(reader.result));
          invoke('save_board',{path:null,data:arr})
            .then(()=>finish(true))
            .catch(()=>{_fallbackDownload(blob,safeName+'.json');finish(false);});
        }).catch(()=>{_fallbackDownload(blob,safeName+'.json');finish(false);});
      };
      reader.readAsArrayBuffer(blob);
      return;
    }
    // Fallback: Browser-Download
    _fallbackDownload(blob, safeName+'.json');
    finish(false);
  }).catch(err=>{
    _toast.remove();
    showInfo('Speichern fehlgeschlagen: '+err.message);
  });
}

function _fallbackDownload(blob, filename){
  // Standard download link approach
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.style.cssText = 'position:fixed;top:-200px;opacity:0;';
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); }, 3000);
}

// ── Import board from JSON file ──
function importBoard(event){
  const files=Array.from(event.target.files);if(!files.length) return;
  saveNow();
  let pending=files.length;
  const store=loadStorage()||{boards:[],activeId:null};
  let lastId=null;
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const data=JSON.parse(e.target.result);
        // Full store export (has .boards array)?
        if(data.boards&&Array.isArray(data.boards)){
          data.boards.forEach(b=>{
            const id='board_'+Date.now()+'_'+Math.random().toString(36).slice(2,5);
            const imported={...b,id,savedAt:Date.now()};
            store.boards.push(imported);
            lastId=id;
          });
        } else if(data.name&&Array.isArray(data.items)){
          // Single board JSON
          const id='board_'+Date.now()+'_'+Math.random().toString(36).slice(2,5);
          const imported={...data,id,savedAt:Date.now()};
          store.boards.push(imported);
          lastId=id;
        } else {
          throw new Error('Ungültiges Format');
        }
      } catch(err){showInfo('Fehler in "'+file.name+'": '+err.message);}
      pending--;
      if(pending===0&&lastId){
        store.activeId=lastId;
        saveStorage(store);
        const active=store.boards.find(b=>b.id===lastId);
        if(active) restoreBoard(active);
        renderBoardList(store);
        showInfo('Import erfolgreich! '+files.length+' Datei'+(files.length>1?'en':'')+' importiert.');
      }
    };
    reader.readAsText(file);
  });
  event.target.value='';
}

// ── Input change-Events per JS verdrahten ──
// (onchange-Attribute im pointer-events:none-Container werden ignoriert)
(function(){
  function wire(id, fn){
    const el=document.getElementById(id);
    if(el){ el.addEventListener('change',fn); }
  }
  // ── Dynamische Input-Erzeugung ──
  // Inputs werden nur kurz erzeugt wenn gebraucht, dann sofort wieder gelöscht.
  // Verhindert WebView2-Rendering von "Datei auswählen"-Buttons im Vollbild.
  window._openFileInput = function(id, accept, multiple, onchange){
    // Remove any existing
    const old = document.getElementById(id);
    if(old) old.remove();
    const inp = document.createElement('input');
    inp.type = 'file';
    inp.id = id;
    inp.style.cssText = 'position:fixed;top:-9999px;left:-9999px;width:0;height:0;opacity:0;';
    if(accept) inp.accept = accept;
    if(multiple) inp.multiple = true;
    inp.addEventListener('change', e=>{
      onchange(e);
      setTimeout(()=>inp.remove(), 500);
    });
    inp.addEventListener('cancel', ()=>setTimeout(()=>inp.remove(), 100));
    document.body.appendChild(inp);
    inp.click();
  };

  window._openColorInput = function(currentValue, onChange){
    const old = document.getElementById('bg-color-input');
    if(old) old.remove();
    const inp = document.createElement('input');
    inp.type = 'color';
    inp.id = 'bg-color-input';
    inp.value = currentValue || '#0e0f11';
    inp.style.cssText = 'position:fixed;top:-9999px;left:-9999px;width:0;height:0;opacity:0;';
    inp.addEventListener('input',  e=>onChange(e.target.value));
    inp.addEventListener('change', e=>{ onChange(e.target.value); setTimeout(()=>inp.remove(), 100); });
    inp.addEventListener('cancel', ()=>setTimeout(()=>inp.remove(), 100));
    document.body.appendChild(inp);
    inp.click();
  };

  // Patch data-onclick handlers to use dynamic inputs
  // (update the polyfill-called functions)
  const _wire = function(){
    // Polyfill calls data-onclick which calls these functions
    // We override them to use _openFileInput
  };

  // Text-Picker
  const tpFont=document.getElementById('tp-font-select');
  if(tpFont){
    tpFont.addEventListener('change', e=>setTextFont(e.target.value));

  const tpSizeR=document.getElementById('tp-size-range');

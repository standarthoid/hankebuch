function videoMime(name){
  const e=getExt(name);
  return e==='mov'?'video/quicktime':e==='webm'?'video/webm':e==='avi'?'video/x-msvideo':'video/mp4';
}

// ═══════════════════════════════════════════════
//  RENDER ITEMS
// ═══════════════════════════════════════════════
function renderItem(item){
  $('item-'+item.id)?.remove();
  let el;
  if(item.type==='file') el=renderFile(item);
  else if(item.type==='folder') el=renderFolder(item);
  else if(item.type==='note') el=renderNote(item);
  else if(item.type==='text-label') el=renderTextLabel(item);
  else if(item.type==='image') el=renderImageItem(item);
  else return;
  el.id='item-'+item.id;el.classList.add('item');

  if(item.type==='folder'){
    // Ordner-Icons in #folders-overlay (position:fixed, screen-stabil beim Zoom)
    if(item._screenX==null){
      const r=canvasWrap.getBoundingClientRect();
      item._screenX=Math.round(item.x*S.zoom+S.panX+r.left);
      item._screenY=Math.round(item.y*S.zoom+S.panY+r.top);
    }
    el.style.position='fixed';
    el.style.left=item._screenX+'px';
    el.style.top=item._screenY+'px';
    el.style.zIndex='5'; // über canvas-items (z:0-2), unter header (z:10000)
    makeDraggable(el,item);addItemEvents(el,item);
    const itemLayer=S.layers.find(l=>l.id===item.layerId);
    if(itemLayer&&!itemLayer.visible) el.style.display='none';
    if(itemLayer&&itemLayer.locked){
      el.style.pointerEvents='none';
      el.querySelectorAll('button,a,textarea,input,select,video').forEach(c=>{c.style.pointerEvents='none';});
    }
    if(S.selectedIds.has(item.id)) el.classList.add('selected');
    foldersOverlay.appendChild(el);
    return;
  }

  el.style.left=item.x+'px';el.style.top=item.y+'px';el.style.zIndex=item.z||1;
  if(item.w&&item.type!=='folder') el.style.width=item.w+'px';
  if(item.h&&!['folder','file'].includes(item.type)) el.style.height=item.h+'px';
  makeDraggable(el,item);addItemEvents(el,item);
  // Apply layer visibility and z-order
  const itemLayer=S.layers.find(l=>l.id===item.layerId);
  if(itemLayer && !itemLayer.visible) el.style.display='none';
  if(itemLayer && itemLayer.locked){
    el.style.pointerEvents='none';
    el.querySelectorAll('button,a,textarea,input,select,video').forEach(c=>{c.style.pointerEvents='none';});
  }
  const layerIdx=S.layers.findIndex(l=>l.id===item.layerId);
  el.style.zIndex=(layerIdx>=0?(layerIdx+1)*1000:1000)+(item.z||1);
  if(S.selectedIds.has(item.id)) el.classList.add('selected');
  itemsLayer.appendChild(el);
}

// ── FILE ──
function renderFile(item){
  const vm=item.viewMode||'icon';
  const [icon,color]=getFileIcon(item.name||'');
  const el=document.createElement('div');

  if(vm==='preview-img'&&item.fileData&&isImg(item.name)){
    // ── IMAGE PREVIEW — free resize, image fills card ──
    el.className='file-item img-preview-mode';
    el.style.width=(item.w||220)+'px';el.style.height=(item.h||165)+'px';
    const img=document.createElement('img');img.className='preview-img';
    img.src=item.fileData;img.draggable=false;
    img.style.cssText='display:block;width:100%;height:100%;object-fit:cover;pointer-events:none;border-radius:var(--radius);';
    el.appendChild(img);
    const rh=document.createElement('div');rh.className='img-resize-h';rh.textContent='⠿';
    el.appendChild(rh);makeResizable(el,item,rh);
    addFileBurger(el,item);

  } else if(vm==='preview-video'&&item.fileData&&item.fileData!=='__video_session_only__'&&isVideo(item.name)){
    // ── VIDEO PREVIEW ──
    el.className='file-item preview-mode';
    const w=item.w||320,h=item.h||220;
    el.style.width=w+'px';el.style.height=h+'px';

    // Wrapper: feste Höhe abzüglich Footer (36px)
    const wrap=document.createElement('div');
    wrap.className='file-preview-wrap';
    wrap.style.cssText='width:100%;height:'+(h-36)+'px;position:relative;background:#000;overflow:hidden;flex-shrink:0;';

    // Video-Element: volle Größe des Wrappers
    const vid=document.createElement('video');
    vid.controls=true;
    vid.preload='metadata';
    vid.playsInline=true;
    vid.style.cssText='width:100%;height:100%;display:block;object-fit:contain;';

    // Blob-URL erstellen — Tauri blockiert data:-URLs für media
    const _vMime=videoMime(item.name||'');
    const _vBlob=new Blob([Uint8Array.from(atob(item.fileData.split(',')[1]),c=>c.charCodeAt(0))],{type:_vMime});
    const _vUrl=URL.createObjectURL(_vBlob);
    vid.src=_vUrl;
    vid.addEventListener('emptied',()=>URL.revokeObjectURL(_vUrl),{once:true});
    wrap.appendChild(vid);

    // Drag-Handle oben (schmaler Streifen zum Verschieben)
    const dragHandle=document.createElement('div');
    dragHandle.style.cssText='position:absolute;top:0;left:0;right:0;height:20px;'
      +'background:linear-gradient(rgba(0,0,0,.4),transparent);cursor:grab;'
      +'z-index:5;touch-action:none;display:flex;align-items:center;padding:0 6px;';
    dragHandle.innerHTML='<span style="font-size:9px;font-family:var(--mono);color:rgba(255,255,255,.7);pointer-events:none">⠿ ziehen</span>';
    dragHandle.addEventListener('pointerdown',e=>{
      e.stopPropagation();
      el.dispatchEvent(new PointerEvent('pointerdown',{
        bubbles:true,cancelable:true,
        clientX:e.clientX,clientY:e.clientY,
        pointerId:e.pointerId,pointerType:e.pointerType,
        pressure:e.pressure||0,button:0,buttons:1
      }));
    });
    wrap.appendChild(dragHandle);
    el.appendChild(wrap);

    // Footer
    const meta=document.createElement('div');meta.className='file-meta';
    meta.innerHTML=`<span style="font-size:12px;color:#9b59b6">🎬</span><span class="file-label" style="flex:1;text-align:left">${escHtml(item.name||'')}</span><button data-onclick="openViewer(${item.id})" style="border:none;background:transparent;color:var(--accent);cursor:pointer;font-size:10px;font-family:var(--mono)">⛶ Vollbild</button>`;
    el.appendChild(meta);

    // Resize-Handle
    const rh=document.createElement('div');
    rh.style.cssText='position:absolute;right:0;bottom:0;width:16px;height:16px;cursor:se-resize;z-index:2;background:var(--surface2);border:1px solid var(--accent);border-radius:0 0 7px 0;';
    el.appendChild(rh);
    makeResizable(el,item,rh,()=>{
      wrap.style.height=(item.h-36)+'px';
    });
    addFileBurger(el,item);

  } else if(vm==='preview-video'&&(item.fileData==='__video_session_only__'||!item.fileData)&&isVideo(item.name)){
    // Video nicht mehr im Speicher — Datei erneut verknüpfen
    el.className='file-item preview-mode';
    const w=item.w||320,h=item.h||200;
    el.style.width=w+'px';el.style.height=h+'px';
    // Klickbare Wiederverknüpfungs-Fläche
    const relink=document.createElement('div');
    relink.style.cssText='flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;padding:16px;background:#9b59b611;border:2px dashed #9b59b644;border-radius:8px;margin:6px;transition:background .15s;';
    relink.innerHTML='<span style="font-size:32px">🎬</span>'
      +'<span style="font-size:11px;font-family:var(--mono);color:var(--text-dim);text-align:center">'
      +escHtml(item.name||'Video')
      +'<br><span style="color:var(--accent)">↑ Klicken um Datei erneut zu verknüpfen</span></span>';
    relink.addEventListener('pointerenter',()=>relink.style.background='#9b59b622');
    relink.addEventListener('pointerleave',()=>relink.style.background='#9b59b611');
    // Versteckter File-Input
    const fi=document.createElement('input');
    fi.type='file';
    fi.accept='.mp4,.mov,.webm,.m4v,.mpeg';
    fi.style.cssText='display:none';
    fi.addEventListener('change',e=>{
      const file=e.target.files[0];if(!file)return;
      const reader=new FileReader();
      reader.onload=ev=>{
        // Live-Item aktualisieren
        const liveItem=S.items.find(x=>x.id===item.id);
        if(liveItem) liveItem.fileData=ev.target.result;
        item.fileData=ev.target.result;
        renderItem(item);
        scheduleSave();
      };
      reader.readAsDataURL(file);
    });
    relink.addEventListener('pointerdown',e=>{
      e.stopPropagation();
      fi.click();
    });
    el.appendChild(fi);
    el.appendChild(relink);
    // Schmale Titelleiste unten
    const meta=document.createElement('div');meta.className='file-meta';
    meta.innerHTML=`<span style="font-size:12px;color:#9b59b6">🎬</span><span class="file-label" style="flex:1;text-align:left">${escHtml(item.name||'')}</span>`;
    el.appendChild(meta);
    addFileBurger(el,item);

  } else if(vm==='preview-doc'&&item.fileData&&isPdf(item.name)){
    // ── PDF PREVIEW via PDF.js ──
    el.className='file-item preview-mode';
    const w=item.w||380,h=item.h||500;
    el.style.width=w+'px';el.style.height=h+'px';
    const wrap=document.createElement('div');wrap.className='file-preview-wrap';
    wrap.style.cssText='width:100%;flex:1;overflow:hidden;min-height:0;position:relative;';
    // Skalierung: PDF-Seite an Elementbreite anpassen (abzüglich Toolbar ~36px)
    const pdfScale=Math.max(0.5, (w-8) / 595); // A4 = 595pt Breite bei 72dpi
    buildPdfViewer(item.fileData, item.name, '100%', pdfScale).then(viewer=>{
      wrap.appendChild(viewer);
    }).catch(()=>{
      wrap.innerHTML='<div style="padding:12px;font-size:11px;font-family:var(--mono);color:var(--text-dim)">PDF kann nicht angezeigt werden</div>';
    });
    // Zeichen-Overlay über PDF mit setPointerCapture
    const drawOverlay=document.createElement('div');
    drawOverlay.className='pdf-draw-overlay';
    drawOverlay.style.cssText='position:absolute;inset:0;z-index:10;pointer-events:none;touch-action:none;background:transparent;';
    if(DRAW_TOOLS.includes(S.tool)) drawOverlay.style.pointerEvents='auto';
    drawOverlay.addEventListener('pointerdown',ev=>{
      if(!DRAW_TOOLS.includes(S.tool)) return;
      ev.preventDefault();
      ev.stopPropagation();
      try{ drawOverlay.setPointerCapture(ev.pointerId); }catch(_){}
      handleDrawStart(normEvent(ev));
    });
    drawOverlay.addEventListener('pointermove',ev=>{
      if(!isDrawing) return;
      ev.preventDefault();
      ev.stopPropagation();
      handleDrawMove(normEvent(ev));
    });
    const _endOv=ev=>{
      if(!isDrawing) return;
      ev.preventDefault();
      ev.stopPropagation();
      try{ drawOverlay.releasePointerCapture(ev.pointerId); }catch(_){}
      handleDrawEnd(normEvent(ev));
    };
    drawOverlay.addEventListener('pointerup',_endOv);
    drawOverlay.addEventListener('pointercancel',_endOv);
    wrap.appendChild(drawOverlay);
    el.appendChild(wrap);
    const meta=document.createElement('div');meta.className='file-meta';
    meta.innerHTML=`<span style="font-size:12px;color:${color}">${icon}</span><span class="file-label" style="flex:1;text-align:left">${escHtml(item.name||'')}</span><button data-onclick="openViewer(${item.id})" style="border:none;background:transparent;color:var(--accent);cursor:pointer;font-size:10px;font-family:var(--mono)">⛶ Vollbild</button>`;
    el.appendChild(meta);
    const rh=document.createElement('div');rh.style.cssText='position:absolute;right:0;bottom:0;width:14px;height:14px;cursor:se-resize;z-index:2;';el.appendChild(rh);
    // Nach Resize: PDF neu rendern mit neuer Breite
    makeResizable(el,item,rh,()=>{
      wrap.innerHTML='';
      const newScale=Math.max(0.5,(el.offsetWidth-8)/595);
      buildPdfViewer(item.fileData, item.name, '100%', newScale).then(v=>wrap.appendChild(v)).catch(()=>{});
      wrap.appendChild(drawOverlay);
    });
    addFileBurger(el,item);

  } else if(vm==='preview-doc'&&item.fileData&&!isPdf(item.name)){
    // ── NON-PDF DOC: show icon + open button ──
    el.className='file-item preview-mode';
    el.style.width=(item.w||200)+'px';el.style.height=(item.h||120)+'px';
    const wrap=document.createElement('div');wrap.className='file-preview-wrap';
    wrap.style.cssText=`width:100%;height:${(item.h||120)-36}px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;`;
    wrap.innerHTML=`<span style="font-size:38px">${icon}</span><button data-onclick="openViewer(${item.id})" style="border:1px solid var(--accent);background:transparent;color:var(--accent);border-radius:6px;padding:4px 12px;cursor:pointer;font-size:11px;font-family:var(--mono)">Öffnen</button>`;
    el.appendChild(wrap);
    const meta=document.createElement('div');meta.className='file-meta';
    meta.innerHTML=`<span style="font-size:12px;color:${color}">${icon}</span><span class="file-label" style="flex:1;text-align:left">${escHtml(item.name||'')}</span>`;
    el.appendChild(meta);
    addFileBurger(el,item);

  } else {
    // ── ICON mode (default) ──
    el.className='file-item';
    if(item.w) el.style.width=item.w+'px';
    if(item.h) el.style.height=item.h+'px';
    el.innerHTML=`<div class="file-icon-wrap" style="background:${color}22;color:${color}">${icon}</div><div class="file-label">${escHtml(item.name||'Datei')}</div>`;
    // Doppelklick/Doppeltipp → Vollbild
    let _tap=0;
    el.addEventListener('click',e=>{
      if(e.target.closest('.file-burger,.img-resize-h')) return;
      const now=Date.now();
      if(now-_tap<400){ openViewer(item.id); _tap=0; }
      else _tap=now;
    });
    el.addEventListener('dblclick',e=>{
      if(e.target.closest('.file-burger,.img-resize-h,.file-label')) return;
      e.stopPropagation(); openViewer(item.id);
    });
    el.querySelector('.file-label').addEventListener('dblclick',e=>{e.stopPropagation();startRenameFile(el.querySelector('.file-label'),item);});
    const rh=document.createElement('div');rh.style.cssText='position:absolute;right:0;bottom:0;width:14px;height:14px;cursor:se-resize;z-index:2;opacity:.5;';el.appendChild(rh);
    const iw0=item.w||110,ih0=item.h||110;
    const iconWrap=el.querySelector('.file-icon-wrap');
    const iconWrap0Size=iconWrap?parseInt(getComputedStyle(iconWrap).width)||48:48;
    makeResizable(el,item,rh,()=>{
      const sc=Math.min(el.offsetWidth/iw0,el.offsetHeight/(ih0||iw0));
      if(iconWrap)iconWrap.style.fontSize=Math.max(16,Math.round(iconWrap0Size*sc*0.6))+'px';
    });
    addFileBurger(el,item);
  }
  return el;
}

function addFileBurger(el,item){
  const btn=document.createElement('button');
  btn.className='file-burger';btn.textContent='⋮';btn.title='Optionen';
  let _pd={x:0,y:0,t:0};
  btn.addEventListener('pointerdown',e=>{
    e.stopPropagation(); // kein Drag auf dem Element starten
    _pd={x:e.clientX,y:e.clientY,t:Date.now()};
  },{passive:true});
  btn.addEventListener('pointerup',e=>{
    if(Math.abs(e.clientX-_pd.x)>14||Math.abs(e.clientY-_pd.y)>14) return;
    if(Date.now()-_pd.t>800) return; // Long-press → ignorieren
    e.stopPropagation();
    const r=btn.getBoundingClientRect();
    const it=S.items.find(i=>i.id===item.id)||item;
    // Debounce überspringen für Burger — eigene Rate-Limiting
    const now=Date.now();
    if(now-(_pd._lastMenu||0)<400){_pd._lastMenu=now;return;}
    _pd._lastMenu=now;
    _ddLastShow=0; // Reset global debounce
    showDropdown(r.right+4, r.top, _buildFileBurgerItems(it));
  });
  // Maus-Fallback
  btn.addEventListener('click',e=>{
    e.stopPropagation();
    const r=btn.getBoundingClientRect();
    const it=S.items.find(i=>i.id===item.id)||item;
    _ddLastShow=0;
    showDropdown(r.right+4, r.top, _buildFileBurgerItems(it));
  });
  el.appendChild(btn);
}

function _buildFileBurgerItems(item){
  const vm=item.viewMode||'icon';
  const hasPreview=!!(item.fileData||(item.type==='image'&&item.src));
  const menuItems=[
    {icon:vm==='icon'?'✓':'', label:'🗂 Icon anzeigen', active:vm==='icon',
      fn:()=>{item.viewMode='icon';delete item.w;delete item.h;renderItem(item);scheduleSave();}},
  ];
  if(hasPreview){
    const _n=item.name||'';
    const previewLabel=isImg(_n)||item.type==='image'?'🖼 Bild-Vorschau':isPdf(_n)?'📄 PDF-Vorschau':isVideo(_n)?'🎬 Video-Vorschau':'📋 Vorschau';
    const previewMode=isImg(_n)||item.type==='image'?'preview-img':isVideo(_n)?'preview-video':'preview-doc';
    const defW=isImg(_n)||item.type==='image'?220:isPdf(_n)?380:isVideo(_n)?320:200;
    const defH=isImg(_n)||item.type==='image'?165:isPdf(_n)?500:isVideo(_n)?200:120;
    menuItems.push({icon:vm===previewMode?'✓':'', label:previewLabel, active:vm===previewMode,
      fn:()=>{item.viewMode=previewMode;item.w=item.w||defW;item.h=item.h||defH;renderItem(item);scheduleSave();}});
    menuItems.push('-');
    menuItems.push({icon:'⛶', label:'Vollbild öffnen', fn:()=>openViewer(item.id)});
  }
  menuItems.push('-');
  menuItems.push({icon:'✏️', label:'Umbenennen',  fn:()=>renameItem(item.id)});
  menuItems.push({icon:'⧉',  label:'Duplizieren', fn:()=>duplicateItem(item.id)});
  menuItems.push('-');
  menuItems.push({icon:'🗑',  label:'Löschen',     fn:()=>deleteItem(item.id)});
  return menuItems;
}

function showFileBurger(e,item){
  const it=item||S.items.find(i=>i.id===item?.id);if(!it) return;
  const btn=window._lastBurgerBtn||document.querySelector(`#item-${it.id} .file-burger`);
  const r=btn?btn.getBoundingClientRect():{right:(e?.clientX||200)+4,top:e?.clientY||200};
  window._lastBurgerBtn=null;
  showDropdown(r.right+4,r.top,_buildFileBurgerItems(it));
}


function hexToRgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}

function renderNote(item){
  const ci=item.colorIdx??0;const nc=NOTE_COLORS[Math.min(ci,NOTE_COLORS.length-1)];
  const op=item.opacity??1;
  const el=document.createElement('div');el.className='note-item';
  el.style.background=hexToRgba(nc.bg,op);
  el.style.borderColor=nc.border;
  if(item.w) el.style.width=item.w+'px';
  if(item.h) el.style.height=item.h+'px';

  // ── Top bar ──
  const topbar=document.createElement('div');topbar.className='note-topbar';
  const dragLbl=document.createElement('span');
  dragLbl.style.cssText='cursor:grab;color:var(--text-dimmer);font-size:14px;padding:2px 6px;flex-shrink:0;touch-action:none;min-width:28px;text-align:center;';
  dragLbl.textContent='⠿⠿';
  // Drag wird vom topbar-Handler ausgelöst (siehe oben)
  const spacer=document.createElement('span');spacer.style.flex='1';
  const optBtn=document.createElement('button');
  optBtn.style.cssText='background:none;border:none;cursor:pointer;font-size:13px;color:var(--text-dim);padding:0 4px;line-height:1;';
  optBtn.textContent='⚙';optBtn.title='Optionen';
  optBtn.addEventListener('mousedown',e=>e.stopPropagation());
  optBtn.addEventListener('pointerdown',e=>e.stopPropagation());
  optBtn.addEventListener('click',e=>{
    e.stopPropagation();
    const showing=optPanel.style.display!=='none';
    // Alle anderen schließen
    document.querySelectorAll('.note-opt-panel').forEach(p=>{p.style.display='none';});
    if(!showing){
      // Position relativ zum Button berechnen
      const br=optBtn.getBoundingClientRect();
      optPanel.style.position='fixed';
      optPanel.style.top=(br.bottom+4)+'px';
      optPanel.style.right=(window.innerWidth-br.right)+'px';
      optPanel.style.left='auto';
      optPanel.style.display='block';
      // Panel ans body hängen falls noch nicht
      if(optPanel.parentNode!==document.body) document.body.appendChild(optPanel);
    }
  });
  // Topbar komplett als Drag-Fläche — außer optBtn
  topbar.style.cssText=(topbar.style.cssText||'')+'cursor:grab;touch-action:none;';
  topbar.addEventListener('pointerdown',e=>{
    if(e.target===optBtn||e.target.closest('button')) return;
    e.stopPropagation();
    // makeDraggable auf el direkt auslösen — kein synthetisches Event nötig
    el.dispatchEvent(new PointerEvent('pointerdown',{
      bubbles:false,cancelable:true,
      clientX:e.clientX,clientY:e.clientY,
      pointerId:e.pointerId,pointerType:e.pointerType,
      pressure:e.pressure||0,button:0,buttons:1
    }));
  });
  topbar.appendChild(dragLbl);topbar.appendChild(spacer);topbar.appendChild(optBtn);
  el.appendChild(topbar);

  // ── Options panel — absolute overlay, no overflow ──
  const optPanel=document.createElement('div');
  optPanel.className='note-opt-panel';
  optPanel.style.cssText='display:none;position:absolute;top:28px;right:0;min-width:210px;max-width:260px;background:var(--surface);border:1px solid var(--border);border-radius:8px;box-shadow:0 4px 18px rgba(0,0,0,.5);z-index:9998;padding:6px 0;';
  optPanel.addEventListener('mousedown',e=>e.stopPropagation());
  optPanel.addEventListener('pointerdown',e=>e.stopPropagation());
  // Schließen bei Klick außerhalb (nur für Body-Portal)
  const _closeOptPanel=ev=>{
    if(!optPanel.contains(ev.target)&&ev.target!==optBtn){
      optPanel.style.display='none';
    }
  };
  document.addEventListener('pointerdown',_closeOptPanel);

  function optRow(label){
    const row=document.createElement('div');
    row.style.cssText='display:flex;align-items:center;gap:6px;padding:4px 10px;font-size:10px;font-family:var(--mono);color:var(--text-dim);';
    const lbl=document.createElement('span');lbl.style.cssText='flex-shrink:0;min-width:62px;';lbl.textContent=label;
    row.appendChild(lbl);return row;
  }

  // Color row
  const colorRow=optRow('Farbe');
  const colorWrap=document.createElement('div');colorWrap.style.cssText='display:flex;gap:4px;flex-wrap:wrap;';
  NOTE_COLORS.forEach((c,i)=>{
    const b=document.createElement('button');
    b.style.cssText='width:16px;height:16px;border-radius:50%;background:'+c.bg+';border:2px solid '+(i===ci?'#fff':'transparent')+';cursor:pointer;padding:0;flex-shrink:0;';

  const NOTE_FONTS=BD_FONTS;

  fontSel.addEventListener('pointerdown',e=>e.stopPropagation());
  fontSel.addEventListener('change',()=>{item.font=fontSel.value;ta.style.fontFamily=item.font;scheduleSave();});
  fontRow.appendChild(fontSel);optPanel.appendChild(fontRow);

  // Text color row
  const tcRow=optRow('Textfarbe');

  tcInp.style.cssText='width:28px;height:22px;border:none;border-radius:4px;cursor:pointer;padding:0;background:none;';

    +';color:'+(item.textColor||'var(--text)')+';padding:6px 10px 14px;border-radius:0 0 8px 8px;';
  ta.addEventListener('mousedown',e=>{e.stopPropagation();if(e.detail>=2) return;ta.focus();});
  ta.addEventListener('input',()=>{item.text=ta.value;scheduleSave();});
  ta.addEventListener('keydown',e=>e.stopPropagation());
  ta.addEventListener('focus',()=>{closeDropdown();optPanel.style.display='none';});
  ta.addEventListener('dblclick',e=>{
    e.stopPropagation();
    ta.focus();
    if(e.pointerType && e.pointerType!=='mouse') setTimeout(()=>ensureKeyboard?.(ta),0);
  });
  ta.addEventListener('pointerdown',e=>{
    if(document.activeElement===ta){
      e.stopPropagation();
      if(e.pointerType!=='mouse') setTimeout(()=>ensureKeyboard(ta),0);
      return;
    }
    if(S.selectedIds.has(item.id)){
      e.stopPropagation();
      ta.focus();
      if(e.pointerType!=='mouse') setTimeout(()=>ensureKeyboard?.(ta),0);
      return;
    }
    e.preventDefault();
    e.stopPropagation();
    el.dispatchEvent(new PointerEvent('pointerdown',{
      bubbles:false,cancelable:true,
      clientX:e.clientX,clientY:e.clientY,
      pointerId:e.pointerId,pointerType:e.pointerType,
      pressure:e.pressure||0,button:0,buttons:1
    }));
  });
  el.appendChild(ta);

  // ── Resize handle ──
  const rh=document.createElement('div');
  rh.style.cssText='position:absolute;right:-1px;bottom:-1px;width:16px;height:16px;cursor:se-resize;z-index:9999;background:var(--surface2);border:1px solid var(--accent);border-radius:0 0 7px 0;';
  makeResizable(el,item,rh);el.appendChild(rh);
  return el;
}


function renderImageItem(item){
  const el=document.createElement('div');el.className='image-item';
  const aspect=(item.aspect)||(item.h&&item.w?item.h/item.w:null);
  const w=item.w||200;
  el.style.width=w+'px';
  if(aspect) el.style.height=Math.round(w*aspect)+'px';
  else if(item.h) el.style.height=item.h+'px';
  const img=document.createElement('img');
  img.src=item.src;
  img.draggable=false;
  // pointer-events:none so all touch/pen/mouse events bubble to the div
  img.style.cssText='width:100%;height:100%;object-fit:contain;display:block;pointer-events:none;user-select:none;';
  img.addEventListener('load',()=>{
    if(!item.aspect&&img.naturalWidth){
      item.aspect=img.naturalHeight/img.naturalWidth;
      el.style.height=Math.round(w*item.aspect)+'px';
      if(item.h!==Math.round(w*item.aspect)){item.h=Math.round(w*item.aspect);scheduleSave();}
    }
  },{once:true});
  el.appendChild(img);

  // Foto beim Antippen sofort in den Vordergrund — vor allen anderen Guards
  el.addEventListener('pointerdown',e=>{
    if(e.button!==0&&e.button!==undefined) return;
    if(_pointers.size>=2) return; // Pinch läuft bereits
    const layer=S.layers.find(l=>l.id===item.layerId);
    if(layer&&layer.locked) return;
    bringToFront(item);
    // Selektion setzen falls noch nicht selektiert
    if(!S.selectedIds.has(item.id)&&!e.ctrlKey&&!e.metaKey){
      clearSelection();
      state_selectedAdd(item.id,el);
    }
  },{capture:true}); // capture:true → feuert vor makeDraggable

  // Resize handle
  const rh=document.createElement('div');rh.className='img-rh';
  rh.addEventListener('pointerdown',e=>{
    e.stopPropagation();e.preventDefault();
    rh.setPointerCapture(e.pointerId);
    _resizeActive=true; // Canvas einfrieren
    const resizePointerId=e.pointerId;
    const startW=el.offsetWidth,sx=e.clientX;
    const asp=item.aspect||(el.offsetHeight/el.offsetWidth)||0.75;
    const onMove=ev=>{
      if(ev.pointerId!==resizePointerId) return;
      item.w=Math.max(40,(startW+(ev.clientX-sx)/S.zoom));
      item.h=Math.round(item.w*asp);
      el.style.width=item.w+'px';el.style.height=item.h+'px';
    };
    const onUp=ev=>{
      if(ev.pointerId!==resizePointerId) return;
      _resizeActive=false; // Freigabe
      rh.releasePointerCapture(resizePointerId);
      rh.removeEventListener('pointermove',onMove);
      rh.removeEventListener('pointerup',onUp);
      rh.removeEventListener('pointercancel',onUp);
      scheduleSave();
    };
    rh.addEventListener('pointermove',onMove);
    rh.addEventListener('pointerup',onUp);
    rh.addEventListener('pointercancel',onUp);
  });
  el.appendChild(rh);
  // Doppeltipp / Doppelklick → Vollbild öffnen
  let _imgDoubleTap=0;
  el.addEventListener('click',e=>{
    if(e.target.closest('.img-rh')) return;
    const now=Date.now();
    if(now-_imgDoubleTap<400){ e.stopPropagation(); openViewer(item.id); _imgDoubleTap=0; }
    else _imgDoubleTap=now;
  });
  el.addEventListener('dblclick',e=>{
    if(e.target.closest('.img-rh')) return;
    e.stopPropagation(); openViewer(item.id);
  });
  return el;
}

function renderTextLabel(item){
  const el=document.createElement('div');el.className='text-label-item';
  el.style.cssText='position:absolute;cursor:move;user-select:none;white-space:pre;padding:3px 6px;display:inline-block;';
  el.style.fontSize=(item.fontSize||18)+'px';
  el.style.fontFamily=item.font||'sans-serif';
  el.style.color=item.color||S.textColor||'#ffffff';
  el.style.fontWeight=item.bold?'bold':'normal';
  el.style.fontStyle=item.italic?'italic':'normal';
  el.style.textDecoration=item.underline?'underline':'none';
  el.textContent=item.text||'Text';
  // Resize handle — Hit-Fläche bleibt, visuell unsichtbar
  const rh=document.createElement('div');
  rh.style.cssText='position:absolute;right:-10px;bottom:-10px;width:24px;height:24px;cursor:se-resize;z-index:9999;background:transparent;border:none;';
  rh.addEventListener('pointerdown',e=>{
    e.stopPropagation();e.preventDefault();
    rh.setPointerCapture(e.pointerId);
    _resizeActive=true;
    const resizePid=e.pointerId;
    const startSz=item.fontSize||18,sx=e.clientX,sy=e.clientY;
    const onM=ev=>{
      if(ev.pointerId!==resizePid) return;
      const delta=((ev.clientX-sx)+(ev.clientY-sy))/2;
      item.fontSize=Math.max(6,Math.round(startSz+delta/3));
      el.style.fontSize=item.fontSize+'px';
      scheduleSave();
    };
    const onU=ev=>{
      if(ev.pointerId!==resizePid) return;
      _resizeActive=false;
      rh.releasePointerCapture(resizePid);
      rh.removeEventListener('pointermove',onM);
      rh.removeEventListener('pointerup',onU);
      rh.removeEventListener('pointercancel',onU);
    };
    rh.addEventListener('pointermove',onM);
    rh.addEventListener('pointerup',onU);
    rh.addEventListener('pointercancel',onU);
  });
  el.appendChild(rh);
  // Doppeltipp-Erkennung für Maus, Touch und Stift
  let _tlTapTimer=null,_tlTapCount=0;
  el.addEventListener('pointerdown',e=>{
    if(e.button!==0&&e.button!==undefined) return;
    _tlTapCount++;
    if(_tlTapTimer) clearTimeout(_tlTapTimer);
    _tlTapTimer=setTimeout(()=>{_tlTapCount=0;},400);
    if(_tlTapCount>=2){e.stopPropagation();e.preventDefault();_tlTapCount=0;editTextLabel(item,el);}
  });
  el.addEventListener('dblclick',e=>{e.stopPropagation();editTextLabel(item,el);});
  return el;
}

function makeDraggable(el,item){
  el.addEventListener('pointerdown',e=>{
    if(S.tool==='pan') return;
    if(e.pointerType==='mouse'&&e.button!==0) return;
    // Im Zeichenmodus: kein Drag — Event an window-Handler durchlassen für Zeichnen
    if(DRAW_TOOLS.includes(S.tool)) return;
    if(_stylusActive&&e.pointerType==='touch'&&isDrawing) return;
    if(e.target.isContentEditable) return;
    if(e.target.tagName==='INPUT'){e.target.focus();return;}
    if(e.target.tagName==='TEXTAREA'&&document.activeElement===e.target) return;
    if(e.target.tagName==='BUTTON') return;
    if(e.target.tagName==='SELECT') return;
    if(e.target.tagName==='VIDEO') return;
    if(e.target.closest('video')) return;
    if(e.target.closest('.note-opt-panel')) return;
    if(e.target.closest('.folder-win-header')||e.target.closest('.folder-win-body')||e.target.closest('.folder-win-footer')) return;
    if(e.target.closest('.img-rh,.img-resize-h,.svg-resize-handle,.folder-resize-handle')) return;
    const layer=S.layers.find(l=>l.id===item.layerId);
    if(layer&&layer.locked) return;
    if(_itemPinchLocked) return;
    e.stopPropagation();
    _lassoStart=null;
    if(e.ctrlKey||e.metaKey){
      if(S.selectedIds.has(item.id)){
        S.selectedIds.delete(item.id);el.classList.remove('selected');
      } else {
        state_selectedAdd(item.id,el);
      }
      return;
    }
    if(!S.selectedIds.has(item.id)){
      clearSelection();state_selectedAdd(item.id,el);
    }
    bringToFront(item);

    const dragPointerId=e.pointerId;
    const isFolder=item.type==='folder';
    // KEIN setPointerCapture — lenkt pointermove vom window-Handler weg → Zeichnungen brechen ab
    // window-Listener (capture:true) funktioniert zuverlässig ohne Capture
    const useWindowListeners = true; // immer window-Listener

    const startX=e.clientX,startY=e.clientY;
    const startPositions=[...S.selectedIds].map(sid=>{
      const it=S.items.find(z=>z.id===sid);
      if(!it) return null;
      if(it.type==='folder'){
        // Position direkt aus DOM lesen — zuverlässiger als _screenX
        const domEl=$('item-'+sid);
        const sx=domEl?parseInt(domEl.style.left)||0:(it._screenX||0);
        const sy=domEl?parseInt(domEl.style.top)||0:(it._screenY||0);
        return {id:sid,x:sx,y:sy,isFolder:true};
      }
      return {id:sid,x:it.x,y:it.y,isFolder:false};
    }).filter(Boolean);
    let moved=false;
    let dragActive=true;

    const onMove=ev=>{
      if(ev.pointerId!==dragPointerId) return;
      if(!dragActive) return;
      if(_itemPinchLocked||[..._pointers.values()].filter(p=>p.type==='touch').length>=2){
        dragActive=false;
        startPositions.forEach(({id,x,y,isFolder:isFld})=>{
          const it=S.items.find(z=>z.id===id);const domEl=$('item-'+id);
          if(it&&domEl){
        if(isFld){it.x=x;it.y=y;domEl.style.left=x+'px';domEl.style.top=y+'px';}
          else{it.x=x;it.y=y;domEl.style.left=x+'px';domEl.style.top=y+'px';}
          }
        });
        document.querySelectorAll('.folder-item').forEach(f=>f.style.outline='');
        return;
      }
      const rawDx=ev.clientX-startX, rawDy=ev.clientY-startY;
      const canvasDx=rawDx/S.zoom, canvasDy=rawDy/S.zoom;
      moved=true;
      startPositions.forEach(({id,x,y,isFolder:isFld})=>{
        const it=S.items.find(z=>z.id===id);const domEl=$('item-'+id);
        if(!it||!domEl) return;
        const lyr=S.layers.find(l=>l.id===it.layerId);
        if(lyr&&lyr.locked) return;
        if(isFld){
          it._screenX=x+rawDx; it._screenY=y+rawDy;
          domEl.style.left=it._screenX+'px'; domEl.style.top=it._screenY+'px';
        } else {
          it.x=x+canvasDx;it.y=y+canvasDy;domEl.style.left=it.x+'px';domEl.style.top=it.y+'px';
        }
      });
      const draggingFileOrImg=[...S.selectedIds].some(sid=>{const it=S.items.find(x=>x.id===sid);return it&&['file','image'].includes(it.type);});
      document.querySelectorAll('.folder-item').forEach(f=>f.style.outline='');
      if(draggingFileOrImg&&moved){
        const hits=document.elementsFromPoint(ev.clientX,ev.clientY);
        const fh=hits.find(h=>h.classList&&(h.classList.contains('folder-item')||h.classList.contains('folder-icon-wrap')));
        if(fh){const fi=fh.classList.contains('folder-item')?fh:fh.closest('.folder-item');if(fi)fi.style.outline='2px solid var(--accent)';}
      }
    };
    const startPositions_undo=startPositions.map(p=>({...p}));
    const onUp=ev=>{
      if(ev.pointerId!==dragPointerId) return;
      try{ if(false) el.releasePointerCapture(dragPointerId); }catch(_){} // kein Capture mehr
      if(useWindowListeners){
        window.removeEventListener('pointermove',onMove);
        window.removeEventListener('pointerup',onUp);
        window.removeEventListener('pointercancel',onUp);
      } else {
        el.removeEventListener('pointermove',onMove);
        el.removeEventListener('pointerup',onUp);
        el.removeEventListener('pointercancel',onUp);
      }
      if(!dragActive) return;
      if(moved){
        // Undo: für Ordner _screenX/_screenY, für andere x/y
        const undoRef=startPositions_undo.find(p=>p.id===item.id);
        if(item.type==='folder'){
          pushUndo({type:'item-move',id:item.id,x:undoRef?undoRef.x:item._screenX,y:undoRef?undoRef.y:item._screenY,isFolder:true});
        } else {
          pushUndo({type:'item-move',id:item.id,x:undoRef?.x??item.x,y:undoRef?.y??item.y});
        }
        const hits=document.elementsFromPoint(ev.clientX,ev.clientY);
        let folderEl=hits.find(h=>h.classList&&(h.classList.contains('folder-item')||h.classList.contains('folder-icon-wrap')||h.classList.contains('folder-label')));
        if(!folderEl){
          const allFolderEls=document.querySelectorAll('.folder-item.item');
          let minDist=50;
          allFolderEls.forEach(fe=>{
            const r=fe.getBoundingClientRect();
            const cx=r.left+r.width/2,cy=r.top+r.height/2;
            const dist=Math.sqrt(Math.pow(ev.clientX-cx,2)+Math.pow(ev.clientY-cy,2));
            if(dist<minDist){minDist=dist;folderEl=fe;}
          });
        }
        if(folderEl){
          const folderDom=folderEl.classList.contains('folder-item')?folderEl:folderEl.closest('.folder-item');
          if(folderDom){
            const folderId=+folderDom.closest('.item')?.id?.replace('item-','');
            const folderItem=S.items.find(x=>x.id===folderId&&x.type==='folder');
            if(folderItem){
              [...S.selectedIds].forEach(sid=>{
                const sit=S.items.find(x=>x.id===sid);
                if(!sit||!['file','image'].includes(sit.type)) return;
                if(!folderItem.children) folderItem.children=[];
                const fo={name:sit.name||sit.type,fileData:sit.type==='image'?sit.src:sit.fileData};
                folderItem.children.push(fo);
                deleteItem(sit.id);
              });
              renderItem(folderItem);
              if(_folderWindows[folderItem.id]) _folderWindows[folderItem.id]._rebuild();
              scheduleSave();
              return;
            }
          }
        }
        scheduleSave();
      }
    };
    // Events auf el (normale Items) oder window (Ordner: position:fixed, kein Capture in WebView2)
    if(useWindowListeners){
      window.addEventListener('pointermove',onMove);
      window.addEventListener('pointerup',onUp);
      window.addEventListener('pointercancel',onUp);
    } else {
      el.addEventListener('pointermove',onMove);
      el.addEventListener('pointerup',onUp);
      el.addEventListener('pointercancel',onUp);
    }
  });
}

function addItemEvents(el,item){
  el.addEventListener('contextmenu',e=>{
    e.preventDefault();e.stopPropagation();
    if(!S.selectedIds.has(item.id)){clearSelection();state_selectedAdd(item.id,el);}
    showItemCtxMenu(e,item);
  });
  // Text-labels: clicking shows text picker with current values
  if(item.type==='text-label'){
    el.addEventListener('mousedown',e=>{
      if(e.button!==0||e.detail===2) return; // ignore right-click and dblclick
      // Sync text-picker to this item's values
      S.textSize=item.fontSize||18;S.textFont=item.font||'sans-serif';
      S.textColor=item.color||'#ffffff';S.textBold=!!item.bold;S.textItalic=!!item.italic;
      const sr=$('tp-size-range');if(sr) sr.value=Math.min(200,S.textSize);
      const sn=$('tp-size-num');if(sn) sn.value=S.textSize;
      const fs=$('tp-font-select');if(fs) fs.value=S.textFont;
      const tc=$('tp-custom');if(tc) tc.value=S.textColor;
      const bb=$('tp-bold');if(bb) bb.classList.toggle('active',S.textBold);
      const bi=$('tp-italic');if(bi) bi.classList.toggle('active',S.textItalic);
      // Open text picker - ensure font list is populated first
      const tp=$('text-picker');
      if(tp){
        // Populate font list if not already done (same logic as toggleTextPicker)
        const tpSel=$('tp-font-select');
        if(tpSel&&tpSel.options.length===0){
          const BUILTIN=BD_FONTS;
          function addOpts(list){list.forEach(f=>{const o=document.createElement('option');o.value=f;o.textContent=f;o.style.fontFamily=f;tpSel.appendChild(o);});}
          if(window.queryLocalFonts){
            window.queryLocalFonts().then(fonts=>{
              const names=[...new Set(fonts.map(f=>f.family))].sort();
              addOpts([...new Set([...BUILTIN,...names])].sort());
            }).catch(()=>addOpts(BUILTIN));
          } else { addOpts(BUILTIN); }
        }
        buildTextColorSwatches();
        tpSel.value=S.textFont||'sans-serif';
        tp.style.display='flex';tp.style.flexDirection='column';
      }
    });
  }
}

// ── FOLDER ──
function isImageFile(name){return /\.(jpg|jpeg|png|gif|webp|svg)$/i.test(name||'');}
function getFileSize(dataUrl){if(!dataUrl)return'';const b=Math.round((dataUrl.length*3/4)/1024);return b>1024?(b/1024).toFixed(1)+'MB':b+'KB';}

// ── Resize helper ──
function makeResizable(el,item,handle,onResize){
  handle.style.zIndex='9999';
  handle.addEventListener('pointerdown',e=>{
    e.stopPropagation();e.preventDefault();
    handle.setPointerCapture(e.pointerId);
    _resizeActive=true; // Canvas und Pinch einfrieren während Resize
    const resizePointerId=e.pointerId;
    const sw=el.offsetWidth,sh=el.offsetHeight,sx=e.clientX,sy=e.clientY;
    const onMove=ev=>{
      if(ev.pointerId!==resizePointerId) return;
      item.w=Math.max(60,sw+(ev.clientX-sx)/S.zoom);
      item.h=Math.max(40,sh+(ev.clientY-sy)/S.zoom);
      el.style.width=item.w+'px';
      el.style.height=item.h+'px';
      if(onResize) onResize(item.w,item.h);
      const pw=el.querySelector('.file-preview-wrap');
      if(pw) pw.style.height=(item.h-36)+'px';
    };
    const onUp=ev=>{
      if(ev.pointerId!==resizePointerId) return;
      _resizeActive=false; // Freigabe
      handle.releasePointerCapture(resizePointerId);
      handle.removeEventListener('pointermove',onMove);
      handle.removeEventListener('pointerup',onUp);
      handle.removeEventListener('pointercancel',onUp);
      scheduleSave();
    };
    handle.addEventListener('pointermove',onMove);
    handle.addEventListener('pointerup',onUp);
    handle.addEventListener('pointercancel',onUp);
  });
}

// ── Edit existing text label ──
function editTextLabel(item,el){
  const inp=document.createElement('input');
  const r=el.getBoundingClientRect();
  inp.value=item.text||'';
  inp.style.cssText='position:fixed;left:'+r.left+'px;top:'+r.top+'px;min-width:120px;max-width:400px;z-index:9000;background:rgba(22,24,28,.97);border:1.5px solid var(--accent);color:'+(item.color||'#fff')+';font-family:'+(item.font||'sans-serif')+';font-size:'+Math.round((item.fontSize||18)*S.zoom)+'px;padding:2px 6px;border-radius:5px;outline:none;';
  document.body.appendChild(inp);
  ensureKeyboard(inp);try{inp.select();}catch(_){}
  const rh=el.querySelector('div[style*="se-resize"]');
  const commit=()=>{
    const v=inp.value.trim();inp.remove();
    if(v){
      item.text=v;el.textContent=v;
      if(rh)el.appendChild(rh);
      scheduleSave();
    }
  };
  inp.addEventListener('keydown',e=>{e.stopPropagation();if(e.key==='Enter'){e.preventDefault();commit();}else if(e.key==='Escape'){inp.remove();}});
  inp.addEventListener('blur',()=>setTimeout(()=>{if(document.body.contains(inp))commit();},600));
  inp.addEventListener('mousedown',e=>{e.stopPropagation();e.preventDefault();inp.focus();});
  inp.addEventListener('pointerdown',e=>{e.stopPropagation();});
  // Canvas-blur-Guard: Input zum Body hinzufügen damit er erkannt wird
  inp.dataset.boarddeskInput='1';
}

// ── Text picker (font/size/color/style panel) ──
function toggleTextPicker(e){
  if(e) e.stopPropagation();
  const p=$('text-picker');if(!p) return;
  const showing=p.style.display==='flex'||p.style.display==='block';
  if(showing){p.style.display='none';return;}
  buildTextColorSwatches();
  const sr=$('tp-size-range');if(sr) sr.value=S.textSize||18;
  const sn=$('tp-size-num');if(sn) sn.value=S.textSize||18;
  const tc=$('tp-custom');if(tc) tc.value=S.textColor||'#ffffff';
  const bb=$('tp-bold');if(bb) bb.classList.toggle('active',!!S.textBold);
  const bi=$('tp-italic');if(bi) bi.classList.toggle('active',!!S.textItalic);
  p.style.display='flex';
  p.style.flexDirection='column';
  buildTextColorSwatches();
  // Populate font list (sync or async), then set selected value
  const sel=$('tp-font-select');
  function syncFontValue(){sel.value=S.textFont||'sans-serif';}
  if(sel&&sel.options.length===0){
    const BUILTIN=BD_FONTS;
    function addFonts(list){
      list.forEach(f=>{
        const o=document.createElement('option');o.value=f;o.textContent=f;o.style.fontFamily=f;
        sel.appendChild(o);
      });
      syncFontValue();
    }
    if(window.queryLocalFonts){
      window.queryLocalFonts().then(fonts=>{
        const names=[...new Set(fonts.map(f=>f.family))].sort();
        addFonts([...new Set([...BUILTIN,...names])].sort());
      }).catch(()=>addFonts(BUILTIN));
    } else { addFonts(BUILTIN); }
  } else { syncFontValue(); }
}
function buildTextColorSwatches(){
  const cont=$('tp-colors');if(!cont||cont.children.length>0) return;
  ['#ffffff','#000000','#ff4444','#ff9944','#ffdd44','#44ff88','#44ddff','#4488ff','#cc44ff','#ff44cc',
   '#00e5c3','#aaaaaa'].forEach(hex=>{
    const b=document.createElement('button');

    b.addEventListener('click',()=>{setTextColor(hex);const tc=$('tp-custom');if(tc)tc.value=hex;});

function setTextFont(v){

function setTextColor(v){

function toggleTextStyle(style){

  else if(style==='italic'){S.textItalic=!S.textItalic;$('tp-italic')?.classList.toggle('active',S.textItalic);}

// ── File/image viewer ──
function openViewer(itemId){
  const item=S.items.find(i=>i.id===itemId);if(!item) return;
  if(item.type==='image'){
    // Alle Bilder vom Canvas sammeln für Galerie-Navigation
    const allImgs=S.items.filter(i=>i.type==='image'&&i.src)
      .map(i=>({id:i.id,name:'',fileData:i.src})); // name leer → kein Dateiname
    const idx=allImgs.findIndex(i=>i.id===itemId);
    openViewerMulti(allImgs,Math.max(0,idx));
  } else if(item.type==='file'&&item.fileData){
    // Alle Dateien vom Canvas für Navigation
    const allFiles=S.items.filter(i=>i.type==='file'&&i.fileData)
      .map(i=>({...i}));
    const idx=allFiles.findIndex(i=>i.id===itemId);
    openViewerMulti(allFiles,Math.max(0,idx));
  }
}
function openViewerMulti(files,startIdx){
  const ov=$('viewer-overlay');if(!ov) return;
  let cur=Math.max(0,Math.min(files.length-1,startIdx||0));
  function show(idx){
    cur=Math.max(0,Math.min(files.length-1,idx));
    const f=files[cur];
    const title=$('viewer-title');
    // Kein Dateiname für Bilder (name=''), Navigation mit Pfeiltasten
    if(title) title.textContent=f.name?(f.name+' ('+(cur+1)+'/'+files.length+')'):(files.length>1?((cur+1)+' / '+files.length):'');
    const body=$('viewer-body');if(!body) return;
    body.innerHTML='';
    const data=f.fileData||f.src||'';
    const name=(f.name||'').toLowerCase();
    if(/\.(jpg|jpeg|png|gif|webp|svg)$/i.test(name)||data.startsWith('data:image')){
      const img=document.createElement('img');
      img.src=data;
      img.style.cssText='max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain;display:block;';
      body.style.cssText='position:absolute;inset:46px 0 0 0;display:flex;align-items:center;justify-content:center;background:#000;overflow:hidden;padding:0;';
      body.appendChild(img);
    } else if(/\.pdf$/i.test(name)||data.startsWith('data:application/pdf')){
      // PDF.js-Viewer: funktioniert mit data:-URLs, kein Plugin nötig
      const wrap=document.createElement('div');
      wrap.style.cssText='width:92vw;height:84vh;';
      const loadMsg=document.createElement('div');
      loadMsg.style.cssText='color:var(--text-dim);font-family:var(--mono);font-size:12px;padding:20px;';
      loadMsg.textContent='PDF wird geladen…';
      wrap.appendChild(loadMsg);
      body.appendChild(wrap);
      buildPdfViewer(data, f.name||'dokument.pdf', '84vh').then(viewer=>{
        loadMsg.remove();
        wrap.appendChild(viewer);
      }).catch(err=>{
        loadMsg.textContent='PDF-Fehler: '+err.message;
      });
    } else if(/\.(mp4|mov|webm|m4v|mpeg|mpg|avi)$/i.test(name)){
      // Video-Vollbild-Viewer
      const wrap=document.createElement('div');
      wrap.style.cssText='width:92vw;max-width:1200px;display:flex;flex-direction:column;gap:8px;';
      if(!data||data==='__video_session_only__'){
        // Video nicht mehr im Speicher
        const msg=document.createElement('div');
        msg.style.cssText='color:var(--text-dim);font-family:var(--mono);font-size:12px;text-align:center;padding:40px;';
        msg.textContent='⚠ Video nicht im Speicher — bitte auf dem Canvas erneut verknüpfen.';
        wrap.appendChild(msg);
      } else {
        const vid=document.createElement('video');
        vid.controls=true;
        vid.autoplay=false;
        vid.playsInline=true;
        vid.style.cssText='width:100%;max-height:78vh;border-radius:8px;background:#000;outline:none;';
        // Blob-URL für Tauri-Kompatibilität
        try{
          const _m=videoMime(f.name||'');
          const _b=new Blob([Uint8Array.from(atob(data.split(',')[1]),c=>c.charCodeAt(0))],{type:_m});
          const _u=URL.createObjectURL(_b);
          vid.src=_u;
          vid.addEventListener('emptied',()=>URL.revokeObjectURL(_u),{once:true});
        }catch(_e){
          vid.src=data; // Fallback für Browser
        }
        vid.addEventListener('pointerdown',e=>e.stopPropagation());
        vid.addEventListener('click',e=>e.stopPropagation());
        const dl=document.createElement('a');
        dl.href=data;dl.download=f.name||'video.mp4';
        dl.style.cssText='align-self:flex-end;font-size:11px;font-family:var(--mono);color:var(--accent);text-decoration:none;padding:3px 10px;border:1px solid var(--accent);border-radius:5px;';
        dl.textContent='⬇ Video';
        wrap.appendChild(vid);wrap.appendChild(dl);
      }
      body.appendChild(wrap);
    } else {
      const p=document.createElement('p');
      p.style.cssText='color:var(--text-dim);font-family:var(--mono);font-size:12px;text-align:center;padding:40px;';
      p.textContent='Keine Vorschau verfügbar: '+(f.name||'Datei');
      body.appendChild(p);
    }
    const prev=$('viewer-prev');const next=$('viewer-next');
    if(prev) prev.style.display=files.length>1?'':'none';
    if(next) next.style.display=files.length>1?'':'none';
    // onclick handlers referenzieren window._viewerShow (gesetzt unten)
  }
  window._viewerShow=(delta)=>show(cur+delta);
  show(cur);
  ov.style.display='flex';
  ov.style.flexDirection='column';
  ov.addEventListener('click',e=>{if(e.target===ov)closeViewer();},{once:false});
  // Wire up resize handle
  const vrh=document.getElementById('viewer-resize-handle');
  const vbody=document.getElementById('viewer-body');
  if(vrh&&vbody){
    vrh.addEventListener('pointerdown',e=>{
      e.stopPropagation();e.preventDefault();
      vrh.setPointerCapture(e.pointerId);
      _resizeActive=true;
      const pid=e.pointerId;
      const startW=vbody.offsetWidth||window.innerWidth*0.9;
      const startH=vbody.offsetHeight||window.innerHeight*0.8;
      const sx=e.clientX, sy=e.clientY;
      const onM=ev=>{
        if(ev.pointerId!==pid) return;
        const newW=Math.max(300,startW+(ev.clientX-sx));
        const newH=Math.max(200,startH+(ev.clientY-sy));
        vbody.style.maxWidth='none';vbody.style.width=newW+'px';
        vbody.style.maxHeight='none';vbody.style.height=newH+'px';
        const ifr=vbody.querySelector('iframe');
        if(ifr){ifr.style.width=newW+'px';ifr.style.height=(newH-60)+'px';}
      };
      const onU=ev=>{
        if(ev.pointerId!==pid) return;
        _resizeActive=false;
        vrh.releasePointerCapture(pid);
        vrh.removeEventListener('pointermove',onM);
        vrh.removeEventListener('pointerup',onU);
        vrh.removeEventListener('pointercancel',onU);
      };
      vrh.addEventListener('pointermove',onM);vrh.addEventListener('pointerup',onU);vrh.addEventListener('pointercancel',onU);
    });
  }
  // Show drawing overlay if a draw tool is active
  if(DRAW_TOOLS.includes(S.tool)) showViewerDrawOverlay();
}


// ── Drawing overlay for file viewer ──
let _viewerDrawSvg = null;
let _viewerDrawEl = null;
let _viewerDrawStart = null;
let _viewerIsDrawing = false;

function showViewerDrawOverlay(){
  if(_viewerDrawSvg) return _viewerDrawSvg;
  const ov=$('viewer-overlay');if(!ov)return null;
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.style.cssText='position:absolute;top:60px;left:0;right:0;bottom:0;z-index:200;cursor:crosshair;touch-action:none;pointer-events:all;';
  svg.setAttribute('xmlns','http://www.w3.org/2000/svg');
  svg.appendChild(document.createElementNS('http://www.w3.org/2000/svg','defs'));
  ov.style.position='fixed';
  ov.appendChild(svg);
  _viewerDrawSvg=svg;

  function vpt(e){const r=svg.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top};}

  function startDraw(e){
    const below=document.elementsFromPoint(e.clientX,e.clientY).find(el=>el!==svg&&!svg.contains(el));
    if(below&&below.closest('#viewer-header,#viewer-resize-handle,button,a,input,select')) return;
    if(!DRAW_TOOLS.includes(S.tool)||S.tool==='eraser') {
      if(S.tool==='eraser'){
        const hits=document.elementsFromPoint(e.clientX,e.clientY);
        hits.forEach(h=>{if(svg.contains(h)&&h.tagName!=='svg'&&h.tagName!=='defs')h.remove();});
      }
      return;
    }
    e.stopPropagation();e.preventDefault();
    _viewerIsDrawing=true;
    const p=vpt(e);_viewerDrawStart=p;
    const attrs=strokeAttrs();
    if(S.tool==='pen') _viewerDrawEl=svgEl('path',{...attrs,d:`M${p.x} ${p.y}`});
    else if(S.tool==='line'||S.tool==='arrow') _viewerDrawEl=svgEl('line',{...attrs,x1:p.x,y1:p.y,x2:p.x,y2:p.y});
    else if(S.tool==='rect') _viewerDrawEl=svgEl('rect',{...attrs,x:p.x,y:p.y,width:0,height:0,rx:4});
    else if(S.tool==='circle') _viewerDrawEl=svgEl('ellipse',{...attrs,cx:p.x,cy:p.y,rx:0,ry:0});
    if(_viewerDrawEl) svg.appendChild(_viewerDrawEl);
  }
  function moveDraw(e){
    if(!_viewerIsDrawing||!_viewerDrawEl) return;
    const p=vpt(e),s=_viewerDrawStart;
    if(S.tool==='pen') _viewerDrawEl.setAttribute('d',_viewerDrawEl.getAttribute('d')+` L${p.x} ${p.y}`);
    else if(S.tool==='line'||S.tool==='arrow'){_viewerDrawEl.setAttribute('x2',p.x);_viewerDrawEl.setAttribute('y2',p.y);}
    else if(S.tool==='rect'){
      _viewerDrawEl.setAttribute('x',Math.min(p.x,s.x));_viewerDrawEl.setAttribute('y',Math.min(p.y,s.y));
      _viewerDrawEl.setAttribute('width',Math.abs(p.x-s.x));_viewerDrawEl.setAttribute('height',Math.abs(p.y-s.y));
    }
    else if(S.tool==='circle'){
      _viewerDrawEl.setAttribute('cx',s.x+(p.x-s.x)/2);_viewerDrawEl.setAttribute('cy',s.y+(p.y-s.y)/2);
      _viewerDrawEl.setAttribute('rx',Math.abs(p.x-s.x)/2);_viewerDrawEl.setAttribute('ry',Math.abs(p.y-s.y)/2);
    }
  }
  function endDraw(){_viewerIsDrawing=false;_viewerDrawEl=null;_viewerDrawStart=null;}

  // Use svg-level events for reliable capture
  svg.addEventListener('pointerdown',startDraw,{passive:false});
  window.addEventListener('pointermove',e=>{if(_viewerIsDrawing)moveDraw(e);});
  window.addEventListener('pointerup',e=>{if(_viewerIsDrawing)endDraw();});
  return svg;
}

function hideViewerDrawOverlay(){
  if(_viewerDrawSvg){ _viewerDrawSvg.remove(); _viewerDrawSvg=null; }
  _viewerIsDrawing=false;_viewerDrawEl=null;_viewerDrawStart=null;
}

function closeViewer(){
  const ov=$('viewer-overlay');if(ov) ov.style.display='none';
  hideViewerDrawOverlay();
}

// ── Render folder as closed icon on canvas ──
function renderFolder(item){
  const el=document.createElement('div');el.className='folder-item';
  const wrap=document.createElement('div');wrap.className='folder-icon-wrap';
  wrap.textContent='📁';
  const lbl=document.createElement('div');lbl.className='folder-label';
  lbl.textContent=item.name||'Ordner';
  el.appendChild(wrap);el.appendChild(lbl);

  // Double-click/tap → open folder window
  el.addEventListener('dblclick',e=>{e.stopPropagation();openFolderWindow(item);});
  let _ftap=0;
  el.addEventListener('click',e=>{
    if(e.pointerType==='mouse') return;
    const now=Date.now();
    if(now-_ftap<400){openFolderWindow(item);_ftap=0;}
    else _ftap=now;
  });

  // ── Standalone drag handler für Ordner ──
  // Nutzt window-Listener statt setPointerCapture (WebView2-kompatibel)
  let _dragActive=false;
  let _dragPid=null;
  let _dragStartX=0,_dragStartY=0;
  let _dragStartLeft=0,_dragStartTop=0;

  el.addEventListener('pointerdown',e=>{
    if(e.pointerType==='mouse'&&e.button!==0) return;
    if(S.tool==='pan') return;
    const layer=S.layers.find(l=>l.id===item.layerId);
    if(layer&&layer.locked) return;
    e.stopPropagation();
    e.preventDefault();

    // Selektion setzen
    if(!S.selectedIds.has(item.id)){ clearSelection();state_selectedAdd(item.id,el); }
    else { /* schon selektiert */ }

    _dragActive=true;
    _dragPid=e.pointerId;
    _dragStartX=e.clientX;
    _dragStartY=e.clientY;
    _dragStartLeft=parseInt(el.style.left)||item._screenX||0;
    _dragStartTop=parseInt(el.style.top)||item._screenY||0;

    const onMove=ev=>{
      if(ev.pointerId!==_dragPid) return;
      if(!_dragActive) return;
      const dx=ev.clientX-_dragStartX;
      const dy=ev.clientY-_dragStartY;
      const newLeft=_dragStartLeft+dx;
      const newTop=_dragStartTop+dy;
      el.style.left=newLeft+'px';
      el.style.top=newTop+'px';
      item._screenX=newLeft;
      item._screenY=newTop;
      // Canvas-Koordinaten synchronisieren
      const r=canvasWrap.getBoundingClientRect();
      item.x=Math.round((newLeft-r.left-S.panX)/S.zoom);
      item.y=Math.round((newTop-r.top-S.panY)/S.zoom);
    };
    const onUp=ev=>{
      if(ev.pointerId!==_dragPid) return;
      _dragActive=false;
      window.removeEventListener('pointermove',onMove);
      window.removeEventListener('pointerup',onUp);
      window.removeEventListener('pointercancel',onUp);
      scheduleSave();
    };
    window.addEventListener('pointermove',onMove);
    window.addEventListener('pointerup',onUp);
    window.addEventListener('pointercancel',onUp);
  });

  return el;
}


// Smart tap vs drag for folder items
// Single tap = select, double tap = open, drag = move to canvas
let _folderTapTimer = null;
let _folderTapCount = 0;
let _folderTapTarget = null;
// Pro-Ordner-Selektion: Map<folderId, Set<fi>>
const _folderSel = {};
function getFolderSel(folderId){ if(!_folderSel[folderId]) _folderSel[folderId]=new Set(); return _folderSel[folderId]; }
function clearFolderSel(folderId){
  const s=_folderSel[folderId]; if(!s) return;
  s.clear();
  // Visuelles Reset
  document.querySelectorAll('.fwin-icon.fwin-multi-sel,.fwin-row.fwin-multi-sel').forEach(el=>{
    el.classList.remove('fwin-multi-sel');
    el.style.outline='';
  });
  _updateFolderSelBar(folderId);
}
function _updateFolderSelBar(folderId){
  const bar=document.getElementById('fwin-sel-bar-'+folderId);
  if(!bar) return;
  const n=getFolderSel(folderId).size;
  if(n>1){
    bar.style.display='flex';
    const cnt=bar.querySelector('.fwin-sel-count');
    if(cnt) cnt.textContent=n+' ausgewählt';
  } else { bar.style.display='none'; }
}

function _startItemTapOrDrag(e, el, folder, fi, rebuildWin){
  const startX=e.clientX, startY=e.clientY;
  let dragging=false;
  _cancelLongPress();

  // Ctrl/Cmd+Tap (Tastatur) → Toggle-Selektion
  if(e.ctrlKey||e.metaKey){
    const sel=getFolderSel(folder.id);
    if(sel.has(fi)){ sel.delete(fi); el.classList.remove('fwin-multi-sel'); el.style.outline=''; }
    else { sel.add(fi); el.classList.add('fwin-multi-sel'); el.style.outline='1px solid var(--accent)'; }
    _updateFolderSelBar(folder.id);
    return;
  }
  // Wenn Auswahl-Modus aktiv (>0 Items selektiert): normaler Tap togglet
  if(getFolderSel(folder.id).size>0){
    const sel=getFolderSel(folder.id);
    if(sel.has(fi)){ sel.delete(fi); el.classList.remove('fwin-multi-sel'); el.style.outline=''; }
    else { sel.add(fi); el.classList.add('fwin-multi-sel'); el.style.outline='1px solid var(--accent)'; }
    _updateFolderSelBar(folder.id);
    return;
  }
  // Normaler Tap ohne aktiven Modus: Multi-Selektion löschen
  clearFolderSel(folder.id);

  // Long-Press (500ms) → Auswahl-Modus starten (Touch/Stift)
  let _lpTimer=setTimeout(()=>{
    _lpTimer=null;
    // Vibration-Feedback wenn verfügbar
    if(navigator.vibrate) navigator.vibrate(40);
    const sel=getFolderSel(folder.id);
    sel.add(fi);
    el.classList.add('fwin-multi-sel');
    el.style.outline='1px solid var(--accent)';
    _updateFolderSelBar(folder.id);
    // Long-Press-Flash als visuelles Feedback
    el.style.background='rgba(0,229,195,.2)';
    setTimeout(()=>el.style.background='',300);
  }, 500);

  let _lastEvT=0;
  const DRAG_THRESHOLD = e.pointerType==='mouse' ? 10000 : 400; // Touch/Pen: 20px
  const onMove=ev=>{
    if(ev.pointerId!==e.pointerId) return;
    const t=ev.timeStamp||Date.now();
    if(Math.abs(t-_lastEvT)<1) return;
    _lastEvT=t;
    const dx=ev.clientX-startX, dy=ev.clientY-startY;
    if(dx*dx+dy*dy > 36){
      if(_lpTimer){ clearTimeout(_lpTimer); _lpTimer=null; }
    }
    if(!dragging && dx*dx+dy*dy > DRAG_THRESHOLD){
      dragging=true;
      clearTimeout(_folderTapTimer);
      _folderTapTimer=null;
      startFolderDragOut(e, folder, fi, rebuildWin);
    }
    if(dragging) updateFolderDragOut(ev);
  };
  const onUp=ev=>{
    if(ev.pointerId!==e.pointerId) return;
    if(_lpTimer){ clearTimeout(_lpTimer); _lpTimer=null; }
    window.removeEventListener('pointermove', onMove);
    window.removeEventListener('pointerup', onUp);
    window.removeEventListener('pointercancel', onUp);
    el.removeEventListener('pointermove', onMove);
    el.removeEventListener('pointerup', onUp);
    el.removeEventListener('pointercancel', onUp);
    if(dragging){ endFolderDragOut(ev); return; }
    if(_folderTapTarget===el && _folderTapTimer){
      clearTimeout(_folderTapTimer);
      _folderTapTimer=null;
      _folderTapTarget=null;
      _folderTapCount=0;
      openFolderFileViewer(folder, fi);
    } else {
      clearTimeout(_folderTapTimer);
      _folderTapTarget=el;
      _folderTapCount=1;
      el.style.outline='1px solid var(--accent)';
      _folderTapTimer=setTimeout(()=>{
        _folderTapTimer=null; _folderTapTarget=null; _folderTapCount=0;
        el.style.outline='';
      }, 350);
    }
  };
  // Auf window UND el registrieren — Touch-Drag verlässt das Folder-Fenster → window-Listener nötig
  el.addEventListener('pointermove', onMove);
  el.addEventListener('pointerup', onUp);
  el.addEventListener('pointercancel', onUp);
  window.addEventListener('pointermove', onMove);
  window.addEventListener('pointerup', onUp);
  window.addEventListener('pointercancel', onUp);
}

  function buildListView(body,files,item){
    const list=document.createElement('div');list.className='folder-list-view';
    if(files.length===0){list.innerHTML='<div style="color:var(--text-dimmer);font-size:11px;font-family:var(--mono);padding:10px">Noch keine Dateien</div>';}

      } else {
        const [ic,cl]=getFileIcon(name);const em=document.createElement('span');em.className='fwin-row-icon';em.textContent=ic;em.style.color=cl;row.appendChild(em);
      }
      // Name
      const nm=document.createElement('span');nm.className='fwin-row-name';nm.textContent=name;
      nm.addEventListener('dblclick',e=>{e.stopPropagation();startRenameFile(nm,fo,item,rebuildWin);});
      row.appendChild(nm);
      // Size
      const sz=document.createElement('span');sz.className='fwin-row-size';sz.textContent=getFileSize(fo.fileData);row.appendChild(sz);
      // Smart tap vs drag handler
      row.addEventListener('pointerdown',e=>{

      list.appendChild(row);

  }

  const _origRebuild=rebuildWin;
  // Nach jedem Rebuild: Selektions-Highlighting wiederherstellen
  win._rebuild=function(){
    _origRebuild();
    const sel=getFolderSel(item.id);
    if(sel.size>0){
      win.querySelectorAll('[data-fi]').forEach(el=>{
        const fi=+el.dataset.fi;

  rebuildWin();
  // Append to itemsLayer so it's part of canvas
  document.body.appendChild(win);
  // Store rebuildWin for external use
  win._rebuild=rebuildWin;
  win.addEventListener('mousedown',e=>e.stopPropagation());
  win.addEventListener('pointerdown',e=>e.stopPropagation());
  return win;
}

function makeDragWindow(handle,win,item){
  const onPD=e=>{
    if(e.target.tagName==='BUTTON') return;
    e.stopPropagation();e.preventDefault();
    handle.setPointerCapture(e.pointerId);
    const pid=e.pointerId;
    const sx=e.clientX-win.offsetLeft,sy=e.clientY-win.offsetTop;
    const onM=ev=>{if(ev.pointerId!==pid)return;win.style.left=(ev.clientX-sx)+'px';win.style.top=(ev.clientY-sy)+'px';};
    const onU=ev=>{
      if(ev.pointerId!==pid)return;
      handle.releasePointerCapture(pid);
      handle.removeEventListener('pointermove',onM);
      handle.removeEventListener('pointerup',onU);
      handle.removeEventListener('pointercancel',onU);
    };
    handle.addEventListener('pointermove',onM);
    handle.addEventListener('pointerup',onU);
    handle.addEventListener('pointercancel',onU);
  };
  handle.addEventListener('pointerdown',onPD);
}

function startRenameFile(nm,fo,folder,onDone){
  const old=fo.name||'Datei';
  const inp=document.createElement('input');
  inp.className=nm.className+' editing';
  inp.value=old;inp.style.cssText=nm.style.cssText;
  nm.replaceWith(inp);ensureKeyboard(inp);try{inp.select();}catch(_){}
  const commit=()=>{
    const v=inp.value.trim()||old;fo.name=v;
    scheduleSave();onDone();
  };
  inp.addEventListener('keydown',e=>{e.stopPropagation();if(e.key==='Enter')commit();if(e.key==='Escape'){inp.value=old;commit();}});
  inp.addEventListener('blur',commit,{once:true});
}

function addFileToFolder(folderId){
  ctxMenu.style.display='none';
  window._folderUploadId=folderId;
  window._openFileInput('folder-file-input','',true,function(e){
    var folder=S.items.find(function(i){return i.id===window._folderUploadId;});
    if(!folder||!e.target.files.length)return;
    var files=Array.from(e.target.files);
    var pending=files.length;
    files.forEach(function(file){
      var reader=new FileReader();
      reader.onload=function(ev){
        var raw=ev.target.result;
        function finish(data){
          if(!folder.children)folder.children=[];
          folder.children.push({name:file.name,fileData:data});
          pending--;
          if(pending===0){
            renderItem(folder);
            if(_folderWindows[folder.id]) _folderWindows[folder.id]._rebuild();
            scheduleSave();
          }
        }
        if(raw.startsWith('data:image')){
          compressImage(raw,IMG_MAX_PX,IMG_QUALITY,finish);
        } else { finish(raw); }
      };
      reader.readAsDataURL(file);
    });
  });
}

function startFolderDragOut(e,folder,fi,onDone){
  if(S.tool==='pan') return;
  const f=folder.children[fi];
  const name=typeof f==='object'?f.name:f;
  _cancelLongPress();
  fdDrag={folderId:folder.id,fileIdx:fi,fileObj:f,name,startX:e.clientX,startY:e.clientY,onDone};
  dragGhost.textContent='📄 '+name;
  dragGhost.style.display='block';
  dragGhost.style.left=e.clientX+14+'px';
  dragGhost.style.top=e.clientY-10+'px';
  document.body.style.cursor='grabbing';
}

function endFolderDragOut(e){
  if(!fdDrag) return;
  document.body.style.cursor='';
  const dx=Math.abs(e.clientX-fdDrag.startX),dy=Math.abs(e.clientY-fdDrag.startY);
  if(dx>15||dy>15){
    // Prüfen ob Drop-Punkt im Canvas-Bereich liegt (per Koordinaten, nicht e.target)
    const cr=canvasWrap.getBoundingClientRect();
    const onCanvas=e.clientX>=cr.left&&e.clientX<=cr.right&&e.clientY>=cr.top&&e.clientY<=cr.bottom;
    if(onCanvas){
      const p=cpt(e);
      const folder=S.items.find(i=>i.id===fdDrag.folderId);
      if(folder){
        const fo=fdDrag.fileObj;
        const name=fdDrag.name;
        let newCanvasItem;
        try {
          if(typeof fo==='object'&&fo.fileData&&isImageFile(name)){
            const iw=200,ih=150;
            newCanvasItem=createItem('image',{src:fo.fileData,name,x:p.x-iw/2,y:p.y-ih/2,w:iw,h:ih});
          } else {
            const fw=110,fh=110;
            const newItem={name,x:p.x-fw/2,y:p.y-fh/2};
            if(typeof fo==='object'&&fo.fileData) newItem.fileData=fo.fileData;
            newCanvasItem=createItem('file',newItem);
          }
          folder.children.splice(fdDrag.fileIdx,1);
          renderItem(folder);
          if(_folderWindows[folder.id]) _folderWindows[folder.id]._rebuild();
          scheduleSave();
        } catch(err){ console.error('Folder drag failed:', err); }
      }
    }
  }
  dragGhost.style.display='none';
  canvasWrap.style.outline='';
  document.querySelectorAll('.fwin-icon,.fwin-row').forEach(c=>c.style.opacity='');
  window._lastFolderDragEnd = Date.now();
  fdDrag=null;
}

function moveFolderFileToCnv(folderId,fi){
  const folder=S.items.find(i=>i.id===folderId);
  if(!folder) return;
  const fo=folder.children[fi];const name=typeof fo==='object'?fo.name:fo;
  const pos=centerPos();
  folder.children.splice(fi,1);
  renderItem(folder);
  if(_folderWindows[folder.id]) _folderWindows[folder.id]._rebuild();
  if(typeof fo==='object'&&fo.fileData&&isImageFile(name)){
    const item=createItem('image',{src:fo.fileData,name,x:pos.x-100,y:pos.y-75,w:200,h:150});ensureVisible(item);
  } else {
    const newItem={name,x:pos.x-45,y:pos.y-55};
    if(typeof fo==='object'&&fo.fileData) newItem.fileData=fo.fileData;
    const item=createItem('file',newItem);ensureVisible(item);
  }
  scheduleSave();
}

  folder.children.splice(fi,1);

function bringToFront(item){
  const sameLayer=S.items.filter(i=>i.layerId===item.layerId&&i.type!=='folder');
  const maxZ=Math.max(...sameLayer.map(i=>i.z||0),0);
  if(item.z===maxZ+1) return; // already at front — skip DOM mutation
  item.z=maxZ+1;
  // Nur das Element selbst updaten — kein vollständiges applyLayerOrder
  // (verhindert cvs.appendChild(dl) Reflow der andere Elemente visuell verschiebt)
  const el=$('item-'+item.id);
  if(el){
    const layerIdx=S.layers.findIndex(l=>l.id===item.layerId);
    const isSelected=S.selectedIds.has(item.id);
    if(item.type==='folder') el.style.zIndex='0';
    else if(item.type==='file'&&!isSelected) el.style.zIndex='3';
    else el.style.zIndex=String((layerIdx>=0?layerIdx+1:1)*1000+(item.z||1)+(isSelected?500:0));
  }
  scheduleRenderLayerList();
  scheduleSave();
}

document.addEventListener('keydown',e=>{

// ── Image compression ──
function compressImage(dataUrl, maxSize, quality, callback){
  const img = new Image();
  img.onload = () => {
    let w = img.naturalWidth, h = img.naturalHeight;
    if(w <= maxSize && h <= maxSize){
      // Already small enough, but re-encode as JPEG if PNG and large
      if(dataUrl.startsWith('data:image/png') && dataUrl.length > 200000){
        const c = document.createElement('canvas');
        c.width=w; c.height=h;
        c.getContext('2d').drawImage(img,0,0);
        callback(c.toDataURL('image/jpeg', quality));
        return;
      }
      callback(dataUrl);
      return;
    }
    // Scale down
    const scale = maxSize / Math.max(w, h);
    w = Math.round(w * scale);
    h = Math.round(h * scale);
    const c = document.createElement('canvas');
    c.width=w; c.height=h;
    const ctx = c.getContext('2d');
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    ctx.drawImage(img, 0, 0, w, h);
    callback(c.toDataURL('image/jpeg', quality));
  };
  img.onerror = () => callback(dataUrl);
  img.src = dataUrl;
}
// Default compression settings (user-adjustable via settings)
const IMG_MAX_PX = 900;    // max pixels on longest side
const IMG_QUALITY = 0.65;  // JPEG quality — balance of quality/size

function handleImageUpload(event){
  Array.from(event.target.files).forEach((file,i)=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      compressImage(ev.target.result, IMG_MAX_PX, IMG_QUALITY, compressed=>{
        const pos=centerPos(i*40, i*40);
        // Calculate display size from actual compressed dimensions
        const tmp=new Image();
        tmp.onload=()=>{
          const aspect=tmp.naturalHeight/tmp.naturalWidth;
          const w=Math.min(320, tmp.naturalWidth);
          const h=Math.round(w*aspect);
          const item=createItem('image',{src:compressed,name:file.name,x:pos.x-w/2,y:pos.y-h/2,w,h,aspect});
          ensureVisible(item);
        };
        tmp.onerror=()=>{
          const item=createItem('image',{src:compressed,name:file.name,x:pos.x-100,y:pos.y-75,w:200,h:150});
          ensureVisible(item);
        };
        tmp.src=compressed;
      });
    };
    reader.readAsDataURL(file);
  });
  event.target.value='';
}

// ── Mouse-based drag for layer items ──
let _layerDrag=null; // {data, ghost, startY, startX}
function _startLayerItemDrag(e,data,labelText){
  e.preventDefault();e.stopPropagation();
  const ghost=document.createElement('div');
  ghost.style.cssText='position:fixed;z-index:9999;background:var(--surface2);border:1px solid var(--accent);border-radius:5px;padding:4px 10px;font-size:10px;font-family:var(--mono);color:var(--accent);pointer-events:none;opacity:.9;white-space:nowrap;';
  ghost.textContent=labelText;
  document.body.appendChild(ghost);
  const _gx=e.touches?e.touches[0].clientX:e.clientX;
  const _gy=e.touches?e.touches[0].clientY:e.clientY;
  ghost.style.left=_gx+12+'px';ghost.style.top=_gy-10+'px';
  _layerDrag={data,ghost};
  const onMove=ev=>{
    ghost.style.left=ev.clientX+12+'px';ghost.style.top=ev.clientY-10+'px';
    document.querySelectorAll('.layer-row,.layer-item-row,.layer-items-list').forEach(el=>{
      const r=el.getBoundingClientRect();
      const over=ev.clientX>=r.left&&ev.clientX<=r.right&&ev.clientY>=r.top&&ev.clientY<=r.bottom;
      el.style.outline=over?'1px solid var(--accent)':'';
    });
  };
  const onUp=ev=>{
    ghost.remove();_layerDrag=null;
    window.removeEventListener('pointermove',onMove);
    window.removeEventListener('pointerup',onUp);
    window.removeEventListener('pointercancel',onUp);
    document.querySelectorAll('.layer-row,.layer-item-row,.layer-items-list').forEach(el=>el.style.outline='');
    // Find drop target row
    const hits=document.elementsFromPoint(ev.clientX,ev.clientY);
    const targetEl=hits.find(el=>
      el.classList.contains('layer-item-row')||
      el.classList.contains('layer-row')||
      el.classList.contains('layer-items-list')
    );
    if(!targetEl) return;
    const toLayerId=+(targetEl.dataset.layerId);
    if(!toLayerId) return;
    // Target item (for reordering within layer)
    const toItemId=targetEl.dataset.itemId!=null ? +targetEl.dataset.itemId : null;
    const toDid=targetEl.dataset.did||null;

    if(data.itemId!=null){
      const it=S.items.find(x=>x.id===data.itemId);
      if(!it) return;
      if(it.layerId===toLayerId && toItemId!=null && toItemId!==data.itemId){
        // Reorder innerhalb der Ebene:
        // Liste zeigt oben = höchstes z. Droppen AUF ein Element
        // bedeutet: dragged Item bekommt z des Ziel-Items,
        // Ziel und alles dazwischen wird um 1 verschoben.
        const toItem=S.items.find(x=>x.id===toItemId);
        if(toItem){
          const fromZ=it.z||1;
          const toZ=toItem.z||1;
          const layerItems=S.items.filter(x=>x.layerId===toLayerId);
          if(fromZ>toZ){
            // Nach unten verschieben: alles zwischen toZ und fromZ um +1
            layerItems.forEach(x=>{
              if((x.z||1)>=toZ&&(x.z||1)<fromZ&&x.id!==it.id) x.z=(x.z||1)+1;
            });
          } else {
            // Nach oben verschieben: alles zwischen fromZ und toZ um -1
            layerItems.forEach(x=>{
              if((x.z||1)>fromZ&&(x.z||1)<=toZ&&x.id!==it.id) x.z=(x.z||1)-1;
            });
          }
          it.z=toZ;
          applyLayerOrder();
        }
      } else if(it.layerId!==toLayerId){
        // Move to different layer
        it.layerId=toLayerId;
        renderItem(it);
        applyLayerOrder();
      }
    } else if(data.did){
      const el=S.drawings.find(x=>x.dataset.did===data.did);
      if(el){
        el.setAttribute('data-lid',toLayerId);
        ensureLayerSvg(toLayerId).appendChild(el);
      }
    }
    renderLayerList();scheduleSave();
  };
  window.addEventListener('pointermove',onMove);
  window.addEventListener('pointerup',onUp);
}

function addLayer(){

function applyLayerOrder(){
  const drawingActive=DRAW_TOOLS.includes(S.tool);
  S.layers.forEach((layer,i)=>{
    S.items.filter(it=>it.layerId===layer.id).forEach(it=>{
      const el=$('item-'+it.id);
      if(el){
        const isSelected=S.selectedIds.has(it.id);
        if(it.type==='folder'){
          if(el.style.zIndex!=='0') el.style.zIndex='0';
        } else if(it.type==='file'&&!isSelected){
          if(el.style.zIndex!=='3') el.style.zIndex='3';
        } else {
          const z=String((i+1)*1000+(it.z||1)+(isSelected?500:0));
          if(el.style.zIndex!==z) el.style.zIndex=z;
        }
      }
    });
    const svg=document.getElementById('layer-svg-'+layer.id);
    if(svg){
      // Layer-SVG z-index: respektiert den Toggle "Striche über/unter Items" pro Ebene.
      // Während aktiv gezeichnet wird → immer oben (99999), damit neue Striche sichtbar sind.
      // Sonst: liegt er unter Items oder darüber, je nachdem was der User gewählt hat.
      let targetZ;
      if(drawingActive){
        targetZ = '99999';
      } else {
        // layer._svgZ ist 800 (=über Items) oder 1 (=unter Items) per Toggle.
        // Umrechnung in Item-Z-Bereich der Ebene:
        //   "über Items" → (i+1)*1000 + 900 → liegt höher als alle Items der Ebene
        //   "unter Items" → (i+1)*1000 - 500 → liegt unter allen Items der Ebene
        //                   (aber noch über den Items der darunterliegenden Ebene)
        const svgZ = (layer._svgZ==null||layer._svgZ>=800) ? 900 : -500;
        targetZ = String((i+1)*1000 + svgZ);
      }
      if(svg.style.zIndex!==targetZ) svg.style.zIndex=targetZ;
    }
  });
  // draw-layers: nur DOM-Move wenn nötig (verhindert Reflow)
  const dl=$('draw-layers');
  const il=$('items-layer');
  const cvs=$('canvas');
  if(dl&&il&&cvs){
    // Während des Zeichnens: Container immer oben. Sonst 'auto' damit die layer-svg
    // ihre individuellen z-indices durchsetzen können.
    if(drawingActive){
      if(dl.style.zIndex!=='99998') dl.style.zIndex='99998';
    } else {
      if(dl.style.zIndex!=='auto') dl.style.zIndex='auto';
    }
    if(dl.style.pointerEvents!=='none') dl.style.pointerEvents='none';
    // Nur verschieben wenn draw-layers nicht bereits letztes Kind
    if(cvs.lastElementChild!==dl) cvs.appendChild(dl);
  }
}

// Verschiebt eine SVG-Form in das layer-svg einer anderen Ebene.
// Die Form behält alle Attribute (Koordinaten, Stroke, etc.). Marker-end (Pfeilspitze)
// wird bei Bedarf in der Zielebene neu erzeugt.
function moveShapeToLayer(shapeEl, targetLayerId){
  if(!shapeEl) return;
  const targetSvg = ensureLayerSvg(targetLayerId);
  if(!targetSvg) return;
  // Falls die Shape einen arrow marker benutzt, sicherstellen, dass er im Ziel-SVG existiert
  const me = shapeEl.getAttribute('marker-end');
  if(me){
    const m = me.match(/url\(#ah-([^)]+)\)/);
    if(m){
      const color = '#'+m[1];
      const newId = ensureArrowheadInSvg(targetSvg, color);
      shapeEl.setAttribute('marker-end', `url(#${newId})`);
    }
  }
  // Shape in Ziel-SVG hängen (ans Ende → oben innerhalb der Ebene)
  targetSvg.appendChild(shapeEl);
  // data-lid für Persistenz aktualisieren
  shapeEl.setAttribute('data-lid', String(targetLayerId));
  // Sichtbarkeit/Lock anhand der Ziel-Ebene setzen
  const targetLayer = S.layers.find(l => l.id === targetLayerId);
  if(targetLayer && !targetLayer.visible) shapeEl.style.display='none';
  else shapeEl.style.display='';
  applyLayerOrder();
  scheduleRenderLayerList?.();
  scheduleSave();
}

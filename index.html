<!DOCTYPE html>
<!-- Landespolizeidirektion Vorarlberg — Whiteboard, Offline Edition — keine externen Abhängigkeiten
     Als PWA installierbar: Im Browser auf "Installieren" klicken (Chrome/Edge-Adressleiste)
-->
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Landespolizeidirektion Vorarlberg</title>
<meta name="author" content="Miriam Hanke">
<meta name="publisher" content="Hankemacht – Miriam Hanke">
<meta name="copyright" content="Hankemacht – Miriam Hanke">
<meta name="theme-color" content="#0e0f11" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0e0f11" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#0e0f11">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LPD Vorarlberg">


<style>
/* Mac: SF Pro | Windows: Segoe UI | Linux: Ubuntu/Cantarell */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0e0f11;--surface:#16181c;--surface2:#1e2128;
  --border:#2a2d36;--border-hi:#3d4150;
  --accent:#00e5c3;--accent2:#ff6b35;--accent3:#a855f7;
  --text:#e8eaf0;--text-dim:#7a7f94;--text-dimmer:#454a5c;
  --radius:10px;--shadow:0 8px 32px rgba(0,0,0,.5);
  --header-h:52px;
  --wco-top: 0px;
  --wco-h: 0px;
  --mono:'Cascadia Code','JetBrains Mono','Fira Code',Consolas,'Courier New',monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI','Segoe UI Variable',Ubuntu,Cantarell,'Helvetica Neue',Arial,sans-serif;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:var(--sans);color:var(--text);user-select:none;touch-action:none;}

/* ── FIXED BACKGROUND — completely outside canvas transform ── */
#bg-fixed{
  position:fixed;inset:0;z-index:0;pointer-events:none !important;
  overflow:hidden;
}
#bg-fixed img{
  position:absolute;max-width:none;
  pointer-events:none !important;user-select:none;
  -webkit-user-drag:none;
}

/* ── HEADER ── */
#header{
  position:fixed;top:0;left:0;right:0;height:var(--header-h);z-index:10000;
  touch-action:manipulation;
  display:flex;align-items:center;padding:0 14px;gap:8px;
  background:rgba(14,15,17,.93);border-bottom:1px solid var(--border);
  backdrop-filter:blur(12px);transition:transform .3s;
  /* Pointer-Events explizit auf all setzen — verhindert dass Canvas-Layer den Header überschattet */
  pointer-events:all;
  /* -webkit-app-region: drag; — deaktiviert wegen Windows-Kompatibilität */
}
/* Buttons must NOT be draggable */
/* #header button, #header input, #header select { -webkit-app-region: no-drag; } */
#header.hidden{transform:translateY(calc(-1 * var(--header-h)));}
#board-name-display{
  font-size:13px;color:var(--text-dim);font-family:var(--mono);
  cursor:pointer;padding:3px 8px;border-radius:6px;border:1px solid transparent;
  transition:all .15s;max-width:260px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
#board-name-display:hover{border-color:var(--border);color:var(--text);}
#board-name-input{
  display:none;font-size:13px;font-family:var(--mono);
  background:var(--surface2);border:1px solid var(--accent);border-radius:6px;
  color:var(--text);outline:none;padding:3px 8px;width:200px;
}
.hdr-space{flex:1;}
#zoom-display{font-size:11px;font-family:var(--mono);color:var(--text-dimmer);min-width:44px;text-align:right;}
.hdr-btn{
  font-size:11px;font-family:var(--mono);padding:0 11px;border-radius:8px;
  border:1px solid var(--border);background:var(--surface2);color:var(--text-dim);
  cursor:pointer;transition:all .15s;flex-shrink:0;
  /* Samsung Flip: große Touch-Targets, kein Gesture-Hijacking */
  min-height:38px;touch-action:manipulation;user-select:none;
  display:flex;align-items:center;justify-content:center;
}
.hdr-btn:hover{border-color:var(--accent);color:var(--accent);}
.hdr-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(0,229,195,.08);}

/* ── CANVAS ── */
#canvas-wrap{
  position:fixed;top:var(--header-h);left:0;right:0;bottom:0;overflow:hidden;cursor:default;
  z-index:3;transition:top .3s;background:transparent;touch-action:none;pointer-events:none;
}
#canvas-wrap.presentation{top:0 !important;}
/* #canvas selbst auch pointer-events:none — Events gehen direkt an .item-Elemente */
/* Ordner im folders-overlay (z:2) können so Clicks empfangen */
#canvas{position:absolute;width:12000px;height:12000px;transform-origin:0 0;touch-action:none;will-change:transform;pointer-events:none;}
#items-layer{position:absolute;inset:0;pointer-events:none;}
#grid-overlay{
  position:absolute;inset:0;pointer-events:none;z-index:0;
  background-image:radial-gradient(circle,var(--border) 1px,transparent 1px);
  background-size:32px 32px;opacity:.45;transition:opacity .3s;
}
#bg-color-input{display:none;}
.hdr-btn.bg-swatch{padding:0 6px;display:flex;align-items:center;gap:5px;font-size:11px;}
.hdr-btn.bg-swatch .swatch{width:14px;height:14px;border-radius:3px;border:1px solid rgba(255,255,255,.2);display:inline-block;}
.layer-svg{position:absolute;inset:0;overflow:visible;width:100%;height:100%;pointer-events:none;}
.layer-svg > *{pointer-events:none;}
.svg-selected{filter:drop-shadow(0 0 3px var(--accent));}
.svg-resize-handle{pointer-events:all !important;cursor:se-resize;}
#draw-layers{position:absolute;inset:0;pointer-events:auto;}
#draw-layer{position:absolute;inset:0;pointer-events:none;z-index:20;overflow:visible;}
#items-layer{position:absolute;inset:0;}

/* ── ITEM BASE ── */
.item{position:absolute;cursor:grab;transition:box-shadow .15s,outline .1s;border-radius:var(--radius);touch-action:none;pointer-events:auto;}
/* z-index wird ausschließlich durch bringToFront() / applyLayerOrder() gesetzt — kein hover-Override */
.image-item.item:hover{outline:none;}
.item.selected{outline:2px solid var(--accent);outline-offset:2px;}
.item.dragging{cursor:grabbing;opacity:.92;}

/* ── FILE ITEM ── */
.file-item{
  width:110px;display:flex;flex-direction:column;align-items:center;
  gap:6px;padding:11px 7px 9px;background:var(--surface);
  border:1px solid var(--border);box-shadow:0 4px 16px rgba(0,0,0,.4);
}
.file-icon-wrap{width:44px;height:44px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;position:relative;}
.file-label{font-size:10px;font-family:var(--mono);color:var(--text-dim);text-align:center;word-break:break-all;line-height:1.3;max-width:100%;padding:0 2px;}
.file-label.editing{background:var(--surface2);border:1px solid var(--accent);border-radius:4px;outline:none;color:var(--text);padding:2px 4px;width:78px;}
/* preview mode file */
.file-item.preview-mode{width:auto;min-width:200px;padding:0;overflow:hidden;background:var(--surface2);;display:flex;flex-direction:column;}
.file-item.preview-mode .file-preview-wrap{width:100%;display:flex;flex-direction:column;}
.file-item.preview-mode .file-meta{
  display:flex;align-items:center;gap:6px;padding:5px 8px;
  background:var(--surface);border-top:1px solid var(--border);
}
.file-item.preview-mode .file-meta .file-label{font-size:10px;flex:1;text-align:left;}
/* image preview mode */
.file-item.img-preview-mode{width:auto;min-width:80px;padding:0;overflow:hidden;background:transparent;border:1px solid var(--border);}
.file-item.img-preview-mode img.preview-img{display:block;width:100%;height:100%;object-fit:cover;pointer-events:none;}
.file-item.img-preview-mode .file-meta{display:none;}
/* burger menu button */
.file-burger{
  position:absolute;top:3px;right:3px;width:18px;height:18px;
  border-radius:4px;border:none;background:transparent;
  color:var(--text-dimmer);cursor:pointer;font-size:11px;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .15s,background .15s;z-index:10;
  line-height:1;
}
.file-item:hover .file-burger{opacity:1;}
.file-burger:hover{background:var(--surface2);color:var(--text);}
/* img preview resize handle */
.img-resize-h{
  position:absolute;right:0;bottom:0;width:14px;height:14px;cursor:se-resize;
  background:var(--surface);border-top:1px solid var(--border);border-left:1px solid var(--border);
  border-radius:var(--radius) 0 0 0;display:flex;align-items:center;justify-content:center;
  font-size:8px;color:var(--text-dimmer);opacity:0;transition:opacity .15s;
}
.file-item:hover .img-resize-h{opacity:1;}

/* ── FOLDER ── */
.folder-item{display:flex;flex-direction:column;align-items:center;justify-content:center;width:80px;cursor:default;user-select:none;}
.folder-icon-wrap{font-size:40px;line-height:1;position:relative;}
.folder-badge{position:absolute;bottom:-4px;right:-6px;background:var(--accent);color:#000;font-size:8px;font-weight:700;font-family:var(--mono);border-radius:6px;padding:0 4px;min-width:14px;text-align:center;}
.folder-label{font-size:11px;font-family:var(--mono);color:var(--text);text-align:center;margin-top:4px;word-break:break-word;max-width:80px;}
/* ── Folder Window (opened on canvas) ── */
.folder-window{position:absolute;background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,.5);min-width:320px;min-height:200px;display:flex;flex-direction:column;overflow:hidden;z-index:2000;touch-action:none;}
.folder-win-header{display:flex;align-items:center;gap:6px;padding:12px 10px;background:var(--surface2);border-bottom:1px solid var(--border);cursor:grab;flex-shrink:0;min-height:44px;}
.folder-win-title{font-size:12px;font-weight:600;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.folder-win-btns{display:flex;gap:4px;align-items:center;}
.folder-win-btn{background:none;border:1px solid var(--border);color:var(--text-dim);border-radius:5px;padding:2px 7px;font-size:10px;font-family:var(--mono);cursor:pointer;transition:border-color .15s,color .15s;}
.folder-win-btn:hover,.folder-win-btn.active{border-color:var(--accent);color:var(--accent);}
.folder-win-close{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:14px;line-height:1;padding:2px 4px;border-radius:4px;}
.folder-win-close:hover{color:#e74c3c;background:rgba(231,76,60,.1);}
.folder-win-body{flex:1;overflow-y:auto;padding:10px;touch-action:pan-y;}
/* Icon view */
.folder-icon-grid{display:flex;flex-wrap:wrap;gap:10px;}
.fwin-icon{display:flex;flex-direction:column;align-items:center;gap:4px;width:72px;cursor:grab;padding:6px 4px;border-radius:7px;border:1px solid transparent;transition:border-color .15s,background .15s;position:relative;touch-action:none;user-select:none;}
.fwin-icon:hover{background:rgba(255,255,255,.05);border-color:var(--border);}
.fwin-icon.selected{background:rgba(0,229,195,.08);border-color:var(--accent);}
.fwin-icon.fwin-multi-sel,.fwin-row.fwin-multi-sel{background:rgba(0,229,195,.08);outline:1px solid var(--accent);border-radius:6px;}
.fwin-icon-img{width:52px;height:52px;object-fit:cover;border-radius:5px;border:1px solid var(--border);}
.fwin-icon-emoji{font-size:36px;line-height:1;text-align:center;width:52px;height:52px;display:flex;align-items:center;justify-content:center;}
.fwin-icon-name{font-size:9px;font-family:var(--mono);color:var(--text-dim);text-align:center;word-break:break-word;line-height:1.3;max-width:70px;}
.fwin-icon-name.editing{background:var(--surface2);border:1px solid var(--accent);outline:none;color:var(--text);font-size:9px;font-family:var(--mono);border-radius:3px;padding:1px 3px;width:64px;text-align:center;}
/* List view */
.folder-list-view{display:flex;flex-direction:column;gap:1px;}
.fwin-row{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:6px;cursor:grab;border:1px solid transparent;transition:background .1s;}
.fwin-row:hover{background:rgba(255,255,255,.05);border-color:var(--border);}
.fwin-row-icon{font-size:18px;flex-shrink:0;width:24px;text-align:center;}
.fwin-row-thumb{width:24px;height:24px;object-fit:cover;border-radius:3px;flex-shrink:0;}
.fwin-row-name{flex:1;font-size:11px;font-family:var(--mono);color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.fwin-row-name.editing{background:var(--surface2);border:1px solid var(--accent);outline:none;color:var(--text);font-size:11px;font-family:var(--mono);border-radius:3px;padding:1px 5px;flex:1;}
.fwin-row-size{font-size:9px;font-family:var(--mono);color:var(--text-dimmer);}
/* Footer */
.folder-win-footer{padding:6px 10px;border-top:1px solid var(--border);display:flex;align-items:center;gap:6px;background:var(--surface2);flex-shrink:0;}
.folder-win-add{background:none;border:1px dashed var(--border);color:var(--text-dimmer);border-radius:5px;padding:3px 10px;font-size:10px;font-family:var(--mono);cursor:pointer;}
.folder-win-add:hover{border-color:var(--accent);color:var(--accent);}
.folder-win-count{font-size:10px;font-family:var(--mono);color:var(--text-dimmer);margin-left:auto;}
/* Drag handle */
.folder-resize-handle{position:absolute;right:0;bottom:0;width:14px;height:14px;cursor:se-resize;opacity:.4;}
.folder-resize-handle::before{content:'⠿';font-size:9px;color:var(--text-dim);}

/* ── NOTE ── */
/* ── LAYER PANEL ── */
/* layer item list */
.layer-items-list{display:none;flex-direction:column;border-top:1px solid var(--border);background:rgba(0,0,0,.15);}
.layer-row.expanded + .layer-items-list, .layer-items-list.open{display:flex;}
.layer-item-row{display:flex;align-items:center;gap:5px;padding:3px 6px 3px 22px;font-size:10px;font-family:var(--mono);color:var(--text-dim);cursor:pointer;border-bottom:1px solid rgba(255,255,255,.03);transition:background .1s;}
.layer-item-row:hover{background:rgba(255,255,255,.06);color:var(--text);}
.layer-item-row.selected-item{background:rgba(0,229,195,.08);color:var(--accent);}
.layer-item-icon{font-size:11px;flex-shrink:0;}
.layer-item-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.layer-item-drag{cursor:grab;opacity:.4;font-size:10px;padding:0 2px;}
.layer-item-row.drag-over{border-top:2px solid var(--accent);}
.layer-expand-btn{font-size:9px;padding:0 3px;background:none;border:none;color:var(--text-dim);cursor:pointer;opacity:.6;}
.layer-expand-btn:hover{opacity:1;}

#layer-panel{position:fixed;right:0;top:0;bottom:0;width:220px;z-index:1400;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s;}
#layer-panel.open{transform:translateX(0);}
#layer-panel-header{height:46px;display:flex;align-items:center;padding:0 12px;gap:8px;border-bottom:1px solid var(--border);flex-shrink:0;}
#layer-panel-title{flex:1;font-size:12px;font-weight:600;font-family:var(--mono);color:var(--text);}
#layer-list{flex:1;overflow-y:auto;padding:6px;}
.layer-row{display:flex;align-items:center;gap:5px;padding:5px 6px;border-radius:6px;border:1px solid transparent;cursor:pointer;margin-bottom:3px;transition:background .15s;}
.layer-row:hover{background:var(--surface2);}
.layer-row.active-layer{border-color:var(--accent);background:rgba(0,229,195,.08);}
.layer-row.locked{opacity:.6;}
.layer-name{flex:1;font-size:11px;font-family:var(--mono);color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.layer-name[contenteditable="true"]{outline:1px solid var(--accent);border-radius:3px;padding:0 2px;}
.layer-icon-btn{width:22px;height:22px;border:none;background:transparent;cursor:pointer;color:var(--text-dim);font-size:13px;display:flex;align-items:center;justify-content:center;border-radius:4px;flex-shrink:0;}
.layer-icon-btn:hover{background:var(--surface2);color:var(--text);}
.layer-add-btn{margin:4px 6px;padding:5px;font-size:11px;font-family:var(--mono);background:transparent;border:1px dashed var(--border);color:var(--text-dim);border-radius:6px;cursor:pointer;width:calc(100% - 12px);}
.layer-add-btn:hover{border-color:var(--accent);color:var(--accent);}
.layer-sep{height:1px;background:var(--border);margin:4px 0;}
.text-label-item{position:absolute;cursor:move;user-select:none;white-space:pre;padding:4px 6px;border-radius:4px;border:1px solid transparent;transition:border-color .15s;}
.text-label-item:hover{border-color:rgba(255,255,255,.15);}
.text-label-item.selected{border-color:var(--accent) !important;}
.note-item{width:240px;min-height:160px;border:1px solid rgba(0,0,0,.15);box-shadow:0 4px 20px rgba(0,0,0,.25);padding:0;display:flex;flex-direction:column;border-radius:8px;overflow:visible;}
.note-stripe{position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--radius) var(--radius) 0 0;pointer-events:none;}
.note-color-row{display:flex;gap:4px;margin-bottom:7px;flex-wrap:wrap;}
.note-color-btn{width:13px;height:13px;border-radius:50%;border:2px solid rgba(255,255,255,.15);cursor:pointer;transition:transform .12s;flex-shrink:0;}
.note-color-btn:hover{transform:scale(1.3);}
.note-color-btn.active{border-color:#fff;transform:scale(1.2);}
.note-textarea{width:100%;flex:1;background:transparent;border:none;outline:none;font-family:var(--mono);font-size:13px;line-height:1.6;resize:none;cursor:text;padding:6px 10px 14px;box-sizing:border-box;border-radius:0 0 8px 8px;}

/* ── IMAGE ITEM ── */
.image-item{border:none;box-shadow:0 2px 12px rgba(0,0,0,.3);overflow:hidden;min-width:40px;min-height:30px;background:transparent;touch-action:none;cursor:grab;}
.image-item img{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none;}
.img-rh{position:absolute;right:0;bottom:0;width:14px;height:14px;cursor:se-resize;background:var(--surface);border-top:1px solid var(--border);border-left:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--text-dimmer);opacity:0;transition:opacity .15s;}
.image-item:hover .img-rh{opacity:1;}

/* ── FOLDERS OVERLAY — screen-fixed, außerhalb Canvas-Transform ── */
#folders-overlay{
  position:fixed;inset:0;pointer-events:none;
  /* z:2 — unter canvas-wrap (z:3). canvas-wrap hat pointer-events:none → Folder-Clicks kommen durch */
  z-index:2;
  overflow:visible;
}
#folders-overlay .item{pointer-events:all;}

/* ── TOOLBAR ── */
#toolbar{
  position:fixed;left:50%;bottom:22px;transform:translateX(-50%);
  display:flex;align-items:center;gap:2px;
  background:var(--surface);border:1px solid var(--border-hi);border-radius:16px;
  padding:5px 6px;box-shadow:0 8px 40px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.03);
  z-index:1000;backdrop-filter:blur(12px);transition:transform .3s;
}
#toolbar.hidden{transform:translateX(-50%) translateY(120px);}
/* COMPACT MODE — Toolbar erscheint vertikal an der LINKEN Seite, nur essentielle Werkzeuge */
#toolbar.compact{
  left:14px;right:auto;bottom:50%;top:auto;
  transform:translateY(50%);
  flex-direction:column;
  padding:5px;
  border-radius:13px;
}
#toolbar.compact.hidden{transform:translateY(50%) translateX(-120px);}
/* Im compact-Modus: nur die fünf Hauptwerkzeuge zeigen, Rest ausblenden */
#toolbar.compact > *{display:none;}
#toolbar.compact > #tool-select,
#toolbar.compact > #tool-pen,
#toolbar.compact > #tool-line,
#toolbar.compact > #tool-arrow,
#toolbar.compact > #tool-eraser{display:flex;}
/* Active-State: gedämpfter, grauer als das knallige Türkis — passt zum "Präsentations-Look" */
.tool-btn.active{background:var(--surface2);color:var(--text);border:1px solid var(--border-hi);}
.side-btn.active{background:var(--surface2);color:var(--text);border-color:var(--border-hi);}
.tool-btn{width:38px;height:38px;border-radius:8px;border:none;background:transparent;color:var(--text-dim);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s;position:relative;flex-shrink:0;}
.tool-btn:hover{background:var(--surface2);color:var(--text);}
/* .tool-btn.active wird oben definiert mit gedämpftem Look */
.tool-sep{width:1px;height:20px;background:var(--border);margin:0 3px;}
.tool-tip{position:absolute;bottom:calc(100% + 7px);left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:10px;font-family:var(--mono);padding:3px 7px;border-radius:5px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;z-index:10;}
.tool-btn:hover .tool-tip{opacity:1;}

/* ── STROKE PICKER ── */
#text-picker{
  display:none;position:fixed;bottom:84px;left:50%;transform:translateX(-50%);
  touch-action:auto;z-index:10001;background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:10px 14px;min-width:320px;
  box-shadow:0 8px 32px rgba(0,0,0,.5);flex-direction:column;gap:6px;
}
#text-picker.open{display:flex;}
#stroke-picker{
  display:none;position:fixed;bottom:84px;left:50%;transform:translateX(-50%);
  background:var(--surface);border:1px solid var(--border-hi);border-radius:12px;

<script>
// Samsung Flip / Windows WebView2 Tap-Polyfill
// Aktiviert data-onclick, native onclick und label[for]-Inputs per pointerup (Touch/Stift).
// KRITISCH: _touchFired wird NUR gesetzt wenn ein Handler gefunden wurde —
// Canvas-Interaktionen blockieren danach KEINE Button-Taps mehr.
(function(){
  var _pdStart = null;
  var _touchFired = false; // true wenn Touch-pointerup einen Handler auslöste → click unterdrücken

  document.addEventListener('pointerdown', function(e){
    _pdStart = {x:e.clientX, y:e.clientY, id:e.pointerId, type:e.pointerType};
    _touchFired = false;
  }, {capture:true, passive:true});

  function _runHandlers(target){
    var el = target;
    var depth = 0;
    while(el && el !== document.body && depth++ < 8){
      // data-onclick — einziger Handler-Typ für alle statischen Buttons und Labels
      var handler = el.getAttribute('data-onclick');
      if(handler){
        var fakeEvent = {
          target:el, currentTarget:el, type:'click',
          preventDefault:function(){}, stopPropagation:function(){},
          pointerType:'touch'
        };
        try{ (new Function('event', handler)).call(el, fakeEvent); }
        catch(err){ console.error('data-onclick err:', err.message, handler.slice(0,60)); }
        return true;
      }
      el = el.parentElement;
    }
    return false;
  }

  // Touch/Stift pointerup → zuverlässiger Tap-Trigger
  // Läuft im trusted-gesture-Kontext → .click() auf File-Inputs erlaubt
  document.addEventListener('pointerup', function(e){
    if(e.pointerType === 'mouse') return; // Maus: click-Event ist zuverlässig
    if(!_pdStart || _pdStart.id !== e.pointerId) return;
    var dx = Math.abs(e.clientX - _pdStart.x);
    var dy = Math.abs(e.clientY - _pdStart.y);
    if(dx > 14 || dy > 14) return; // Drag/Wischen → kein Tap
    // NUR setzen wenn Handler gefunden → Canvas-Taps blockieren keine Buttons mehr
    var found = _runHandlers(e.target);
    if(found) _touchFired = true;
  }, {capture:false});

  // Maus-click (zuverlässig) + Touch-Fallback
  document.addEventListener('click', function(e){
    if(_touchFired){ _touchFired = false; return; } // Touch hat schon gefeuert → überspringen
    _runHandlers(e.target);
  }, false);
})();

<script>
'use strict';
// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
const S = {
  zoom:1,panX:0,panY:0,tool:'select',
  items:[],selectedIds:new Set(),
  bgImage:null,bgW:null,bgH:null,
  gridVisible:true,presentation:false,bgColor:'#0e0f11',strokeFont:'mono',
  textFont:'sans-serif',textSize:18,textColor:'#00e5c3',textBold:false,textItalic:false,
  layers:[{id:1,name:'Ebene 1',visible:true,locked:false}],activeLayerId:1,nextLayerId:2,
  nextId:1,
  strokeColor:'#00e5c3',strokeSize:3,strokeDash:'',strokeFill:false,strokeOpacity:1,
  drawings:[],
};

const STROKE_COLORS=['#00e5c3','#ff6b35','#a855f7','#f7e05a','#ff6b9d','#4a9eff','#ffffff','#ff4444','#aaffaa'];
const NOTE_COLORS=[
  {bg:'#FFE033',border:'#D4A000',text:'#2a1a00',stripe:'#D4A000',label:'Gelb'},
  {bg:'#3B82F6',border:'#1D4ED8',text:'#fff',stripe:'#1D4ED8',label:'Blau'},
  {bg:'#A855F7',border:'#7C3AED',text:'#fff',stripe:'#7C3AED',label:'Lila'},
  {bg:'#F97316',border:'#C2410C',text:'#fff',stripe:'#C2410C',label:'Orange'},
  {bg:'#22C55E',border:'#15803D',text:'#fff',stripe:'#15803D',label:'Grün'},
  {bg:'#EC4899',border:'#BE185D',text:'#fff',stripe:'#BE185D',label:'Pink'},
  {bg:'#E2E8F0',border:'#94A3B8',text:'#1e293b',stripe:'#94A3B8',label:'Grau'},
];
const DRAW_TOOLS=['pen','line','arrow','rect','circle','text','eraser'];

// ═══════════════════════════════════════════════
//  DOM
// ═══════════════════════════════════════════════
const $ = id => document.getElementById(id);
const canvasWrap=$('canvas-wrap'),canvas=$('canvas'),itemsLayer=$('items-layer');
const foldersOverlay=$('folders-overlay');
const bgFixed=$('bg-fixed'),drawLayer=$('draw-layer'),selBox=$('selection-box');
const zoomDisp=$('zoom-display'),ctxMenu=$('ctx-menu'),ddMenu=$('dropdown-menu');
const modalOverlay=$('modal-overlay'),modalBox=$('modal-box'),dragGhost=$('drag-ghost');

// ═══════════════════════════════════════════════
//  TRANSFORM
// ═══════════════════════════════════════════════
function applyTransform(){
  canvas.style.transform=`translate(${S.panX}px,${S.panY}px) scale(${S.zoom})`;
  zoomDisp.textContent=Math.round(S.zoom*100)+'%';
}
function getContentCenter(){
  // Returns canvasWrap-relative coords of selected item or centroid of all items
  const r=canvasWrap.getBoundingClientRect();
  try {
    const visible=S.items.filter(it=>{
      if(!it||it.x==null) return false;
      const l=(S.layers||[]).find(x=>x.id===it.layerId);
      return !l||l.visible!==false;
    });
    const src=S.selectedIds&&S.selectedIds.size>0
      ? visible.filter(it=>S.selectedIds.has(it.id))
      : visible;
    if(src.length===0) return {x:r.width/2, y:r.height/2};
    const avgX=src.reduce((a,it)=>a+(it.x||0),0)/src.length;
    const avgY=src.reduce((a,it)=>a+(it.y||0),0)/src.length;
    // canvas coords → canvasWrap-relative screen coords
    return {x:avgX*S.zoom+S.panX, y:avgY*S.zoom+S.panY};
  } catch(e){ return {x:r.width/2, y:r.height/2}; }
}
function zoomBy(f,cx,cy){
  const r=canvasWrap.getBoundingClientRect();
  if(cx==null||cy==null){const c=getContentCenter();cx=c.x;cy=c.y;}
  const nz=Math.min(Math.max(S.zoom*f,.05),8);
  const ratio=nz/S.zoom;
  S.panX=cx-(cx-S.panX)*ratio; S.panY=cy-(cy-S.panY)*ratio; S.zoom=nz;
  applyTransform();
}
function toggleToolbar(){
  const tb=$('toolbar');
  if(!tb)return;
  // Aus dem Compact-Modus rausnehmen, falls aktiv (verhindert Verwirrung beim Wieder-Einblenden)
  tb.classList.remove('compact');
  const cBtn=$('toolbar-compact-btn');
  if(cBtn){ cBtn.classList.remove('active'); }
  tb.classList.toggle('hidden');
  const isHidden=tb.classList.contains('hidden');
  const btn=$('toolbar-toggle-btn');
  if(btn){
    btn.textContent = isHidden ? '▴' : '▾';
    btn.title = isHidden ? 'Werkzeugleiste einblenden' : 'Werkzeugleiste ausblenden';
  }
}
function toggleCompactToolbar(){
  const tb=$('toolbar');
  if(!tb)return;
  // Falls Toolbar versteckt → erst einblenden
  tb.classList.remove('hidden');
  const tBtn=$('toolbar-toggle-btn');
  if(tBtn){ tBtn.textContent='▾'; tBtn.title='Werkzeugleiste ausblenden'; }
  // Compact umschalten
  tb.classList.toggle('compact');
  const isCompact=tb.classList.contains('compact');
  const btn=$('toolbar-compact-btn');
  if(btn){
    btn.classList.toggle('active', isCompact);
    btn.title = isCompact ? 'Volle Werkzeugleiste anzeigen' : 'Werkzeugleiste kompakt rechts';
  }
}
function resetView(){
  S.zoom=1;
  S.panX=80;
  S.panY=80;
  applyTransform();
}
function fitAll(){
  if(!S.items.length){resetView();return;}
  let mx=1e9,my=1e9,Mx=-1e9,My=-1e9;
  S.items.forEach(it=>{
    if(it.type==='folder') return; // Ordner-Icons sind zoom-immun, nicht einberechnen
    mx=Math.min(mx,it.x);my=Math.min(my,it.y);
    Mx=Math.max(Mx,it.x+(it.w||120));My=Math.max(My,it.y+(it.h||100));
  });
  // Fallback: alle Items einschließlich Ordner
  if(mx===1e9){
    S.items.forEach(it=>{
      mx=Math.min(mx,it.x);my=Math.min(my,it.y);
      Mx=Math.max(Mx,it.x+(it.w||80));My=Math.max(My,it.y+(it.h||80));
    });
  }
  if(mx===1e9){resetView();return;}
  const r=canvasWrap.getBoundingClientRect();
  const vw=r.width||window.innerWidth;
  const vh=r.height||(window.innerHeight-52);
  const pad=80;
  const cw=Math.max(Mx-mx,1), ch=Math.max(My-my,1);
  const z=Math.min((vw-pad*2)/cw,(vh-pad*2)/ch,3); // max 3× Zoom
  S.zoom=Math.max(0.05,z);
  S.panX=(vw-cw*S.zoom)/2 - mx*S.zoom;
  S.panY=(vh-ch*S.zoom)/2 - my*S.zoom;
  applyTransform();
}
function s2c(sx,sy){return{x:(sx-S.panX)/S.zoom,y:(sy-S.panY)/S.zoom};}
function centerPos(rx,ry){
  const r=canvasWrap.getBoundingClientRect();
  const vw=r.width||window.innerWidth;
  const vh=r.height||(window.innerHeight-52);
  // Viewport-Mittelpunkt in Canvas-Koordinaten umrechnen
  const cx=vw/2+(rx||0);
  const cy=vh/2+(ry||0);
  const pos=s2c(cx,cy);
  return {x:pos.x, y:pos.y};
}
function ensureVisible(item){
  // Neues Item immer mittig anzeigen — verhindert dass Items außerhalb des Sichtfelds landen
  const r=canvasWrap.getBoundingClientRect();
  const vw=r.width||window.innerWidth;
  const vh=r.height||(window.innerHeight-52);
  const cx=item.x+(item.w||120)/2;
  const cy=item.y+(item.h||80)/2;
  const sx=S.panX+cx*S.zoom;
  const sy=S.panY+cy*S.zoom;
  const margin=60;
  // Nur panen wenn Item wirklich außerhalb des Sichtfelds liegt
  if(sx<margin||sx>vw-margin||sy<margin||sy>vh-margin){
    S.panX=vw/2-cx*S.zoom;
    S.panY=vh/2-cy*S.zoom;
    applyTransform();
  }
}
function cpt(e){const r=canvasWrap.getBoundingClientRect();return s2c(e.clientX-r.left,e.clientY-r.top);}

// ═══════════════════════════════════════════════
//  TOOL
// ═══════════════════════════════════════════════
function setTool(t){
  // Aktive Canvas-Texteingabe abschließen bevor Tool wechselt
  if(_activePlaceTextCommit && t!=='text'){
    const fn=_activePlaceTextCommit;
    _activePlaceTextCommit=null;
    fn();
  }
  S.tool=t;
  // PDF-Zeichenoverlays aktivieren/deaktivieren
  const _pdfDraw=DRAW_TOOLS.includes(t);
  document.querySelectorAll('.pdf-draw-overlay').forEach(o=>{
    o.style.pointerEvents=_pdfDraw?'auto':'none';
  });
  // Update viewer draw overlay if viewer is open
  const ov=$('viewer-overlay');
  if(ov&&ov.style.display==='flex'){
    if(DRAW_TOOLS.includes(t)) showViewerDrawOverlay();
    else hideViewerDrawOverlay();
  }
  document.querySelectorAll('.tool-btn[id^=tool-]').forEach(b=>b.classList.remove('active'));
  $('tool-'+t)?.classList.add('active');
  const c={select:'default',pan:'grab',pen:'crosshair',line:'crosshair',arrow:'crosshair',rect:'crosshair',circle:'crosshair',text:'text',eraser:'cell'};
  canvasWrap.style.cursor=c[t]||'default';
  itemsLayer.style.pointerEvents=DRAW_TOOLS.includes(t)?'none':'';
  applyLayerOrder(); // draw-layers über items-layer wenn Zeichenwerkzeug aktiv
}


// ══════════════════════════════════════════════════════════════════
//  POINTER / TOUCH / STYLUS SUPPORT
//  Works with: mouse, touch finger, stylus/pen (e.g. Samsung Flip)
// ══════════════════════════════════════════════════════════════════

// Active pointer tracking for multi-touch
const _pointers = new Map(); // pointerId → {x,y,type}
let _pinchStartDist = null;
let _rafPan = null;
let _pinchItem = null;
let _pinchItemStartW = 0;
let _pinchItemStartH = 0;
let _pinchStartZoom = null;
let _pinchStartPanX = null;
let _pinchStartPanY = null;
let _pinchMidX = null;
let _pinchMidY = null;
let _itemPinchLocked = false; // true während ein Element per Pinch vergrößert wird — blockiert Canvas-Pan und Drag
let _resizeActive = false;   // true während ein Resize-Handle gezogen wird — blockiert Canvas-Pan und Pinch komplett
let _stylusActive = false;   // true while a pen pointer is down
let _longPressTimer = null;
let _longPressE = null;

// Normalize any pointer/touch/mouse event to {clientX, clientY, pressure, pointerType}
function normEvent(e){
  return {
    clientX: e.clientX,
    clientY: e.clientY,
    button: e.button||0,
    buttons: e.buttons||0,
    pressure: e.pressure!=null ? e.pressure : 0.5,
    pointerType: e.pointerType||'mouse',
    pointerId: e.pointerId||0,
    shiftKey: e.shiftKey,
    ctrlKey: e.ctrlKey,
    metaKey: e.metaKey,
    target: e.target,
    preventDefault: ()=>e.preventDefault(),
    stopPropagation: ()=>e.stopPropagation(),
  };
}

// Get effective stroke size (scaled by stylus pressure)
function effectiveStrokeSize(pressure){
  if(!pressure||pressure===0.5) return S.strokeSize;
  // Map pressure 0-1 → 0.3x to 2.0x stroke size
  const scale = 0.3 + pressure * 1.7;
  return Math.max(1, Math.round(S.strokeSize * scale));
}

// Pinch gesture handling
function _updatePinch(){
  const touchPts=[..._pointers.values()].filter(p=>p.type==='touch');
  if(touchPts.length < 2) return;
  const p1=touchPts[0], p2=touchPts[1];
  const dist = Math.sqrt(Math.pow(p2.x-p1.x,2)+Math.pow(p2.y-p1.y,2));
  const midX = (p1.x+p2.x)/2;
  const midY = (p1.y+p2.y)/2;
  const r = canvasWrap.getBoundingClientRect();
  const cx = midX - r.left;
  const cy = midY - r.top;

  if(_pinchStartDist===null){
    _pinchStartDist = dist;
    _pinchStartZoom = S.zoom;
    _pinchStartPanX = S.panX;
    _pinchStartPanY = S.panY;
    _pinchMidX = cx;
    _pinchMidY = cy;
    return;
  }
  const scale = dist / _pinchStartDist;

  if(_pinchItem){
    _itemPinchLocked = true;  // Drag und Canvas-Pan komplett sperren
    isPanning = false;         // sicherstellen dass kein Pan läuft
    const el=$('item-'+_pinchItem.id);
    if(_pinchItem.type==='text-label'){
      const startSize=_pinchItem.fontSize||18;
      const newSize=Math.max(6,Math.min(200,Math.round(startSize*scale)));
      _pinchItem.fontSize=newSize;
      if(el) el.style.fontSize=newSize+'px';
    } else {
      // NUR dieses Element resizen — Canvas-Transform bleibt unverändert
      const newW=Math.max(40,Math.round(_pinchItemStartW*scale));
      const asp=_pinchItem.aspect||(_pinchItemStartH&&_pinchItemStartW?_pinchItemStartH/_pinchItemStartW:1);
      _pinchItem.w=newW;
      if(_pinchItem.type!=='text-label') _pinchItem.h=Math.round(newW*asp);
      if(el){
        el.style.width=newW+'px';
        if(_pinchItem.h) el.style.height=_pinchItem.h+'px';
        // Titelleiste proportional skalieren
        const sc=Math.max(0.6,Math.min(3,newW/Math.max(1,_pinchItemStartW)));
        const hdr=el.querySelector('.note-topbar,.file-meta,.folder-win-header');
        if(hdr){
          hdr.style.fontSize=Math.max(8,Math.round(11*sc))+'px';
          hdr.style.minHeight=Math.max(20,Math.round(28*sc))+'px';
        }
        const lbl=el.querySelector('.file-label,.note-topbar span,.folder-label');
        if(lbl) lbl.style.fontSize=Math.max(7,Math.round(10*sc))+'px';
      }
    }
    // applyTransform() NICHT aufrufen — Canvas bleibt eingefroren
    if(!_rafPan) _rafPan=requestAnimationFrame(()=>{_rafPan=null;scheduleSave();});
  } else {
    // Zoom canvas
    const nz = Math.min(Math.max(_pinchStartZoom * scale, 0.05), 8);
    const ratio = nz / _pinchStartZoom;
    S.zoom = nz;
    S.panX = _pinchMidX - (_pinchMidX - _pinchStartPanX) * ratio;
    S.panY = _pinchMidY - (_pinchMidY - _pinchStartPanY) * ratio;
    const dx = cx - _pinchMidX;
    const dy = cy - _pinchMidY;
    S.panX += dx * (1 - ratio);
    S.panY += dy * (1 - ratio);
    if(!_rafPan) _rafPan = requestAnimationFrame(()=>{applyTransform();_rafPan=null;});
  }
}

// Long-press → context menu
function _startLongPress(e){
  _cancelLongPress();
  _longPressE = normEvent(e);
  _longPressTimer = setTimeout(()=>{
    _longPressTimer = null;
    // Simulate right-click / context menu
    const ne = {
      clientX: _longPressE.clientX,
      clientY: _longPressE.clientY,
      preventDefault: ()=>{},
      target: _longPressE.target
    };
    // Show canvas or item context menu
    const item = S.items.find(it=>{
      const el = $('item-'+it.id);
      if(!el) return false;
      const r = el.getBoundingClientRect();
      return ne.clientX>=r.left&&ne.clientX<=r.right&&ne.clientY>=r.top&&ne.clientY<=r.bottom;
    });
    if(item){ showItemCtxMenu(ne, item); }
    else if(S.tool==='select'){ showCanvasCtxMenu(ne); }
  }, 600);
}
function _cancelLongPress(){
  if(_longPressTimer){ clearTimeout(_longPressTimer); _longPressTimer=null; }
}

// Patch strokeAttrs to support pressure
let _currentPressure = 0.5;
const _origStrokeAttrs = strokeAttrs;
strokeAttrs = function(){
  const a = _origStrokeAttrs();
  if(_stylusActive && S.tool==='pen' && _currentPressure !== 0.5){
    a['stroke-width'] = effectiveStrokeSize(_currentPressure);
  }
  return a;
};

// ═══════════════════════════════════════════════
//  PAN + EVENTS
// ═══════════════════════════════════════════════
let isPanning=false,panStart=null;
// ── Unified Pointer/Touch/Stylus + Mouse handler (Canvas-Ebene) ──
function _onCanvasPointerDown(e){
  // UI-Elemente nicht unterbrechen — buttons, toolbar, panels bekommen Events zuerst
  if(e.target.closest('#header,#toolbar,#side-panel,#mini-ctrl,#layer-panel,#board-panel,#ctx-menu,#modal-overlay,#viewer-overlay,.note-opt-panel,.folder-window,.hdr-btn,.tool-btn,.side-btn,.mini-btn')) return;
  const ne = normEvent(e);

  // Palm rejection: ignore touch if stylus is actively drawing
  if(_stylusActive && ne.pointerType==='touch' && isDrawing) return;

  // Wenn Pinch läuft → alles andere blockieren
  const _touchPtrCount=[..._pointers.values()].filter(p=>p.type==='touch').length;
  if(_touchPtrCount >= 2 || _itemPinchLocked) { e.preventDefault(); return; }

  closeDropdown();
  if(document.activeElement
    &&(document.activeElement.tagName==='TEXTAREA'||document.activeElement.tagName==='INPUT')
    &&ne.target.tagName!=='TEXTAREA'
    &&ne.target.tagName!=='INPUT'
    &&!ne.target.closest('.note-item')
    &&!ne.target.closest('.note-opt-panel')
    &&!document.activeElement.dataset?.boarddeskInput){
    document.activeElement.blur();
  }

  // Deselect auf leerem Canvas — erweiterte Bedingung
  const _onEmpty = (
    ne.target===canvas||ne.target===canvasWrap||
    ne.target.id==='canvas'||ne.target.id==='items-layer'||ne.target.id==='grid-overlay'||
    ne.target===drawLayer||
    ne.target.id==='bg-fixed'||ne.target.id==='bg-overlay'||
    ne.target.closest?.('#bg-fixed,#bg-overlay') ||
    (!ne.target.closest?.('.item,.folder-item,.folder-window,.note-opt-panel,.svg-resize-handle,#toolbar,#header,#side-panel,#mini-ctrl,#layer-panel,#board-panel,#ctx-menu,#modal-overlay,#viewer-overlay,#multi-select-bar,button,input,select,textarea,a'))
  );
  if(_onEmpty){
    document.querySelectorAll('.svg-selected').forEach(x=>x.classList.remove('svg-selected'));
    document.querySelectorAll('.svg-resize-handle').forEach(h=>h.remove());
    const sp=$('stroke-picker');if(sp&&!DRAW_TOOLS.includes(S.tool)) sp.classList.remove('open');
    const tp=$('text-picker');if(tp) tp.style.display='none';
    if(S.tool==='select' && S.selectedIds.size>0) clearSelection();
  }

  // Middle button or pan tool = pan; touch on empty canvas in select mode = pan
  const isTouchOnEmptyCanvas = ne.pointerType==='touch' && S.tool==='select' && !ne.target.closest('.item');
  if(ne.button===1||(ne.button===0&&S.tool==='pan')||isTouchOnEmptyCanvas){
    isPanning=true;panStart={x:ne.clientX-S.panX,y:ne.clientY-S.panY};
    canvasWrap.style.cursor='grabbing';e.preventDefault();return;
  }
  if(ne.button!==0) return;

  if(DRAW_TOOLS.includes(S.tool)){
    handleDrawStart(ne);
    return;
  }
  if(S.tool==='select'){
    const dlayers=$('draw-layers');
    if(dlayers){
      dlayers.style.pointerEvents='all';
      dlayers.querySelectorAll('.layer-svg').forEach(s=>s.style.pointerEvents='all');
      dlayers.querySelectorAll('.layer-svg > *:not(defs)').forEach(el=>el.style.pointerEvents='all');
      const allHits=document.elementsFromPoint(ne.clientX,ne.clientY);
      dlayers.style.pointerEvents='none';
      dlayers.querySelectorAll('.layer-svg').forEach(s=>s.style.pointerEvents='');
      dlayers.querySelectorAll('.layer-svg > *:not(defs)').forEach(el=>el.style.pointerEvents='');
      const svgShape=allHits.find(el=>{
        if(!el.closest('#draw-layers')) return false;
        if(el.classList&&el.classList.contains('svg-resize-handle')) return false;
        return /^(path|line|rect|ellipse|circle|polyline|polygon)$/i.test(el.tagName);
      });
      if(svgShape){startSvgDrag(ne,svgShape);return;}
    }
    _lassoStart=ne;
  }
}

function _onWindowPointerMove(e){
  const ne = normEvent(e);
  // Scroll-Unterbrechung verhindern
  if(ne.pointerType!=='mouse') e.preventDefault();
  if(_pointers.has(ne.pointerId)) _pointers.set(ne.pointerId,{x:ne.clientX,y:ne.clientY,type:ne.pointerType});
  if(ne.pointerType==='pen') _currentPressure=ne.pressure||0.5;

  // Wenn Viewer offen: keine Canvas-Events (Buttons im Viewer bleiben klickbar)
  const _ov=$('viewer-overlay');
  if(_ov && _ov.style.display!=='none'){
    if(isDrawing){isDrawing=false;drawEl=null;}
    return;
  }

  // Pinch nur wenn 2+ TOUCH-Pointer (nicht Stift zählen — Samsung Flip sendet beides gleichzeitig)
  const touchPointers=[..._pointers.values()].filter(p=>p.type==='touch');
  const activePinch = touchPointers.length>=2;

  // Multi-touch pinch aktiv → NUR Element zoomen, Canvas + alles andere eingefroren
  if(activePinch){
    _cancelLongPress();
    isPanning=false;
    _updatePinch();
    return;
  }

  // Resize-Handle aktiv → Canvas und alle anderen Elemente komplett eingefroren
  if(_resizeActive) return;

  // Item-Pinch gerade beendet (ein Finger noch oben) → noch blockieren bis pointerup
  if(_itemPinchLocked) return;

  // Cancel long press on move
  if(_longPressTimer) _cancelLongPress();

  if(isPanning){
    S.panX=ne.clientX-panStart.x;S.panY=ne.clientY-panStart.y;
    if(!_rafPan) _rafPan=requestAnimationFrame(()=>{applyTransform();_rafPan=null;});
    else { applyTransform(); } // fallback if RAF already queued
    return;
  }
  if(isDrawing){
    // Use coalesced events for smoother pen strokes
    const events = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];
    events.forEach(ce=>handleDrawMove(normEvent(ce)));
    return;
  }
  if(isErasing){doErase(ne);return;}
  // Lasso starten wenn Bewegung auf leerem Canvas > 6px
  if(_lassoStart&&!selActive&&!isPanning&&!isDrawing){
    const dx=Math.abs(ne.clientX-_lassoStart.clientX);
    const dy=Math.abs(ne.clientY-_lassoStart.clientY);
    if(dx>6||dy>6){
      clearSelection();
      const r=canvasWrap.getBoundingClientRect();
      selStart={x:_lassoStart.clientX-r.left,y:_lassoStart.clientY-r.top};
      selActive=true;
      _lassoStart=null;
    }
  }
  updateSelBox(ne);
  updateFolderDragOut(ne);
}

function _onWindowPointerUp(e){
  const ne = normEvent(e);
  _pointers.delete(ne.pointerId);
  _lassoStart=null;
  _cancelLongPress();
  if([..._pointers.values()].filter(p=>p.type==='touch').length < 2){
    _pinchStartDist=null;
    _pinchItem=null;
    _itemPinchLocked=false;
  }
  if(ne.pointerType==='pen' && _pointers.size===0) _stylusActive=false;

  if(isPanning){isPanning=false;canvasWrap.style.cursor=S.tool==='pan'?'grab':'default';}
  if(isDrawing) handleDrawEnd(ne);
  isErasing=false;
  endSelBox(ne);
  endFolderDragOut(ne);
}

// ── Zuverlässige Button-Verdrahtung für Samsung Flip / WebView2 ────────────
// Nutzt pointerup direkt (nicht click) — click-Synthese nach Touch ist in
// WebView2 unzuverlässig wenn touch-action oder pointer capture aktiv war.
function _wireTapBtn(elOrId, fn){
  const el = typeof elOrId === 'string' ? document.getElementById(elOrId) : elOrId;
  if(!el) return;
  let _startX=0, _startY=0, _lastFire=0;
  el.addEventListener('pointerdown', e=>{
    _startX=e.clientX; _startY=e.clientY;
  }, {passive:true, capture:false});
  el.addEventListener('pointerup', e=>{
    const dx=Math.abs(e.clientX-_startX), dy=Math.abs(e.clientY-_startY);
    if(dx>14||dy>14) return;
    const now=Date.now();
    if(now-_lastFire<350) return;
    _lastFire=now;
    // Kein stopPropagation — _onWindowPointerUp muss für Cleanup laufen
    fn(e);
  }, {capture:false});
  // Maus/Desktop-Fallback
  el.addEventListener('click', e=>{
    const now=Date.now();
    if(now-_lastFire<350) return; // verhindert Doppelfeuer nach pointerup
    _lastFire=now;
    fn(e);
  });
}

// _wireAllButtons wird am Ende des Scripts aufgerufen (nach allen Funktionsdefinitionen)

// Stale Pointer nach 3s automatisch entfernen
// (Falls pointerup durch Systemdialog verschluckt wurde)
setInterval(()=>{
  if(_pointers.size>0 && !isPanning && !isDrawing && !_itemPinchLocked && !_resizeActive){
    _pointers.clear();
    _pinchStartDist=null;
    _pinchItem=null;
    _itemPinchLocked=false;
  }
}, 3000);

// Register pointer events (works for mouse, touch, stylus)
// pointerdown auf window — für leere Canvas-Fläche und Items beim Zeichnen
window.addEventListener('pointerdown', function(e){
  // Wenn Viewer offen → keine Canvas-Verarbeitung (Buttons im Viewer müssen klickbar bleiben)
  const ov=$('viewer-overlay');
  if(ov && ov.style.display!=='none') return;
  const isDrawMode=DRAW_TOOLS.includes(S.tool);
  // Im Zeichenmodus: Items als Zeichenziel erlauben (kein Drag durch makeDraggable)
  // Im Auswählen-Modus: Items/Ordner haben eigene Handler → hier raus
  if(!isDrawMode && e.target.closest('.item,.folder-item')) return;
  // UI-Elemente immer ausschließen
  if(e.target.closest('#header,#toolbar,#side-panel,#mini-ctrl,#layer-panel,#board-panel,#ctx-menu,#modal-overlay,#viewer-overlay,#folders-overlay,.folder-window,.file-burger,.dd-item,button,input,select,a')) return;
  // Nur im canvas-wrap-Bereich
  const r=canvasWrap.getBoundingClientRect();
  if(e.clientX<r.left||e.clientX>r.right||e.clientY<r.top||e.clientY>r.bottom) return;
  _onCanvasPointerDown(e);
}, {passive:false, capture:false});

// ── Globales Pointer-Tracking (capture-Phase) ──────────────────────────────
// MUSS vor canvasWrap und item-Handlern feuern (capture:true), damit
// _pointers ALLE Finger enthält — auch wenn makeDraggable stopPropagation ruft.
// WICHTIG: Nur Pointer auf Canvas/Items tracken — NICHT auf UI-Elementen (Buttons,
// Header, Toolbar, Datei-Inputs). Sonst landen Stale-Pointer in _pointers wenn
// ein Systemdialog (Dateiauswahl) das pointerup abfängt.
window.addEventListener('pointerdown', function _globalPinchSetup(e){
  if(e.pointerType==='mouse') return; // Maus braucht kein Multi-Touch-Tracking
  if(e.pointerType==='pen'){ _stylusActive=true; _currentPressure=e.pressure||0.5; }

  // UI-Elemente explizit ausschließen — verhindert stale Pointer aus Dialogen
  const onUI=e.target.closest(
    '#header,#toolbar,#side-panel,#mini-ctrl,#layer-panel,#board-panel,' +
    '#ctx-menu,#modal-overlay,#viewer-overlay,.note-opt-panel,.folder-window,' +
    '.hdr-btn,.tool-btn,.side-btn,.mini-btn,button,input,select,a,' +
    '#import-input,#file-upload,#img-upload,#bg-upload-input,#folder-file-input,' +
    // Resize-Handles + Ordner-Icons: eigene Drag-Handler, kein Pinch-Tracking nötig
    '.img-rh,.img-resize-h,.svg-resize-handle,.folder-resize-handle,.folder-item'
  );
  if(onUI) return;

  // Wenn Resize aktiv → keine weiteren Pointer tracken
  if(_resizeActive) return;

  _pointers.set(e.pointerId, {x:e.clientX, y:e.clientY, type:e.pointerType});

  else if(S.tool==='circle'){let rx=Math.abs(p.x-drawStart.x)/2,ry=Math.abs(p.y-drawStart.y)/2;if(e.shiftKey){const r=Math.max(rx,ry);rx=r;ry=r;}drawEl.setAttribute('cx',drawStart.x+(p.x-drawStart.x)/2);drawEl.setAttribute('cy',drawStart.y+(p.y-drawStart.y)/2);drawEl.setAttribute('rx',rx);drawEl.setAttribute('ry',ry);}
}
function handleDrawEnd(e){
  isDrawing=false;
  if(drawEl){
    // For pen: add final endpoint to close any gap from coalesced events
    if(e && drawEl.tagName==='path' && drawStart){
      const p=cpt(e);
      const pd=drawEl.getAttribute('d');
      if(pd) drawEl.setAttribute('d',pd+` L${p.x} ${p.y}`);
    }
    const tag=drawEl.tagName;
    const trivial=(tag==='rect'&&(+drawEl.getAttribute('width')<2||+drawEl.getAttribute('height')<2))||(tag==='ellipse'&&(+drawEl.getAttribute('rx')<2||+drawEl.getAttribute('ry')<2));
    if(trivial){drawEl.remove();S.drawings.pop();}
    else{
      drawEl.dataset.did='d'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
      pushUndo({type:'drawing',el:drawEl});  // für Strg+Z
      // Neue Zeichnung: SVG-Ebene ganz oben in ihrer Band platzieren
      const _al=getActiveLayer();
      if(_al){ _al._svgZ=800; applyLayerOrder(); }
      scheduleRenderLayerList();
    }
  }
  drawEl=null;drawStart=null;
}
function doErase(e){if(isLayerLocked(getActiveLayer()?.id))return;
  const dl=$('draw-layers');if(!dl)return;
  dl.style.pointerEvents='all';
  dl.querySelectorAll('.layer-svg').forEach(s=>s.style.pointerEvents='all');
  dl.querySelectorAll('.layer-svg > *:not(defs)').forEach(el=>el.style.pointerEvents='all');
  const hits=document.elementsFromPoint(e.clientX,e.clientY);
  dl.style.pointerEvents='none';
  dl.querySelectorAll('.layer-svg').forEach(s=>s.style.pointerEvents='');
  dl.querySelectorAll('.layer-svg > *:not(defs)').forEach(el=>el.style.pointerEvents='');
  const shape=hits.find(el=>/^(path|line|rect|ellipse|circle|polyline|polygon)$/i.test(el.tagName)&&el.closest('#draw-layers')&&!(el.classList&&el.classList.contains('svg-resize-handle')));
  if(shape){
    const i=S.drawings.indexOf(shape);
    if(i!==-1) S.drawings.splice(i,1);
    shape.remove();
    renderLayerList();
  }
}

// Virtual keyboard helper
function ensureKeyboard(target){
  if(!target) return;
  if(target.setAttribute){
    target.setAttribute('inputmode','text');
    if(target.tagName==='INPUT'||target.tagName==='TEXTAREA'){
      target.removeAttribute('readonly');
      target.setAttribute('autocomplete','off');
    }
  }
  // Synchronous focus — must stay in user gesture chain
  target.focus();
  if(target.tagName==='INPUT'||target.tagName==='TEXTAREA'){
    try{ const l=target.value.length; target.setSelectionRange(l,l); }catch(_){}
  } else if(target.contentEditable==='true'){
    try{
      const r=document.createRange();r.selectNodeContents(target);r.collapse(false);
      window.getSelection().removeAllRanges();window.getSelection().addRange(r);
    }catch(_){}
  }
  // Second focus after micro-task (handles Samsung Flip quirk)
  Promise.resolve().then(()=>{ target.focus(); });
}

function placeText(e){
  const p=cpt(e);
  const fs=S.textSize||18;
  const ff=S.textFont||'sans-serif';
  const screenX=p.x*S.zoom+S.panX;
  const screenY=p.y*S.zoom+S.panY;
  const wrap=canvasWrap.getBoundingClientRect();
  let committed=false;
  // Sperre: Overlay darf erst NACH dem laufenden Pointer-Zyklus reagieren.
  // Sonst feuert der Browser sofort einen synthetischen pointerdown auf das
  // frisch eingefügte Overlay → commit() → Input verschwindet sofort.
  let overlayReady=false;

  const inp=document.createElement('input');
  const left=Math.max(8,Math.min(screenX+wrap.left, window.innerWidth-320));
  const top=Math.max(60,Math.min(screenY+wrap.top, window.innerHeight-120));
  inp.style.cssText=`position:fixed;left:${left}px;top:${top}px;min-width:220px;max-width:420px;z-index:9000;background:rgba(14,15,17,.97);border:2px solid var(--accent);color:var(--text);font-family:${ff};font-size:${Math.max(16,Math.round(fs*S.zoom))}px;padding:8px 12px;border-radius:8px;outline:none;box-shadow:0 4px 20px rgba(0,0,0,.6);`;
  inp.placeholder='Text eingeben…';
  inp.setAttribute('inputmode','text');
  inp.setAttribute('enterkeyhint','done');
  inp.setAttribute('autocomplete','off');
  // Vorab-Fokus via tabindex damit focus() zuverlässig klappt
  inp.setAttribute('tabindex','0');

  const okBtn=document.createElement('button');
  okBtn.textContent='✓ OK';
  okBtn.style.cssText=`position:fixed;left:${left}px;top:${top-42}px;z-index:9001;background:var(--accent);color:#000;border:none;border-radius:8px;padding:7px 18px;font-size:15px;cursor:pointer;font-family:var(--mono);font-weight:700;box-shadow:0 2px 10px rgba(0,0,0,.5);`;

  const removeAll=()=>{
    [overlay,inp,okBtn].forEach(x=>{try{document.body.removeChild(x);}catch(_){}});
  };
  const commit=()=>{
    if(committed)return;
    committed=true;
    _activePlaceTextCommit=null;
    const val=inp.value.trim();
    removeAll();
    if(val) createItem('text-label',{x:p.x,y:p.y,text:val,color:S.textColor||S.strokeColor,fontSize:fs,font:ff,bold:S.textBold,italic:S.textItalic,opacity:S.strokeOpacity});
    setTool('select');
  };

  // Overlay: blockiert Canvas-Events nachdem der aktuelle Tap-Zyklus abgeschlossen ist
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;z-index:8999;background:transparent;cursor:text;';
  overlay.addEventListener('pointerdown',ev=>{
    if(!overlayReady) return; // aktuellen Tap-Zyklus ignorieren
    ev.stopPropagation();ev.preventDefault();commit();
  });
  overlay.addEventListener('click',ev=>{
    if(!overlayReady) return;
    ev.stopPropagation();
  });

  inp.addEventListener('pointerdown',ev=>{ev.stopPropagation();});
  inp.addEventListener('mousedown',ev=>{ev.stopPropagation();ev.preventDefault();inp.focus();});
  inp.addEventListener('keydown',ev=>{
    ev.stopPropagation();
    if(ev.key==='Enter'){ev.preventDefault();commit();}
    else if(ev.key==='Escape'){removeAll();setTool('select');}
  });
  okBtn.addEventListener('pointerdown',ev=>{ev.stopPropagation();ev.preventDefault();commit();});

  // Kein blur-Commit — Eingabe bleibt bis Tool-Wechsel oder Enter/ESC/OK
  // _activePlaceTextCommit wird von setTool() aufgerufen
  _activePlaceTextCommit = commit;

  // Input zuerst einfügen (braucht keinen Timing-Schutz)
  document.body.appendChild(inp);
  document.body.appendChild(okBtn);
  document.body.appendChild(overlay);

  requestAnimationFrame(()=>{
    inp.focus();
    try{inp.setSelectionRange(0,0);}catch(_){}
    setTimeout(()=>{ overlayReady=true; }, 50);
  });
}

// ── Undo-Stack (max. 10 Aktionen) ────────────────────────────────────────────
const UNDO_LIMIT = 10;
const _undoStack = [];  // [{type, ...data}]
let _activePlaceTextCommit = null;  // commit-Fn der aktiven Texteingabe

function pushUndo(entry){
  _undoStack.push(entry);
  if(_undoStack.length > UNDO_LIMIT) _undoStack.shift();
}

function undoStroke(){
  if(!_undoStack.length) return;
  const entry = _undoStack.pop();
  switch(entry.type){
    case 'drawing': {
      // Letzten SVG-Strich entfernen
      const el = entry.el;
      if(el && el.parentNode) el.remove();
      const idx = S.drawings.indexOf(el);
      if(idx !== -1) S.drawings.splice(idx,1);
      break;
    }
    case 'item-create': {
      // Erstelltes Item löschen
      const it = S.items.find(i=>i.id===entry.id);
      if(it){ S.items.splice(S.items.indexOf(it),1); }
      $('item-'+entry.id)?.remove();
      S.selectedIds.delete(entry.id);
      break;
    }
    case 'item-delete': {
      // Gelöschtes Item wiederherstellen
      S.items.push(entry.snapshot);
      renderItem(entry.snapshot);
      break;
    }
    case 'item-move': {
      const it = S.items.find(i=>i.id===entry.id);
      const el2 = $('item-'+entry.id);
      if(entry.isFolder){
        if(it){ it._screenX=entry.x; it._screenY=entry.y; }
        if(el2){ el2.style.left=entry.x+'px'; el2.style.top=entry.y+'px'; }
      } else {
        if(it){ it.x=entry.x; it.y=entry.y; }
        if(el2){ el2.style.left=entry.x+'px'; el2.style.top=entry.y+'px'; }
      }
      break;
    }
    case 'item-text': {
      // Text-Änderung rückgängig
      const it = S.items.find(i=>i.id===entry.id);
      if(it){ it.text=entry.text; renderItem(it); }
      break;
    }
  }
  renderLayerList();
  scheduleSave();
}


// ── PDF.js Render-Hilfsfunktion ──────────────────────────────────────────────
// Rendert PDFs aus data:-URLs auf <canvas> (funktioniert überall, kein Plugin nötig).
async function renderPdfToCanvas(dataUrl, targetCanvas, pageNum=1, scale=1.5){
  const lib = await window._pdfjsReady;
  if(!lib) throw new Error('PDF.js nicht verfügbar — Internetverbindung prüfen');
  let pdfData;
  if(dataUrl.startsWith('data:')){
    const base64 = dataUrl.split(',')[1];
    const binary = atob(base64);
    pdfData = new Uint8Array(binary.length);
    for(let i=0;i<binary.length;i++) pdfData[i]=binary.charCodeAt(i);
  } else {
    pdfData = dataUrl;
  }
  const loadingTask = lib.getDocument({ data: pdfData, isOffscreenCanvasSupported: false, useSystemFonts: true });
  const pdf = await loadingTask.promise;
  const page = await pdf.getPage(pageNum);
  const dpr = window.devicePixelRatio || 1;
  const viewport = page.getViewport({ scale: scale * dpr });
  targetCanvas.width  = viewport.width;
  targetCanvas.height = viewport.height;
  targetCanvas.style.width  = Math.round(viewport.width / dpr) + 'px';
  targetCanvas.style.height = Math.round(viewport.height / dpr) + 'px';
  await page.render({ canvasContext: targetCanvas.getContext('2d'), viewport }).promise;
  return { numPages: pdf.numPages, pdf };
}

// Baut einen kompletten mehrseitigen PDF-Viewer als DOM-Fragment
// Gibt das fertige Wrapper-Element zurück
async function buildPdfViewer(dataUrl, name, containerH='100%', initialScale=1.5){
  const wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex;flex-direction:column;width:100%;height:'+containerH+';';

  // Toolbar
  const bar = document.createElement('div');
  bar.style.cssText = 'display:flex;align-items:center;gap:6px;padding:4px 6px;flex-shrink:0;background:var(--surface2);border-bottom:1px solid var(--border);border-radius:8px 8px 0 0;';

  const btnSt = 'background:var(--surface);border:1px solid var(--border);color:var(--text-dim);border-radius:5px;padding:2px 10px;cursor:pointer;font-family:var(--mono);font-size:12px;';
  const prevBtn = document.createElement('button'); prevBtn.textContent='◀'; prevBtn.style.cssText=btnSt;
  const nextBtn = document.createElement('button'); nextBtn.textContent='▶'; nextBtn.style.cssText=btnSt;
  const pageLbl = document.createElement('span');
  pageLbl.style.cssText='font-size:11px;font-family:var(--mono);color:var(--text-dim);min-width:70px;text-align:center;';
  const zOutBtn = document.createElement('button'); zOutBtn.textContent='−'; zOutBtn.style.cssText=btnSt;
  const zInBtn  = document.createElement('button'); zInBtn.textContent='+';  zInBtn.style.cssText=btnSt;
  const zLbl    = document.createElement('span');
  zLbl.style.cssText='font-size:11px;font-family:var(--mono);color:var(--text-dim);min-width:44px;text-align:center;';
  const dlBtn   = document.createElement('a');
  dlBtn.href=dataUrl; dlBtn.download=name||'dokument.pdf';
  dlBtn.style.cssText='margin-left:auto;font-size:11px;font-family:var(--mono);color:var(--accent);text-decoration:none;padding:3px 10px;border:1px solid var(--accent);border-radius:5px;';
  dlBtn.textContent='⬇ PDF';

  bar.append(prevBtn, pageLbl, nextBtn, document.createElement('div'), zOutBtn, zLbl, zInBtn, dlBtn);

  // Canvas-Scrollbereich
  const scroller = document.createElement('div');
  scroller.style.cssText='flex:1;overflow:auto;background:#525659;display:flex;justify-content:center;align-items:flex-start;padding:12px;touch-action:pan-x pan-y;';
  // Wheel-Events im PDF-Scroller nicht ans Canvas weitergeben
  scroller.addEventListener('wheel',e=>e.stopPropagation(),{passive:true});
  scroller.addEventListener('touchstart',e=>e.stopPropagation(),{passive:true});
  scroller.addEventListener('touchmove',e=>e.stopPropagation(),{passive:true});
  // Im Zeichenmodus: kein stopPropagation → Events erreichen window-Handler für Zeichnen
  scroller.addEventListener('pointerdown',e=>{
    if(!DRAW_TOOLS.includes(S.tool)) e.stopPropagation();
  });
  const canvas = document.createElement('canvas');
  canvas.style.cssText='box-shadow:0 2px 12px rgba(0,0,0,.5);border-radius:3px;max-width:100%;';
  scroller.appendChild(canvas);
  wrap.appendChild(bar);
  wrap.appendChild(scroller);

  // Lade-State
  let curPage=1, numPages=1, curScale=initialScale, pdfDoc=null;
  let rendering=false;

  const loadingMsg = document.createElement('div');
  loadingMsg.style.cssText='color:var(--text-dim);font-family:var(--mono);font-size:12px;padding:20px;';
  loadingMsg.textContent='PDF wird geladen…';
  scroller.insertBefore(loadingMsg, canvas);

  async function renderPage(){
    if(rendering) return;
    rendering=true;
    try{
      if(!pdfDoc){
        const lib = await window._pdfjsReady;
        if(!lib) throw new Error('PDF.js nicht geladen — Internetverbindung prüfen');
        // data:-URL → Uint8Array — zuverlässiger als URL-Übergabe in WebView2/Tauri
        let pdfData;
        if(dataUrl.startsWith('data:')){
          const base64 = dataUrl.split(',')[1];
          const binary = atob(base64);
          pdfData = new Uint8Array(binary.length);
          for(let i=0;i<binary.length;i++) pdfData[i]=binary.charCodeAt(i);
        } else {
          pdfData = dataUrl; // URL direkt falls kein data:-Schema
        }
        const task = lib.getDocument({ data: pdfData, isOffscreenCanvasSupported: false, useSystemFonts: true });
        pdfDoc = await task.promise;
        numPages = pdfDoc.numPages;
        if(scroller.contains(loadingMsg)) loadingMsg.remove();
      }
      const page = await pdfDoc.getPage(curPage);
      const dpr = window.devicePixelRatio||1;
      const vp = page.getViewport({ scale: curScale * dpr });
      canvas.width=vp.width; canvas.height=vp.height;
      canvas.style.width=Math.round(vp.width/dpr)+'px';
      canvas.style.height=Math.round(vp.height/dpr)+'px';
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0,0,canvas.width,canvas.height);
      await page.render({ canvasContext: ctx, viewport: vp }).promise;
      pageLbl.textContent = curPage+' / '+numPages;
      zLbl.textContent    = Math.round(curScale*100)+'%';
      prevBtn.disabled    = curPage<=1;
      nextBtn.disabled    = curPage>=numPages;
    }catch(err){
      console.error('PDF render error:', err);
      loadingMsg.textContent='PDF-Fehler: '+err.message;
      if(!scroller.contains(loadingMsg)) scroller.insertBefore(loadingMsg,canvas);
    }
    rendering=false;
  }

  prevBtn.onclick = ()=>{ if(curPage>1){ curPage--; renderPage(); }};
  nextBtn.onclick = ()=>{ if(curPage<numPages){ curPage++; renderPage(); }};
  zOutBtn.onclick = ()=>{ curScale=Math.max(0.4,curScale*0.8); renderPage(); };
  zInBtn.onclick  = ()=>{ curScale=Math.min(5,curScale*1.25); renderPage(); };

  // Ersten Render nach nächstem Frame starten (wrap muss im DOM sein)
  requestAnimationFrame(()=>renderPage());
  return wrap;
}

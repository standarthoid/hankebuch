function generateDeadlines(year,settings){
  const out=[];
  if(!settings.kleinunternehmer){
    if(settings.vatCycle==='quarterly'){
      out.push({date:`${year}-04-10`,title:`USt-Voranmeldung Q1 ${year}`,description:'Quartalsweise USt-VA (Jan–Mär).'});
      out.push({date:`${year}-07-10`,title:`USt-Voranmeldung Q2 ${year}`,description:'Quartalsweise USt-VA (Apr–Jun).'});
      out.push({date:`${year}-10-10`,title:`USt-Voranmeldung Q3 ${year}`,description:'Quartalsweise USt-VA (Jul–Sep).'});
      out.push({date:`${year+1}-01-10`,title:`USt-Voranmeldung Q4 ${year}`,description:'Quartalsweise USt-VA (Okt–Dez).'});
    } else {
      for(let m=0;m<12;m++){
        const fm=m+1;const fy=fm===12?year+1:year;const fmIdx=fm===12?0:fm;
        const d=new Date(fy,fmIdx,10);
        out.push({date:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-10`,title:`USt-Voranmeldung ${monthName(m)} ${year}`,description:`Monatliche USt-VA.`});
      }
    }
  }
  ['03','06','09','12'].forEach(m=>out.push({date:`${year}-${m}-10`,title:`Einkommensteuer-Vorauszahlung`,description:`Quartalsweise Vorauszahlung.`}));
  const py=year-1;
  if(settings.hasTaxAdvisor)out.push({date:`${year+1}-02-28`,title:`Steuererklärung ${py} (mit Berater)`,description:`Verlängerte Abgabefrist ${py}.`});
  else out.push({date:`${year}-07-31`,title:`Steuererklärung ${py}`,description:`Abgabefrist ${py}.`});
  return out;
}

function exportCSV(year){
  const list=state.transactions.filter(t=>t.date.startsWith(String(year)));
  list.sort((a,b)=>a.date.localeCompare(b.date));
  const header=['Datum','Typ','Kategorie','Beschreibung','Geschäftspartner','Beleg-Nr','Netto','USt-Satz','USt-Betrag','Brutto','Belege','Notizen'];
  const rows=list.map(t=>[t.date,t.type==='income'?'Einnahme':'Ausgabe',t.category,(t.description||''),(t.contact||''),(t.invoiceNumber||''),toCsvNum(t.net),t.vatRate+'%',toCsvNum(t.vat),toCsvNum(t.gross),(t.receiptIds||[]).length+' Beleg(e)',(t.notes||'').replace(/\n/g,' ')]);
  const csv=[header,...rows].map(r=>r.map(csvCell).join(';')).join('\r\n');
  download(`hankebuch_${year}.csv`,'\uFEFF'+csv,'text/csv;charset=utf-8');
}
function csvCell(v){const s=String(v??'');return /[;"\r\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;}
function toCsvNum(n){return(n??0).toFixed(2).replace('.', ',');}

// Kollege Bank/Kasse als Gegenkonto (typisch SKR03 1200 = Bank)
const SKR03_BANK_KONTO = '1200';

// DATEV-Steuerschlüssel (Mehrwertsteuer-Schlüssel SKR03)
function datevTaxKey(rate, type){
  // type = income oder expense; Hankebuch Sätze: 19, 7, 0
  if(type==='income'){
    if(rate===19)return '3'; // Erlöse 19% USt
    if(rate===7) return '2'; // Erlöse 7% USt
    return '0';
  } else {
    if(rate===19)return '9'; // Vorsteuer 19%
    if(rate===7) return '8'; // Vorsteuer 7%
    return '0';
  }
}

function safeFilename(s){return String(s||'').replace(/[\\/:*?"<>|]/g,'_').replace(/\s+/g,'_').slice(0,80);}

// Erzeugt das DATEV-CSV (vereinfachter Buchungsstapel) für ein Jahr
function buildDatevCSV(year){
  const transactions=state.transactions.filter(t=>t.date.startsWith(String(year)));
  transactions.sort((a,b)=>a.date.localeCompare(b.date));
  const wj=year;
  const headerRow1=[
    '"EXTF"',                    // Format-Kennzeichen
    '700',                        // Versionsnummer
    '21',                         // Datenkategorie: 21 = Buchungsstapel
    '"Buchungsstapel"',           // Formatname
    '12',                         // Formatversion
    new Date().toISOString().replace(/\D/g,'').slice(0,14)+'000',  // Erzeugt am
    '',                           // Importiert
    '"hb"',                       // Herkunft
    '"Hankebuch"',                // Exportiert von
    '"Hankebuch"',                // Importiert von
    '',                           // Beraternummer
    '',                           // Mandantennummer
    `${wj}0101`,                  // WJ-Beginn
    '4',                          // Sachkontenlänge
    `${wj}0101`,                  // Datum von
    `${wj}1231`,                  // Datum bis
    `"Hankebuch ${wj}"`,          // Bezeichnung
    `"${(state.settings.ownerName||state.settings.businessName||'').replace(/"/g,'')}"`,  // Diktatkürzel
    '1',                          // Buchungstyp: 1 = Finanzbuchführung
    '0',                          // Rechnungslegungszweck
    '0',                          // Festschreibung: 0 = keine
    '"EUR"',                      // WKZ
    '','','','','',''             // Reserve-Felder
  ].join(';');

  // Spaltenüberschriften (Hauptversion 700 / Format 12)
  const headerRow2=[
    'Umsatz (ohne Soll/Haben-Kz)','Soll/Haben-Kennzeichen','WKZ Umsatz',
    'Kurs','Basis-Umsatz','WKZ Basis-Umsatz',
    'Konto','Gegenkonto (ohne BU-Schlüssel)','BU-Schlüssel',
    'Belegdatum','Belegfeld 1','Belegfeld 2',
    'Skonto','Buchungstext'
  ].join(';');

  const rows=transactions.map(t=>{
    const isIncome=t.type==='income';
    const skrKonto=isIncome
      ? (SKR03_INCOME_MAP[t.category]||'8400')
      : (SKR03_EXPENSE_MAP[t.category]||'4900');
    // Bei Einnahmen: Gegenkonto = Bank, Konto = Erlöskonto, S/H = H (Haben)
    // Bei Ausgaben: Gegenkonto = Bank, Konto = Aufwandskonto, S/H = S (Soll)
    // Vereinfachung für EÜR: Wir buchen brutto gegen Bank.
    const umsatz=Math.abs(t.gross||0).toFixed(2).replace('.', ',');
    const sh=isIncome?'H':'S';
    const konto=skrKonto;
    const gegenkonto=SKR03_BANK_KONTO;
    const buSchluessel=datevTaxKey(t.vatRate||0, t.type);
    const dt=(t.date||'').slice(5).replace('-','')+''; // ddmm
    const dateForDatev=dt.slice(2,4)+dt.slice(0,2);     // tt+mm = ttmm
    const beleg1=(t.invoiceNumber||t.id||'').toString().slice(0,36);
    const text=((t.description||'')+(t.contact?' · '+t.contact:'')).replace(/[\r\n]/g,' ').slice(0,60);
    return [
      umsatz,
      sh,
      'EUR',
      '','', '',
      konto,
      gegenkonto,
      buSchluessel,
      dateForDatev,
      `"${beleg1.replace(/"/g,"'")}"`,
      '',
      '',
      `"${text.replace(/"/g,"'")}"`,
    ].join(';');
  });
  return [headerRow1, headerRow2, ...rows].join('\r\n');
}

    // 2) Standard-CSV (gleich wie exportCSV, nur in ZIP)
    const stdHeader=['Datum','Typ','Kategorie','Beschreibung','Geschäftspartner','Beleg-Nr','Netto','USt-Satz','USt-Betrag','Brutto','Belege','Notizen'];
    const stdRows=yearTx.map(t=>[t.date,t.type==='income'?'Einnahme':'Ausgabe',t.category,(t.description||''),(t.contact||''),(t.invoiceNumber||''),toCsvNum(t.net),(t.vatRate||0)+'%',toCsvNum(t.vat),toCsvNum(t.gross),(t.receiptIds||[]).length+' Beleg(e)',(t.notes||'').replace(/\n/g,' ')]);
    const stdCsv=[stdHeader,...stdRows].map(r=>r.map(csvCell).join(';')).join('\r\n');
    zip.file(`journal_${year}.csv`, '\uFEFF'+stdCsv);

    // 3) DATEV-CSV
    const datevCsv=buildDatevCSV(year);
    zip.file(`EXTF_Buchungsstapel_${year}.csv`, datevCsv);

    // 4) Belege sammeln
    const beleg=zip.folder('belege');
    const indexRows=[['Buchungs-ID','Datum','Typ','Beleg-Nr','Beschreibung','Brutto','Beleg-Datei']];
    let belegCount=0;
    for(const t of yearTx){
      const baseName=`${t.date}_${safeFilename((t.invoiceNumber||t.id).slice(0,20))}_${safeFilename((t.contact||t.description||'').slice(0,40))}`;
      if(t.receiptIds && t.receiptIds.length){
        for(let idx=0;idx<t.receiptIds.length;idx++){
          const rcptId=t.receiptIds[idx];
          try{
            const r=await loadReceipt(rcptId);
            if(!r||!r.data)continue;
            // base64 → binary (kann data:URL prefix haben)
            const b64=r.data.includes(',')?r.data.split(',')[1]:r.data;
            const ext=(r.filename||'').split('.').pop()||(r.mime?.includes('pdf')?'pdf':r.mime?.includes('jpeg')?'jpg':r.mime?.includes('png')?'png':'bin');
            const fname=`${baseName}_${idx+1}.${ext}`;
            beleg.file(fname, b64, {base64:true});
            indexRows.push([t.id,t.date,t.type==='income'?'Einnahme':'Ausgabe',(t.invoiceNumber||''),(t.description||''),toCsvNum(t.gross),`belege/${fname}`]);
            belegCount++;
          }catch(e){console.warn('Beleg konnte nicht gelesen werden:',rcptId,e);}
        }
      } else {
        indexRows.push([t.id,t.date,t.type==='income'?'Einnahme':'Ausgabe',(t.invoiceNumber||''),(t.description||''),toCsvNum(t.gross),'(kein Beleg)']);
      }
    }
    const indexCsv=indexRows.map(r=>r.map(csvCell).join(';')).join('\r\n');
    zip.file('INDEX.csv', '\uFEFF'+indexCsv);

    // 5) Rechnungen als HTML
    if(yearInv.length){
      const rFolder=zip.folder('rechnungen');
      for(const inv of yearInv){
        try{
          const html=`<!DOCTYPE html><html><head><meta charset="utf-8"><title>Rechnung ${escapeHtml(inv.number)}</title></head><body>${renderInvoicePdfHTML(inv)}</body></html>`;
          const fname=`${inv.date||'undatiert'}_${safeFilename(inv.number)}_${safeFilename((inv.recipient?.name||'').slice(0,40))}.html`;
          rFolder.file(fname, html);
        }catch(e){console.warn('Rechnung konnte nicht erzeugt werden:',inv.number,e);}
      }
    }

    // 6) Gutschriften als HTML
    if(yearCN.length){
      const gFolder=zip.folder('gutschriften');
      for(const cn of yearCN){
        try{
          const html=`<!DOCTYPE html><html><head><meta charset="utf-8"><title>${escapeHtml(cn.number)}</title></head><body>${renderCreditNotePdfHTML(cn)}</body></html>`;
          const fname=`${cn.issueDate||'undatiert'}_${safeFilename(cn.number)}_${safeFilename((cn.vendorSnapshot?.name||'').slice(0,40))}.html`;
          gFolder.file(fname, html);
        }catch(e){console.warn('Gutschrift konnte nicht erzeugt werden:',cn.number,e);}
      }
    }

    // ZIP generieren und herunterladen
    const blob=await zip.generateAsync({type:'blob',compression:'DEFLATE',compressionOptions:{level:6}});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download=`hankebuch_finanzamt_${year}_${todayISO()}.zip`;
    document.body.appendChild(a);a.click();
    setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},1000);
    toast(`Paket erstellt: ${yearTx.length} Buchungen, ${belegCount} Belege, ${yearInv.length} Rechnungen, ${yearCN.length} Gutschriften`);
  }catch(e){
    console.error(e);
    toast('Fehler beim Export: '+e.message);
  }
}


async function importWooCommerce(file){
  try{
    const text=await file.text();
    const data=JSON.parse(text);
    if(data.format!=='hankebuch_woocommerce_v1'){
      toast('Ungültiges Format – ist das eine Hankebuch-WooCommerce-Datei?');return;
    }
    if(!Array.isArray(data.orders)){toast('Keine Bestellungen gefunden');return;}
    const shopUrl=data.shop_url||'unknown';

    // --- Anbieter-Import aus Product Vendors ---
    let vendorsNew=0, vendorsUpdated=0, vendorsUnchanged=0;
    if(Array.isArray(data.vendors) && data.vendors.length){
      for(const pv of data.vendors){
        // Suche nach vorhandenem Anbieter in Hankebuch:
        //   1) über bereits gespeicherte productVendorId+Shop
        //   2) über E-Mail (case-insensitiv)
        //   3) über exakten Namen
        const pvEmail=(pv.email||'').toLowerCase().trim();
        const pvName=(pv.name||'').trim();
        let existing=state.vendors.find(v=>v.productVendorId===pv.vendor_id && v.productVendorShop===shopUrl);
        if(!existing && pvEmail) existing=state.vendors.find(v=>(v.email||'').toLowerCase().trim()===pvEmail);
        if(!existing && pvName) existing=state.vendors.find(v=>v.name===pvName);

        if(!existing){
          // Neu anlegen
          const newVendor={
            id:uid('ven'),
            createdAt:new Date().toISOString(),
            name:pvName || pv.vendor_slug || `Vendor #${pv.vendor_id}`,
            company:'',
            street:pv.address1 ? (pv.address2 ? `${pv.address1} ${pv.address2}` : pv.address1) : '',
            zip:pv.postcode || '',
            city:pv.city || '',
            country:pv.country || 'Deutschland',
            email:pv.email || '',
            phone:pv.phone || '',
            taxNumber:pv.tax_id || '',
            vatId:'',
            iban:'',
            bic:'',
            bankName:'',
            commissionPct:typeof pv.commission==='number' ? pv.commission : 15,
            kleinunternehmer:false,
            notes:pv.description || '',
            productVendorId:pv.vendor_id,
            productVendorShop:shopUrl,
          };
          state.vendors.push(newVendor);
          vendorsNew++;
        } else {
          // Intelligent aktualisieren: nur leere Felder ergänzen, nie überschreiben
          let changed=false;
          const updates={};
          const maybeSet=(key,value)=>{
            const cur=(existing[key]||'').toString().trim();
            const incoming=(value==null?'':value.toString()).trim();
            if(!cur && incoming){ updates[key]=value; changed=true; }
          };
          maybeSet('email', pv.email);
          maybeSet('phone', pv.phone);
          maybeSet('street', pv.address1 ? (pv.address2 ? `${pv.address1} ${pv.address2}` : pv.address1) : '');
          maybeSet('zip', pv.postcode);
          maybeSet('city', pv.city);
          maybeSet('country', pv.country);
          maybeSet('taxNumber', pv.tax_id);
          maybeSet('notes', pv.description);
          // Provisionssatz: aktualisieren, wenn neuer Wert numerisch UND sich tatsächlich unterscheidet
          if(typeof pv.commission==='number' && pv.commission !== existing.commissionPct){
            updates.commissionPct=pv.commission;
            changed=true;
          }
          // Product-Vendors-ID und Shop immer synchronisieren (hilft bei späteren Matches)
          if(existing.productVendorId!==pv.vendor_id){updates.productVendorId=pv.vendor_id;changed=true;}
          if(existing.productVendorShop!==shopUrl){updates.productVendorShop=shopUrl;changed=true;}
          if(changed){
            Object.assign(existing,updates);
            vendorsUpdated++;
          } else {
            vendorsUnchanged++;
          }
        }
      }
      await saveVendors();
    }

    // Vorhandene Bestellungen als Map: key → Index in state.invoices
    const existingMap=new Map();
    state.invoices.forEach((i,idx)=>{
      if(i.wooOrderId) existingMap.set(`${i.wooShopUrl}::${i.wooOrderId}`, idx);
    });
    // Vorhandene Gebühren-Buchungen: key → transaction
    const existingFees=new Map();
    state.transactions.forEach(t=>{
      if(t.wooFeeOrderId) existingFees.set(`${t.wooShopUrl}::${t.wooFeeOrderId}`, t);
    });
    let imported=0,skipped=0,updated=0,asInvoiceCount=0,pdfsAttached=0,feesAdded=0;
    for(const order of data.orders){
      const key=`${shopUrl}::${order.order_id}`;
      const newNumber=order.pdf_invoice?.invoice_number || `WC-${order.order_number||order.order_id}`;

      // --- FALL: Vorhanden? Dann prüfen ob Update nötig ---
      if(existingMap.has(key)){
        const invIdx=existingMap.get(key);
        const existingInv=state.invoices[invIdx];
        let changed=false;

        // Rechnungsnummer hat sich verbessert (echte Germanized-Nr statt WC-Fallback)?
        const hadFallback=existingInv.number && existingInv.number.startsWith('WC-');
        const newIsReal=!newNumber.startsWith('WC-');
        if(hadFallback && newIsReal && newNumber!==existingInv.number){
          existingInv.number=newNumber;
          if(existingInv.txId){
            const tx=state.transactions.find(t=>t.id===existingInv.txId);
            if(tx){
              tx.invoiceNumber=newNumber;
              tx.description=`${newNumber} · ${existingInv.customer?.name||''}`.trim();
            }
          }
          changed=true;
        }

        // PDF nachliefern, falls jetzt vorhanden und vorher nicht
        if(order.pdf_invoice?.data && existingInv.txId){
          const tx=state.transactions.find(t=>t.id===existingInv.txId);
          if(tx && (!tx.receiptIds || tx.receiptIds.length===0)){
            try{
              const receiptId=await saveReceiptFromData(tx.id, order.pdf_invoice);
              tx.receiptIds=tx.receiptIds||[];
              tx.receiptIds.push(receiptId);
              pdfsAttached++;
              changed=true;
            }catch(e){console.warn('PDF-Beleg konnte nicht gespeichert werden:',e);}
          }
        }

        // Vendor-Zuordnungen nachliefern, falls jetzt vorhanden und vorher nicht
        if(Array.isArray(order.vendors) && order.vendors.length && existingInv.txId){
          const tx=state.transactions.find(t=>t.id===existingInv.txId);
          if(tx && (!tx.wooVendors || tx.wooVendors.length===0)){
            tx.wooVendors=order.vendors;
            tx.wooOrderId=order.order_id;
            tx.wooShopUrl=shopUrl;
            changed=true;
          }
        }

        // Zahlungsgebühr nachliefern, falls noch nicht gebucht
        if(order.payment_fee && order.payment_fee.amount>0 && !existingFees.has(key)){
          const feeTx=buildFeeTransaction(order,existingInv,shopUrl,data.shop);
          state.transactions.push(feeTx);
          existingFees.set(key,feeTx);
          feesAdded++;
          changed=true;
        }

        if(changed) updated++;
        else skipped++;
        continue;
      }

      // --- FALL: Neu anlegen ---
      const isPaid=order.paid_date||['completed','processing'].includes(order.status);
      const invoiceDate=order.paid_date||order.order_date||todayISO();
      const items=(order.items||[]).map(it=>({
        description:it.description||'(Position)',
        qty:it.qty||1,
        unit:it.unit||'Stk.',
        unitPrice:it.unit_price_net||0,
        vatRate:it.vat_rate||0,
      }));
      if(!items.length)continue;
      const inv={
        id:uid('inv'),
        number:newNumber,
        status:isPaid?'paid':'sent',
        invoiceDate:invoiceDate,
        serviceDate:order.order_date||invoiceDate,
        dueDate:invoiceDate,
        customer:{
          name:order.customer?.name||'Unbekannt',
          street:order.customer?.street||'',
          zip:order.customer?.zip||'',
          city:order.customer?.city||'',
          country:order.customer?.country==='DE'?'Deutschland':(order.customer?.country||'Deutschland'),
          email:order.customer?.email||'',
        },
        items:items,
        introText:'',
        paymentTerms:`Bezahlt über ${order.payment_method||'Online-Zahlung'}.`,
        footerNote:`Importiert aus WooCommerce-Bestellung #${order.order_number||order.order_id}.`,
        includeKleinunternehmerNotice:state.settings.kleinunternehmer,
        wooOrderId:order.order_id,
        wooOrderNumber:order.order_number,
        wooShopUrl:shopUrl,
      };
      computeInvoiceTotals(inv);
      let txId=null;
      if(isPaid){
        txId=uid();
        const tx={
          id:txId,type:'income',date:invoiceDate,
          description:`${inv.number} · ${order.customer?.name||''}`.trim(),
          contact:order.customer?.name||'',
          invoiceNumber:inv.number,
          category:INCOME_CATEGORIES[1],
          gross:inv.totalGross,net:inv.totalNet,vat:inv.totalVat,
          vatRate:inv.vatBreakdown[0]?.rate||0,
          notes:`Auto-Import aus WooCommerce (${data.shop||shopUrl})`,
          createdAt:new Date().toISOString(),
          receiptIds:[],
          wooOrderId:order.order_id,
          wooOrderNumber:order.order_number,
          wooShopUrl:shopUrl,
          wooVendors:Array.isArray(order.vendors)?order.vendors:[],
        };
        if(order.pdf_invoice&&order.pdf_invoice.data){
          try{
            const receiptId=await saveReceiptFromData(txId,order.pdf_invoice);
            tx.receiptIds.push(receiptId);
            pdfsAttached++;
          }catch(e){console.warn('PDF-Beleg konnte nicht gespeichert werden:',e);}
        }
        state.transactions.push(tx);
        inv.txId=txId;

        // Zahlungsgebühr als separate Ausgabe anlegen
        if(order.payment_fee && order.payment_fee.amount>0){
          const feeTx=buildFeeTransaction(order,inv,shopUrl,data.shop);
          state.transactions.push(feeTx);
          existingFees.set(key,feeTx);
          feesAdded++;
        }
      }
      state.invoices.push(inv);
      imported++;
      if(isPaid)asInvoiceCount++;
    }
    await saveTransactions();
    await saveInvoices();
    let msg=`${imported} neu · ${updated} aktualisiert · ${skipped} unverändert`;
    if(asInvoiceCount)msg+=` · ${asInvoiceCount} als Einnahme gebucht`;
    if(pdfsAttached)msg+=` · ${pdfsAttached} PDFs angehängt`;
    if(feesAdded)msg+=` · ${feesAdded} Gebühren gebucht`;
    if(vendorsNew||vendorsUpdated)msg+=` · ${vendorsNew} Anbieter neu, ${vendorsUpdated} aktualisiert`;
    toast(msg);
    closeModal();render();
  }catch(e){toast('Import fehlgeschlagen: '+e.message);}
}

// Baut eine Transaktion für eine Zahlungsanbieter-Gebühr (Stripe/PayPal).
// Gebühren sind USt-frei nach §4 Nr. 8 UStG (Finanzdienstleistungen).
function buildFeeTransaction(order,inv,shopUrl,shopName){
  const pf=order.payment_fee;
  const provider=pf.provider||'Zahlungsanbieter';
  const feeAmount=pf.amount||0;
  return {
    id:uid(),
    type:'expense',
    date:order.paid_date||order.order_date||todayISO(),
    description:`${provider}-Gebühr · ${inv.number||('WC-'+order.order_id)}`,
    contact:provider,
    invoiceNumber:'',
    category:'Zahlungsanbieter-Gebühren (Stripe, PayPal)',
    gross:feeAmount, net:feeAmount, vat:0, vatRate:0,
    notes:`Zahlungs-Gebühr für WooCommerce-Bestellung #${order.order_number||order.order_id}${pf.net?`. Netto-Auszahlung: ${pf.net} ${pf.currency||'EUR'}`:''}`,
    createdAt:new Date().toISOString(),
    receiptIds:[],
    wooFeeOrderId:order.order_id,
    wooShopUrl:shopUrl,
  };
}

// Speichert einen Beleg aus base64-Daten (z.B. eine PDF-Rechnung aus WooCommerce-Import)
async function saveReceiptFromData(txId,fileData){
  const id='rcpt_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
  const record={
    id,txId,
    filename:fileData.filename||'rechnung.pdf',
    mime:fileData.mime||'application/pdf',
    size:fileData.size||0,
    data:fileData.data,
    uploadedAt:new Date().toISOString(),
  };
  await appStorage.set('receipt:'+id,JSON.stringify(record));
  return id;
}

async function importJSON(file){try{const text=await file.text();const data=JSON.parse(text);if(!Array.isArray(data.transactions))throw new Error('Ungültiges Format');state.transactions=data.transactions;if(data.invoices)state.invoices=data.invoices;if(Array.isArray(data.vendors))state.vendors=data.vendors;if(Array.isArray(data.creditNotes))state.creditNotes=data.creditNotes;if(data.settings)state.settings={...DEFAULT_SETTINGS,...data.settings};await saveTransactions();await saveInvoices();await saveVendors();await saveCreditNotes();await saveSettings();toast(`${state.transactions.length} Buchungen, ${state.invoices.length} Rechnungen, ${state.vendors.length} Anbieter importiert`);closeModal();render();}catch(e){toast('Import fehlgeschlagen: '+e.message);}}
function download(filename,content,mime){const blob=new Blob([content],{type:mime});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},100);}

function attachEvents(){
  document.querySelectorAll('.bottom-nav button').forEach(btn=>btn.addEventListener('click',()=>{state.view=btn.dataset.view;state.monthFilter='all';state.categoryFilter='all';state.search='';state.selectMode=false;state.selectedIds=new Set();render();}));
  // Aktiven Tab auf Handy in den sichtbaren Bereich scrollen
  const activeBtn=document.querySelector('.bottom-nav button.active');
  if(activeBtn && activeBtn.scrollIntoView) activeBtn.scrollIntoView({block:'nearest',inline:'center',behavior:'instant'});
  const ys=document.getElementById('year-select');if(ys)ys.addEventListener('change',e=>{state.year=parseInt(e.target.value);render();});
  const bs=document.getElementById('btn-settings');if(bs)bs.addEventListener('click',()=>openSettings());
  document.querySelectorAll('[data-action]').forEach(el=>el.addEventListener('click',handleAction));
  document.querySelectorAll('[data-edit]').forEach(el=>el.addEventListener('click',()=>openTxModal(null,el.dataset.edit)));
  document.querySelectorAll('[data-edit-vendor]').forEach(el=>el.addEventListener('click',()=>openVendorModal(el.dataset.editVendor)));
  document.querySelectorAll('[data-open-credit-note]').forEach(el=>el.addEventListener('click',()=>openCreditNoteDetailModal(el.dataset.openCreditNote)));
  // Auswahlmodus: Checkbox togglet Auswahl, ohne das Edit-Modal zu öffnen
  document.querySelectorAll('[data-select-tx]').forEach(el=>el.addEventListener('click',e=>{
    e.stopPropagation();
    const id=el.dataset.selectTx;
    if(el.checked)state.selectedIds.add(id);else state.selectedIds.delete(id);
    render();
  }));
  document.querySelectorAll('[data-edit-invoice]').forEach(el=>el.addEventListener('click',()=>openInvoiceModal(el.dataset.editInvoice)));
  document.querySelectorAll('[data-view-goto]').forEach(el=>el.addEventListener('click',()=>{state.view=el.dataset.viewGoto;render();}));
  document.querySelectorAll('[data-open-settings]').forEach(el=>el.addEventListener('click',()=>openSettings(el.dataset.openSettings)));
  const mf=document.getElementById('month-filter');if(mf)mf.addEventListener('change',e=>{const v=e.target.value;state.monthFilter=v==='all'?'all':(v.startsWith('q')?v:parseInt(v));render();});
  const cf=document.getElementById('cat-filter');if(cf)cf.addEventListener('change',e=>{state.categoryFilter=e.target.value;render();});
  const si=document.getElementById('search-input');if(si)si.addEventListener('input',e=>{state.search=e.target.value;const pos=si.selectionStart;render();const nsi=document.getElementById('search-input');if(nsi){nsi.focus();try{nsi.setSelectionRange(pos,pos);}catch(e){}}});
}

function handleAction(e){
  const action=e.currentTarget.dataset.action;const id=e.currentTarget.dataset.id;
  switch(action){
    case 'new-income':openTxModal('income');break;
    case 'new-expense':openTxModal('expense');break;
    case 'new-invoice':openInvoiceModal();break;
    case 'new-vendor':openVendorModal();break;
    case 'save-vendor':saveVendorFromModal(id);break;
    case 'delete-vendor':deleteVendor(id);break;
    case 'new-credit-note':openCreditNoteGeneratorModal();break;
    case 'save-credit-note':saveCreditNoteFromGenerator();break;
    case 'delete-credit-note':deleteCreditNote(id);break;
    case 'print-credit-note':printCreditNote(id);break;
    case 'mail-credit-note':mailCreditNote(id);break;
    case 'mark-paid':markCreditNotePaid(id);break;
    case 'confirm-paid-with-expense':confirmPaidWithExpense(id);break;
    case 'confirm-paid-without-expense':confirmPaidWithoutExpense(id);break;
    case 'save-tx':saveTxFromModal(id);break;
    case 'delete-tx':deleteTx(id);break;
    case 'toggle-select':state.selectMode=!state.selectMode;if(!state.selectMode)state.selectedIds=new Set();render();break;
    case 'bulk-delete':bulkDeleteSelected();break;
    case 'clear-selection':state.selectedIds=new Set();render();break;
    case 'select-all':selectAllVisible();break;
    case 'save-settings':saveSettingsFromModal();break;
    case 'save-invoice':saveInvoice().then(inv=>{if(inv){closeModal();render();}});break;
    case 'save-and-pdf':saveInvoice().then(inv=>{if(inv){printInvoice(inv);closeModal();render();}});break;
    case 'preview-invoice':previewInvoice();break;
    case 'delete-invoice':deleteInvoice();break;
    case 'add-item':addInvoiceItem();break;
    case 'export-csv':exportCSV(state.year);toast('CSV heruntergeladen');break;
    case 'export-finanzamt':exportFinanzamtPaket(state.year);break;
    case 'export-euer':exportEUER(state.year);toast('EÜR-Export heruntergeladen');break;
    case 'export-vat':exportUstVoranmeldung(state.year);toast('USt-Voranmeldungen heruntergeladen');break;
    case 'export-ics':exportICS();toast('Kalender heruntergeladen');break;
    case 'export-json':exportJSON();toast('Backup erstellt');break;
    case 'import-json':document.getElementById('import-file').click();break;
    case 'import-woo':document.getElementById('woo-file').click();break;
    case 'bulk-upload':document.getElementById('bulk-file').click();break;
    case 'clear-data':clearAllData();break;
    case 'test-invoice':showTestInvoice();break;
    case 'reset-rights-text':{
      e.preventDefault();
      const el=document.getElementById('s-rights');
      if(el){ el.value=DEFAULT_RIGHTS_TEXT; toast('Standardtext wiederhergestellt'); }
      break;
    }
    case 'dbx-start-auth':
      state.settings.dbxAppKey=document.getElementById('s-dbxkey').value.trim();
      state.settings.dbxPath=document.getElementById('s-dbxpath').value.trim()||'/hankebuch-daten.json';
      // Erst speichern, dann umleiten
      saveSettings().then(()=>dbxStartAuth());
      break;
    case 'dbx-finish-auth':
      dbxFinishAuth(document.getElementById('s-dbxcode').value);
      break;
    case 'dbx-pull':
      dbxLoadFromCloud().then(ok=>{if(ok){toast('Aus Dropbox geladen');render();}else toast('Keine Cloud-Daten gefunden');});
      break;
    case 'dbx-push':
      dbxSaveToCloud(true).then(ok=>toast(ok?'In Dropbox gespeichert':'Fehler beim Speichern'));
      break;
    case 'dbx-disconnect':
      dbxDisconnect();
      break;
  }
}

function addInvoiceItem(){collectInvoiceDraft();state.invoiceDraft.items.push({description:'',qty:1,unit:'Stk.',unitPrice:0,vatRate:state.settings.defaultVatRate});renderInvoiceModal();}

function showTestInvoice(){
  const fake={id:'test',number:nextInvoiceNumber(),invoiceDate:todayISO(),serviceDate:todayISO(),dueDate:addDays(todayISO(),14),
    customer:{name:'Beispielkunde GmbH',street:'Musterstraße 7',zip:'80331',city:'München',country:'Deutschland'},
    items:[{description:'Beratungsleistung',qty:8,unit:'Std.',unitPrice:120,vatRate:19},{description:'Konzepterstellung',qty:1,unit:'Pauschal',unitPrice:450,vatRate:19}],
    introText:'wie besprochen erlaube ich mir, folgende Leistungen zu berechnen:',
    paymentTerms:`Bitte überweisen Sie den Rechnungsbetrag innerhalb von ${state.settings.paymentTermsDays} Tagen ohne Abzug.`,
    footerNote:state.settings.invoiceFooterText,includeKleinunternehmerNotice:state.settings.kleinunternehmer};
  const html=renderInvoicePdfHTML(fake);
  const root=document.getElementById('viewer-root');
  root.innerHTML=`<div class="viewer-overlay viewer-scroll" data-close-viewer><div class="viewer-head"><div class="vname">Test-Vorschau</div><button class="viewer-close" data-close-viewer>${ICON.close}</button></div><div class="viewer-content" onclick="event.stopPropagation()">${html}</div></div>`;
  root.querySelectorAll('[data-close-viewer]').forEach(el=>el.addEventListener('click',e=>{if(e.currentTarget===e.target||e.currentTarget.classList.contains('viewer-close'))closeViewer();}));
}
function closeViewer(){document.getElementById('viewer-root').innerHTML='';}

function openTxModal(type,editId=null){
  let existing=null;if(editId)existing=state.transactions.find(t=>t.id===editId);
  state.pendingReceipts=[];state._removedReceipts=[];
  const useType=existing?.type||type;
  document.getElementById('modal-root').innerHTML=renderTxModal(useType,existing);
  bindModal();
  document.querySelectorAll('[data-settype]').forEach(btn=>btn.addEventListener('click',()=>{
    const newType=btn.dataset.settype;const curr=collectTxForm();curr.type=newType;
    if(existing&&existing.id)curr.id=existing.id;curr.receiptIds=existing?.receiptIds||[];
    document.getElementById('modal-root').innerHTML=renderTxModal(newType,curr.gross||existing?curr:null);
    bindModal();attachTxModalExtras(existing?.id||null);
  }));
  attachTxModalExtras(editId);hydrateReceiptThumbs();
}

function renderTxModal(type,existing=null){
  const isEdit=!!existing;
  const t=existing||{type,date:defaultDateForEntry(),description:'',contact:'',invoiceNumber:'',category:type==='income'?INCOME_CATEGORIES[0]:EXPENSE_CATEGORIES[5],gross:'',net:'',vatRate:state.settings.kleinunternehmer?0:state.settings.defaultVatRate,vat:0,notes:'',receiptIds:[]};
  const categories=t.type==='income'?INCOME_CATEGORIES:EXPENSE_CATEGORIES;
  const attached=(t.receiptIds||[]).map(id=>({id,loading:true}));
  const pending=state.pendingReceipts;
  return `<div class="modal-overlay" data-close-modal><div class="modal" onclick="event.stopPropagation()">
    <div class="modal-head"><h2>${isEdit?'Buchung bearbeiten':'Neue Buchung'}</h2><button class="modal-close" data-close-modal>${ICON.close}</button></div>
    <div class="type-switch">
      <button class="${t.type==='income'?'active income':''}" data-settype="income">Einnahme</button>
      <button class="${t.type==='expense'?'active expense':''}" data-settype="expense">Ausgabe</button>
    </div>
    <div class="stack">
      <div class="field"><label>Beschreibung</label><input type="text" id="f-desc" value="${escapeAttr(t.description)}" placeholder="z. B. Webdesign Projekt" autofocus></div>
      <div class="field-row">
        <div class="field"><label>Datum</label><input type="date" id="f-date" value="${t.date}"></div>
        <div class="field"><label>Kategorie</label><select id="f-category">${categories.map(c=>`<option value="${escapeAttr(c)}" ${c===t.category?'selected':''}>${c}</option>`).join('')}</select></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Betrag (brutto)</label><input type="text" inputmode="decimal" class="num-input" id="f-gross" value="${t.gross?String(t.gross).replace('.',','):''}" placeholder="0,00"><div class="hint">Endbetrag inkl. USt</div></div>
        <div class="field"><label>USt-Satz</label><select id="f-vat" ${state.settings.kleinunternehmer?'disabled':''}>${VAT_RATES.map(r=>`<option value="${r}" ${r===t.vatRate?'selected':''}>${r} %</option>`).join('')}</select>${state.settings.kleinunternehmer?'<div class="hint">Kleinunternehmer</div>':''}</div>
      </div>
      <div class="field-row">
        <div class="field"><label>Geschäftspartner</label><input type="text" id="f-contact" value="${escapeAttr(t.contact)}"></div>
        <div class="field"><label>Beleg-/Rechnungsnummer</label><input type="text" id="f-invoice" value="${escapeAttr(t.invoiceNumber)}"></div>
      </div>
      <div class="field"><label>Notizen</label><textarea id="f-notes">${escapeHtml(t.notes||'')}</textarea></div>
      <div class="field"><label>Belege</label>
        <div class="receipt-zone" id="drop-zone">
          <div class="rz-big">Belege hier ablegen oder antippen</div>
          <div class="rz-small">Fotos, Scans oder PDF · automatisch komprimiert</div>
          <input type="file" id="receipt-file" accept="image/*,application/pdf" multiple style="display:none">
        </div>
        <div class="receipt-grid" id="receipt-grid">${[...attached,...pending].map((r,i)=>renderReceiptThumb(r,i,pending.includes(r))).join('')}</div>
      </div>
      <div id="tx-preview" style="background:var(--bg-sunk);border-radius:10px;padding:12px 14px;font-size:13px;display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap"></div>
      <div style="display:flex;gap:8px;margin-top:4px">
        ${isEdit?`<button class="btn" data-action="delete-tx" data-id="${t.id}" style="color:var(--terra);border-color:var(--terra)">${ICON.trash}</button>`:''}
        <button class="btn btn-primary btn-block" data-action="save-tx" ${isEdit?`data-id="${t.id}"`:''}>${isEdit?'Speichern':'Buchen'}</button>
      </div>
    </div>
  </div></div>`;
}
function renderReceiptThumb(r,idx,isPending){
  if(r.loading)return `<div class="receipt-thumb" data-receipt-id="${r.id}"><div class="pdf-ico" style="color:var(--ink-muted)"><span class="label">…</span></div></div>`;
  const isPdf=(r.mime||'').includes('pdf');
  const del=isPending?`<button class="rthumb-del" data-remove-pending="${idx}">${ICON.close}</button>`:`<button class="rthumb-del" data-remove-receipt="${r.id}">${ICON.close}</button>`;
  const content=isPdf?`<div class="pdf-ico">${ICON.paper}<span class="label">PDF</span></div>`:`<img src="${r.data}" alt="${escapeAttr(r.filename)}">`;
  return `<div class="receipt-thumb" data-view-receipt="${r.id||''}" data-view-pending="${isPending?idx:''}">${content}${del}<div class="rthumb-name">${escapeHtml(r.filename)}</div></div>`;
}
async function hydrateReceiptThumbs(){const grid=document.getElementById('receipt-grid');if(!grid)return;
  const loading=grid.querySelectorAll('[data-receipt-id]');
  for(const el of loading){const id=el.dataset.receiptId;if(!id)continue;const r=await loadReceipt(id);if(!r){el.remove();continue;}el.outerHTML=renderReceiptThumb(r,0,false);}
  bindReceiptGridEvents();
}
function bindReceiptGridEvents(){
  document.querySelectorAll('[data-remove-pending]').forEach(btn=>btn.addEventListener('click',e=>{e.stopPropagation();const idx=parseInt(btn.dataset.removePending);state.pendingReceipts.splice(idx,1);refreshReceiptGrid();}));
  document.querySelectorAll('[data-remove-receipt]').forEach(btn=>btn.addEventListener('click',async e=>{e.stopPropagation();const id=btn.dataset.removeReceipt;state._removedReceipts=state._removedReceipts||[];state._removedReceipts.push(id);btn.closest('.receipt-thumb').remove();toast('Beleg wird beim Speichern entfernt');}));
  document.querySelectorAll('[data-view-receipt]').forEach(el=>el.addEventListener('click',e=>{if(e.target.closest('[data-remove-receipt],[data-remove-pending]'))return;const id=el.dataset.viewReceipt;const pIdx=el.dataset.viewPending;if(id)openReceiptViewer(id);else if(pIdx!=='')openPendingViewer(parseInt(pIdx));}));
}
function refreshReceiptGrid(){const grid=document.getElementById('receipt-grid');if(!grid)return;
  const attachedIds=Array.from(document.querySelectorAll('[data-view-receipt]')).map(el=>el.dataset.viewReceipt).filter(Boolean);
  const pending=state.pendingReceipts;
  grid.innerHTML=[...attachedIds.map(id=>({id,loading:true})),...pending.map(r=>r)].map((r,i)=>{const isPending=pending.includes(r);return renderReceiptThumb(r,i-attachedIds.length,isPending);}).join('');
  hydrateReceiptThumbs();
}
async function openReceiptViewer(id){const r=await loadReceipt(id);if(!r){toast('Beleg nicht gefunden');return;}showReceiptViewer(r);}
function openPendingViewer(idx){const r=state.pendingReceipts[idx];if(!r)return;showReceiptViewer(r);}
function showReceiptViewer(r){
  const root=document.getElementById('viewer-root');const isPdf=(r.mime||'').includes('pdf');
  root.innerHTML=`<div class="viewer-overlay" data-close-viewer><div class="viewer-head"><div class="vname">${escapeHtml(r.filename)} · ${fmtSize(r.size)}</div><button class="viewer-close" data-close-viewer>${ICON.close}</button></div><div class="viewer-content">${isPdf?`<iframe src="${r.data}"></iframe>`:`<img src="${r.data}" alt="${escapeAttr(r.filename)}">`}</div></div>`;
  root.querySelectorAll('[data-close-viewer]').forEach(el=>el.addEventListener('click',closeViewer));
}

function attachTxModalExtras(editId){
  const gross=document.getElementById('f-gross');const vat=document.getElementById('f-vat');
  if(gross)gross.addEventListener('input',updateTxPreview);if(vat)vat.addEventListener('change',updateTxPreview);updateTxPreview();
  // Hinweis: delete-tx und save-tx werden durch den globalen Action-Handler behandelt.
  // KEIN zusätzlicher addEventListener hier, sonst feuert alles doppelt.
  const zone=document.getElementById('drop-zone');const fi=document.getElementById('receipt-file');
  if(zone&&fi){zone.addEventListener('click',()=>fi.click());fi.addEventListener('change',e=>handleReceiptFiles(Array.from(e.target.files)));zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('drag');});zone.addEventListener('dragleave',()=>zone.classList.remove('drag'));zone.addEventListener('drop',e=>{e.preventDefault();zone.classList.remove('drag');const files=Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('image/')||f.type==='application/pdf');handleReceiptFiles(files);});}
  bindReceiptGridEvents();
}
async function handleReceiptFiles(files){
  for(const file of files){if(file.size>8*1024*1024){toast(`${file.name} zu groß`);continue;}
    let blob=file;if(file.type.startsWith('image/')&&file.type!=='image/heic'){try{blob=await compressImage(file);}catch(e){}}
    const base64=await blobToBase64(blob);
    state.pendingReceipts.push({id:'pending_'+state.pendingReceipts.length,filename:file.name,mime:blob.type||file.type,size:blob.size||file.size,data:base64,_blob:blob,_originalFile:file});
  }
  refreshReceiptGrid();toast(files.length+' Beleg(e) hinzugefügt');
}
async function handleBulkUpload(files){
  toast(`Verarbeite ${files.length} Belege …`);closeModal();let count=0;
  for(const file of files){try{if(file.size>8*1024*1024)continue;
    const txId=uid();const record=await saveReceipt(txId,file);
    state.transactions.push({id:txId,type:'expense',date:todayISO(),description:`(Entwurf) ${file.name.replace(/\.[^.]+$/,'')}`,contact:'',invoiceNumber:'',category:EXPENSE_CATEGORIES[5],gross:0,net:0,vat:0,vatRate:state.settings.kleinunternehmer?0:state.settings.defaultVatRate,notes:'Aus Stapel-Upload',receiptIds:[record.id],createdAt:new Date().toISOString(),isDraft:true});
    count++;}catch(e){console.error(e);}}
  await saveTransactions();toast(`${count} Entwürfe erstellt`);state.view='expense';render();
}

function bindModal(){
  document.querySelectorAll('[data-close-modal]').forEach(el=>el.addEventListener('click',e=>{if(e.currentTarget===e.target||e.currentTarget.classList.contains('modal-close'))closeModal();}));
  document.querySelectorAll('#modal-root [data-action]').forEach(el=>el.addEventListener('click',handleAction));
}
function closeModal(){document.getElementById('modal-root').innerHTML='';state.pendingReceipts=[];state._removedReceipts=[];state.invoiceDraft=null;}

function updateTxPreview(){const el=document.getElementById('tx-preview');if(!el)return;
  const gross=parseAmount(document.getElementById('f-gross').value);const rate=parseInt(document.getElementById('f-vat').value||'0',10);
  if(!gross){el.innerHTML='<span style="color:var(--ink-muted)">Gib einen Betrag ein …</span>';return;}
  const{net,vat}=calcVat(gross,rate);
  el.innerHTML=`<div><span style="color:var(--ink-muted)">Netto</span> <span class="num" style="margin-left:6px">${fmtEUR(net)}</span></div><div><span style="color:var(--ink-muted)">USt ${rate}%</span> <span class="num" style="margin-left:6px">${fmtEUR(vat)}</span></div><div><span style="color:var(--ink-muted)">Brutto</span> <span class="num" style="margin-left:6px;font-weight:600">${fmtEUR(gross)}</span></div>`;
}

function collectTxForm(){
  const get=id=>document.getElementById(id)?.value||'';
  const type=document.querySelector('[data-settype].active')?.dataset.settype||'expense';
  const gross=parseAmount(get('f-gross'));const rate=parseInt(get('f-vat')||'0',10);const calc=calcVat(gross,rate);
  return{type,date:get('f-date')||todayISO(),description:get('f-desc').trim(),category:get('f-category'),gross:calc.gross,net:calc.net,vat:calc.vat,vatRate:rate,contact:get('f-contact').trim(),invoiceNumber:get('f-invoice').trim(),notes:get('f-notes').trim()};
}
async function saveTxFromModal(editId){
  const data=collectTxForm();
  if(!data.gross||data.gross<=0){toast('Bitte Betrag eingeben');return;}
  if(!data.description){toast('Bitte Beschreibung eingeben');return;}
  let targetId=editId;
  if(editId){const idx=state.transactions.findIndex(t=>t.id===editId);
    if(idx>=0){state.transactions[idx]={...state.transactions[idx],...data,updatedAt:new Date().toISOString()};
      if((state._removedReceipts||[]).length){state.transactions[idx].receiptIds=(state.transactions[idx].receiptIds||[]).filter(id=>!state._removedReceipts.includes(id));for(const rid of state._removedReceipts)await deleteReceiptStore(rid);}
      delete state.transactions[idx].isDraft;}
    toast('Aktualisiert');
  } else {targetId=uid();state.transactions.push({id:targetId,receiptIds:[],...data,createdAt:new Date().toISOString()});toast(data.type==='income'?'Einnahme gebucht':'Ausgabe gebucht');}
  if(state.pendingReceipts.length){const txIdx=state.transactions.findIndex(t=>t.id===targetId);const list=state.transactions[txIdx].receiptIds||[];
    for(const pr of state.pendingReceipts){const file=pr._originalFile||new File([pr._blob||await(await fetch(pr.data)).blob()],pr.filename,{type:pr.mime});const record=await saveReceipt(targetId,file);list.push(record.id);}
    state.transactions[txIdx].receiptIds=list;}
  await saveTransactions();closeModal();render();
}
async function deleteTx(id){if(!id)return;if(!confirm('Buchung wirklich löschen?'))return;
  const tx=state.transactions.find(t=>t.id===id);if(tx?.receiptIds)for(const rid of tx.receiptIds)await deleteReceiptStore(rid);
  state.transactions=state.transactions.filter(t=>t.id!==id);await saveTransactions();toast('Gelöscht');closeModal();render();
}

function selectAllVisible(){
  // Wählt alle sichtbaren Einträge aus (mit aktuellen Filtern)
  const type=state.view;
  if(type!=='income'&&type!=='expense')return;
  const all=state.transactions.filter(t=>t.type===type&&t.date.startsWith(String(state.year)));
  let f=all;
  if(state.monthFilter!=='all'){
    if(typeof state.monthFilter==='number')f=f.filter(t=>parseInt(t.date.slice(5,7),10)-1===state.monthFilter);
    else if(state.monthFilter.startsWith('q')){const q=parseInt(state.monthFilter.slice(1));f=f.filter(t=>quarterOf(t.date)===q);}
  }
  if(state.categoryFilter!=='all')f=f.filter(t=>t.category===state.categoryFilter);
  if(state.search.trim()){const q=state.search.toLowerCase();f=f.filter(t=>(t.description||'').toLowerCase().includes(q)||(t.contact||'').toLowerCase().includes(q)||(t.invoiceNumber||'').toLowerCase().includes(q));}
  f.forEach(t=>state.selectedIds.add(t.id));
  render();
}

async function bulkDeleteSelected(){
  const ids=Array.from(state.selectedIds);
  if(!ids.length)return;
  if(!confirm(`${ids.length} Buchung${ids.length===1?'':'en'} wirklich löschen? Das kann nicht rückgängig gemacht werden.`))return;
  // Zugehörige Belege auch entfernen
  for(const id of ids){
    const tx=state.transactions.find(t=>t.id===id);
    if(tx?.receiptIds)for(const rid of tx.receiptIds)await deleteReceiptStore(rid);
  }
  state.transactions=state.transactions.filter(t=>!state.selectedIds.has(t.id));
  const count=ids.length;
  state.selectedIds=new Set();
  state.selectMode=false;
  await saveTransactions();
  toast(`${count} Buchung${count===1?'':'en'} gelöscht`);
  render();
}

async function saveSettingsFromModal(){
  const get=id=>document.getElementById(id);
  const tab=state.settingsTab;
  if(tab==='company'){
    state.settings.businessName=get('s-name').value.trim();
    state.settings.ownerName=get('s-owner').value.trim();
    state.settings.street=get('s-street').value.trim();
    state.settings.zip=get('s-zip').value.trim();
    state.settings.city=get('s-city').value.trim();
    state.settings.country=get('s-country').value.trim();
    state.settings.email=get('s-email').value.trim();
    state.settings.phone=get('s-phone').value.trim();
    state.settings.website=get('s-website').value.trim();
    state.settings.bankName=get('s-bank').value.trim();
    state.settings.iban=get('s-iban').value.trim();
    state.settings.bic=get('s-bic').value.trim();
  } else if(tab==='tax'){
    state.settings.kleinunternehmer=get('s-kleinunt').checked;
    state.settings.taxNumber=get('s-stnr').value.trim();
    state.settings.vatId=get('s-ustid').value.trim();
    state.settings.hasTaxAdvisor=get('s-advisor').checked;
    state.settings.biweeklyReminder=get('s-reminder').checked;
    if(get('s-cycle'))state.settings.vatCycle=get('s-cycle').value;
    if(get('s-vat'))state.settings.defaultVatRate=parseInt(get('s-vat').value,10);
  } else if(tab==='invoice'){
    state.settings.invoicePrefix=get('s-iprefix').value.trim();
    state.settings.invoiceCounter=parseInt(get('s-icounter').value||'1',10);
    state.settings.paymentTermsDays=parseInt(get('s-payterm').value||'14',10);
    state.settings.invoiceFooterText=get('s-footer').value;
    state.settings.invoiceTheme=get('s-theme').value;
    state.settings.invoiceAccent=get('s-accent').value;
    if(get('s-rights')) state.settings.rightsTransferText=get('s-rights').value;
  } else if(tab==='sync'){
    if(get('s-dbxauto')) state.settings.dbxAutoSync=get('s-dbxauto').checked;
    if(get('s-dbxkey')) state.settings.dbxAppKey=get('s-dbxkey').value.trim();
    if(get('s-dbxpath')) state.settings.dbxPath=get('s-dbxpath').value.trim()||'/hankebuch-daten.json';
  }
  await saveSettings();toast('Einstellungen gespeichert');closeModal();render();
}

async function clearAllData(){if(!confirm('Wirklich alle Daten löschen?'))return;if(!confirm('Ganz sicher? Vorher Backup!'))return;
  try{for(const tx of state.transactions)for(const rid of(tx.receiptIds||[]))await deleteReceiptStore(rid);
    await appStorage.delete('transactions');await appStorage.delete('invoices');await appStorage.delete('settings');}catch(e){}
  state.transactions=[];state.invoices=[];state.settings={...DEFAULT_SETTINGS};toast('Alles gelöscht');closeModal();render();
}

let toastTimer;
function toast(msg){const root=document.getElementById('toast-root');root.innerHTML=`<div class="toast show">${escapeHtml(msg)}</div>`;clearTimeout(toastTimer);toastTimer=setTimeout(()=>{root.innerHTML='';},2400);}

(async()=>{await loadAll();render();setInterval(updateSyncIndicator,30000);})();
</script>

<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<title>Hankebuch — Buchhaltung & Rechnungen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..700&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F6F2E9; --bg-card:#FDFBF6; --bg-sunk:#EFEADE;
    --ink:#18150F; --ink-soft:#4B4339; --ink-muted:#8A8073;
    --line:#E4DBC7; --line-strong:#CFC3A5;
    --green:#2F5344; --green-soft:#E0EAE1;
    --terra:#AE4E2F; --terra-soft:#F2DED2;
    --gold:#B89A5A; --gold-soft:#F4EAD0;
    --shadow:0 1px 2px rgba(40,30,10,0.04),0 4px 14px rgba(40,30,10,0.03);
    --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--bg);color:var(--ink);font-family:'Manrope',sans-serif;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
  body{min-height:100vh;background-image:radial-gradient(circle at 100% 0%,rgba(184,154,90,0.07),transparent 40%),radial-gradient(circle at 0% 100%,rgba(47,83,68,0.05),transparent 45%)}
  .num{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums;font-weight:500}
  h1,h2,h3{font-family:'Fraunces',serif;font-weight:500;letter-spacing:-0.015em;line-height:1.15}
  button,input,select,textarea{font-family:inherit;font-size:inherit;color:inherit;border:none;background:none;outline:none}
  button{cursor:pointer}
  input,select,textarea{-webkit-appearance:none;appearance:none}

  #app{min-height:100vh;display:flex;flex-direction:column}
  .app-header{padding:18px 20px 14px;border-bottom:1px solid var(--line);background:var(--bg);position:sticky;top:0;z-index:10;display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
  .brand{display:flex;flex-direction:column;gap:2px}
  .brand .logo{font-family:'Fraunces',serif;font-style:italic;font-size:26px;font-weight:500;letter-spacing:-0.025em;line-height:1}
  .brand .logo b{font-style:normal;font-weight:700;letter-spacing:-0.02em}
  .brand .tag{font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--ink-muted);font-weight:600}
  .header-right{display:flex;align-items:center;gap:8px}
  .yearpick{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border:1px solid var(--line-strong);border-radius:999px;background:var(--bg-card);font-size:13px;font-weight:600}
  .yearpick:hover{border-color:var(--ink)}
  .yearpick select{border:none;background:none;font:inherit;color:inherit;padding-right:2px}
  .content{flex:1;padding:18px 16px 110px;max-width:920px;width:100%;margin:0 auto}
  @media(min-width:760px){.app-header{padding:20px 36px 16px}.content{padding:28px 36px 50px}}

  .bottom-nav-wrap{position:fixed;bottom:0;left:0;right:0;z-index:8}
  .bottom-nav-wrap::after{content:'';position:absolute;top:0;bottom:0;right:0;width:30px;pointer-events:none;background:linear-gradient(to right,rgba(253,251,246,0),rgba(253,251,246,0.95));z-index:9}
  .bottom-nav{background:rgba(253,251,246,0.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid var(--line);display:flex;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;padding:6px 4px calc(8px + env(safe-area-inset-bottom));scrollbar-width:none;touch-action:pan-x;overscroll-behavior:contain}
  .bottom-nav::-webkit-scrollbar{display:none}
  .bottom-nav button{flex:0 0 auto;min-width:58px;padding:6px 8px;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--ink-muted);font-size:10px;letter-spacing:0.02em;font-weight:600;border-radius:10px;white-space:nowrap}
  .bottom-nav button svg{width:20px;height:20px;stroke-width:1.6;fill:none;stroke:currentColor}
  .bottom-nav button.active{color:var(--green);background:var(--green-soft)}
  @media(min-width:760px){
    .bottom-nav-wrap{position:static}
    .bottom-nav-wrap::after{display:none}
    .bottom-nav{position:static;border-top:none;background:none;backdrop-filter:none;-webkit-backdrop-filter:none;display:flex;gap:3px;padding:0;justify-content:flex-end;flex-wrap:wrap;overflow:visible}
    .bottom-nav button{flex:0 0 auto;min-width:0;flex-direction:row;padding:7px 13px;font-size:13px;font-weight:500;border-radius:999px}
    .bottom-nav button svg{width:15px;height:15px}
    .bottom-nav button.active{background:var(--green-soft);color:var(--green)}
  }

  .card{background:var(--bg-card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}
  .card+.card{margin-top:14px}
  .row{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .stack{display:flex;flex-direction:column;gap:12px}
  .section-title{font-family:'Fraunces',serif;font-size:11px;font-weight:600;letter-spacing:0.22em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 16px;border-radius:999px;border:1px solid var(--line-strong);background:var(--bg-card);color:var(--ink);font-weight:600;font-size:14px;transition:transform 0.06s,border-color 0.12s,background 0.12s;white-space:nowrap}
  .btn:hover{border-color:var(--ink)}
  .btn:active{transform:scale(0.97)}
  .btn svg{width:15px;height:15px;stroke-width:2;fill:none;stroke:currentColor}
  .btn-primary{background:var(--ink);color:var(--bg-card);border-color:var(--ink)}
  .btn-green{background:var(--green);color:#fff;border-color:var(--green)}
  .btn-terra{background:var(--terra);color:#fff;border-color:var(--terra)}
  .btn-ghost{border-color:transparent}
  .btn-sm{padding:7px 12px;font-size:13px}
  .btn-block{width:100%}
  .btn-icon{padding:8px;width:36px;height:36px}

  .field{display:flex;flex-direction:column;gap:5px}
  .field label{font-size:11px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-muted)}
  .field input[type="text"],.field input[type="number"],.field input[type="date"],.field input[type="email"],.field select,.field textarea{border:1px solid var(--line-strong);border-radius:10px;padding:11px 12px;background:var(--bg-card);font-size:16px;font-weight:500;transition:border-color 0.12s}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--ink)}
  .field .num-input{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums}
  .field textarea{min-height:70px;resize:vertical;font-family:'Manrope',sans-serif}
  .field .hint{font-size:12px;color:var(--ink-muted)}
  .field .hint code{background:var(--bg-sunk);padding:1px 6px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:11px}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .field-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  @media(max-width:500px){.field-row,.field-row-3{grid-template-columns:1fr}}

  .toggle{display:flex;align-items:center;gap:10px;padding:10px 0;cursor:pointer;user-select:none}
  .toggle .switch{width:42px;height:24px;background:var(--line-strong);border-radius:999px;position:relative;flex-shrink:0}
  .toggle .switch::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;background:#fff;border-radius:50%;transition:left 0.15s;box-shadow:0 1px 2px rgba(0,0,0,0.1)}
  .toggle input{display:none}
  .toggle input:checked ~ .switch{background:var(--green)}
  .toggle input:checked ~ .switch::after{left:20px}
  .toggle .label{flex:1}
  .toggle .label .t{font-weight:600;font-size:14px}
  .toggle .label .sub{font-size:12px;color:var(--ink-muted);margin-top:2px}

  .greeting{margin-bottom:16px}
  .greeting .eyebrow{font-size:11px;letter-spacing:0.22em;text-transform:uppercase;color:var(--ink-muted);font-weight:600;margin-bottom:4px}
  .greeting h1{font-size:32px;font-style:italic;font-weight:400}
  .greeting h1 b{font-style:normal;font-weight:600}
  @media(min-width:760px){.greeting h1{font-size:42px}}

  .quote-card{background:linear-gradient(135deg,var(--gold-soft),var(--bg-card));border:1px solid var(--line);border-radius:var(--radius);padding:22px 24px;margin-bottom:18px;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .quote-card::before{content:'"';position:absolute;top:-30px;left:-5px;font-family:'Fraunces',serif;font-size:180px;font-weight:700;color:var(--gold);opacity:0.15;line-height:1}
  .quote-card .eyebrow{font-size:10px;letter-spacing:0.24em;text-transform:uppercase;color:var(--ink-muted);font-weight:600;margin-bottom:8px;position:relative}
  .quote-card blockquote{font-family:'Fraunces',serif;font-style:italic;font-size:19px;line-height:1.35;position:relative;letter-spacing:-0.01em}
  .quote-card cite{display:block;margin-top:10px;font-size:12px;font-style:normal;color:var(--ink-muted)}
  .quote-card cite::before{content:'— '}

  .nudge{background:linear-gradient(135deg,var(--terra-soft),var(--bg-card));border:1px solid var(--terra);border-radius:var(--radius);padding:16px 18px;margin-bottom:14px;display:flex;align-items:center;gap:14px}
  .nudge .icon{font-size:24px}
  .nudge .text{flex:1}
  .nudge .text .t{font-weight:600;font-size:14px}
  .nudge .text .s{font-size:12px;color:var(--ink-soft);margin-top:2px}

  .kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
  .kpi{background:var(--bg-card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
  .kpi .k-label{font-size:11px;letter-spacing:0.15em;text-transform:uppercase;font-weight:600;color:var(--ink-muted);margin-bottom:8px}
  .kpi .k-value{font-size:22px;font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums;font-weight:500}
  .kpi .k-sub{font-size:12px;color:var(--ink-muted);margin-top:4px}
  .kpi.income .k-value{color:var(--green)}
  .kpi.expense .k-value{color:var(--terra)}
  .kpi-profit{grid-column:1/-1;background:var(--ink);color:var(--bg-card);border-color:var(--ink)}
  .kpi-profit .k-label{color:rgba(253,251,246,0.6)}
  .kpi-profit .k-value{color:var(--bg-card);font-size:28px}
  .kpi-profit .k-sub{color:rgba(253,251,246,0.5)}
  @media(min-width:760px){.kpi-grid{grid-template-columns:1fr 1fr 1fr}.kpi-profit{grid-column:auto}}

  .quick-actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:16px 0}
  @media(max-width:600px){.quick-actions{grid-template-columns:1fr 1fr}.quick-actions > :nth-child(3){grid-column:1/-1}}
  .quick{padding:16px;border-radius:var(--radius);border:1px solid var(--line);background:var(--bg-card);display:flex;flex-direction:column;align-items:flex-start;gap:4px;text-align:left;box-shadow:var(--shadow)}
  .quick:hover{border-color:var(--ink)}
  .quick:active{transform:scale(0.98)}
  .quick .plus{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;font-weight:700;font-size:18px;margin-bottom:6px}
  .quick.income .plus{background:var(--green-soft);color:var(--green)}
  .quick.expense .plus{background:var(--terra-soft);color:var(--terra)}
  .quick.invoice .plus{background:var(--gold-soft);color:var(--gold)}
  .quick .t{font-family:'Fraunces',serif;font-size:17px;font-weight:500}
  .quick .s{font-size:12px;color:var(--ink-muted)}

  .list{display:flex;flex-direction:column}
  .tx-item{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;padding:14px 4px;border-bottom:1px solid var(--line);cursor:pointer}
  .tx-item.select-mode{grid-template-columns:auto auto 1fr auto}
  .tx-item:hover{background:var(--bg-sunk)}
  .tx-item.selected{background:rgba(47,83,68,0.08)}
  .tx-item.selected:hover{background:rgba(47,83,68,0.14)}
  .tx-check{display:flex;align-items:center}
  .tx-check input[type="checkbox"]{width:18px;height:18px;cursor:pointer;margin:0}
  .tx-item:last-child{border-bottom:none}
  .tx-dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
  .tx-item.expense .tx-dot{background:var(--terra)}
  .tx-main{min-width:0}
  .tx-desc{font-weight:600;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:6px}
  .tx-desc .paperclip{display:inline-flex;align-items:center;color:var(--ink-muted);font-size:11px;font-weight:400}
  .tx-desc .paperclip svg{width:12px;height:12px;margin-right:2px}
  .tx-meta{font-size:12px;color:var(--ink-muted);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap}
  .tx-meta .sep{opacity:0.4}
  .tx-amount{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums;font-weight:600;font-size:15px;text-align:right;white-space:nowrap}
  .tx-amount .sub{display:block;font-size:11px;color:var(--ink-muted);font-weight:400;margin-top:2px}
  .tx-item.expense .tx-amount{color:var(--terra)}
  .tx-item.income .tx-amount{color:var(--green)}

  .empty{text-align:center;padding:40px 20px;color:var(--ink-muted)}
  .empty .big{font-family:'Fraunces',serif;font-style:italic;font-size:20px;color:var(--ink-soft);margin-bottom:8px}
  .empty .small{font-size:13px}

  .filter-bar{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
  .pill{padding:7px 12px;border-radius:999px;border:1px solid var(--line-strong);background:var(--bg-card);font-size:13px;font-weight:500;cursor:pointer}
  .pill.active{background:var(--ink);color:var(--bg-card);border-color:var(--ink)}
  .search{flex:1;min-width:140px;padding:8px 12px;border:1px solid var(--line-strong);border-radius:999px;background:var(--bg-card);font-size:14px}

  .stat-bars{display:flex;align-items:flex-end;gap:3px;height:160px;padding:10px 0;border-bottom:1px solid var(--line-strong)}
  .stat-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;justify-content:flex-end;min-width:0}
  .stat-col .stack-vert{display:flex;flex-direction:column-reverse;width:100%;gap:2px;align-items:center}
  .stat-col .bar-in{background:var(--green);border-radius:3px 3px 0 0;width:70%;min-height:2px}
  .stat-col .bar-ex{background:var(--terra);border-radius:3px 3px 0 0;width:70%;min-height:2px}
  .stat-col .bar-empty{background:var(--line);width:70%;height:2px;border-radius:2px}
  .stat-month-labels{display:flex;gap:3px;margin-top:6px;padding-top:6px}
  .stat-month-labels > span{flex:1;text-align:center;font-size:10px;color:var(--ink-muted);font-weight:600}
  .stat-legend{display:flex;gap:16px;margin-bottom:12px;font-size:12px;color:var(--ink-soft)}
  .stat-legend .dot{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:6px;vertical-align:-1px}
  .stat-meta{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:16px}
  @media(min-width:760px){.stat-meta{grid-template-columns:repeat(4,1fr)}}
  .stat-meta .mini{background:var(--bg-sunk);border-radius:10px;padding:12px}
  .stat-meta .mini .lbl{font-size:10.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-muted);font-weight:600}
  .stat-meta .mini .val{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums;font-size:16px;font-weight:600;margin-top:4px}
  .top-list{display:flex;flex-direction:column}
  .top-item{display:grid;grid-template-columns:24px 1fr auto;gap:10px;padding:10px 0;align-items:center;border-bottom:1px dotted var(--line-strong)}
  .top-item:last-child{border-bottom:none}
  .top-item .rank{font-family:'Fraunces',serif;font-style:italic;font-size:16px;font-weight:600;color:var(--gold)}
  .top-item .name{font-weight:500;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .top-item .sub{font-size:11px;color:var(--ink-muted);margin-top:1px}
  .top-item .amount{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums;font-weight:600;font-size:14px;color:var(--green)}
  .top-item .bar-track{grid-column:2/-1;height:3px;background:var(--line);border-radius:2px;margin-top:6px;overflow:hidden}
  .top-item .bar-track > div{height:100%;background:var(--green)}
  .cat-row{display:grid;grid-template-columns:1fr auto;padding:10px 4px;border-bottom:1px dotted var(--line-strong);gap:10px;align-items:center}
  .cat-row:last-child{border-bottom:none;font-weight:600;padding-top:14px;border-top:1px solid var(--ink);margin-top:6px}
  .cat-row .cat-name{font-size:14px}
  .cat-row .cat-bar{grid-column:1/-1;height:3px;background:var(--line);border-radius:2px;overflow:hidden;margin-top:4px}
  .cat-row .cat-bar > div{height:100%;background:var(--green)}
  .cat-row.expense .cat-bar > div{background:var(--terra)}
  .cat-row .cat-amt{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums;font-weight:500;font-size:14px}

  .deadline-item{display:grid;grid-template-columns:60px 1fr auto;gap:14px;align-items:center;padding:14px 4px;border-bottom:1px solid var(--line)}
  .deadline-item:last-child{border-bottom:none}
  .deadline-date{background:var(--bg-sunk);border:1px solid var(--line);border-radius:10px;padding:6px;text-align:center}
  .deadline-date .d{font-family:'Fraunces',serif;font-size:20px;font-weight:600;line-height:1}
  .deadline-date .m{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-muted);margin-top:2px;font-weight:600}
  .deadline-title{font-weight:600;font-size:14.5px}
  .deadline-desc{font-size:12px;color:var(--ink-muted);margin-top:2px}
  .deadline-badge{font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;padding:4px 8px;border-radius:999px;background:var(--green-soft);color:var(--green)}
  .deadline-item.soon .deadline-badge{background:var(--terra-soft);color:var(--terra)}
  .deadline-item.past{opacity:0.5}

  .modal-overlay{position:fixed;inset:0;background:rgba(24,21,15,0.35);display:flex;align-items:flex-end;justify-content:center;z-index:50;backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);animation:fadeIn 0.18s ease}
  @media(min-width:640px){.modal-overlay{align-items:center}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
  .modal{background:var(--bg-card);width:100%;max-width:560px;border-radius:20px 20px 0 0;padding:20px;padding-bottom:calc(20px + env(safe-area-inset-bottom));max-height:92vh;overflow-y:auto;animation:slideUp 0.22s cubic-bezier(0.2,0.8,0.3,1);box-shadow:0 -10px 30px rgba(0,0,0,0.15)}
  .modal-wide{max-width:760px}
  @media(min-width:640px){.modal{border-radius:20px;max-height:90vh;padding-bottom:20px}}
  .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
  .modal-head h2{font-size:22px;font-weight:500;font-style:italic}
  .modal-close{width:36px;height:36px;border-radius:50%;display:grid;place-items:center;color:var(--ink-muted)}
  .modal-close:hover{background:var(--bg-sunk);color:var(--ink)}

  .type-switch{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:3px;background:var(--bg-sunk);border-radius:12px;margin-bottom:16px}
  .type-switch button{padding:10px;border-radius:10px;font-weight:600;font-size:14px;color:var(--ink-muted)}
  .type-switch button.active.income{background:var(--green);color:#fff}
  .type-switch button.active.expense{background:var(--terra);color:#fff}

  .tabs{display:flex;gap:4px;background:var(--bg-sunk);padding:3px;border-radius:12px;margin-bottom:16px;overflow-x:auto}
  .tabs button{padding:8px 14px;border-radius:9px;font-weight:600;font-size:13px;color:var(--ink-muted);white-space:nowrap}
  .tabs button.active{background:var(--bg-card);color:var(--ink);box-shadow:var(--shadow)}

  .receipt-zone{border:1.5px dashed var(--line-strong);border-radius:12px;padding:16px;text-align:center;background:var(--bg-sunk);cursor:pointer}
  .receipt-zone:hover{border-color:var(--ink);background:var(--bg-card)}
  .receipt-zone.drag{border-color:var(--green);background:var(--green-soft)}
  .receipt-zone .rz-big{font-family:'Fraunces',serif;font-size:15px;font-weight:500}

/* ============================================================
   STORAGE-ABSTRAKTION
   Nutzt window.storage (claude.ai) oder IndexedDB (lokaler Browser)
   ============================================================ */
const appStorage = (function(){
  // In claude.ai: window.storage nutzen
  if (typeof window !== 'undefined' && window.storage && typeof window.storage.get === 'function') {
    return {
      get:    (k) => appStorage.get(k),
      set:    (k,v) => appStorage.set(k,v),
      delete: (k) => appStorage.delete(k),
      _mode:  'claude',
    };
  }
  // Lokal: IndexedDB als Fallback
  const DB_NAME='hankebuch', STORE='kv', DB_VERSION=1;
  let dbPromise=null;
  function openDB(){
    if(!dbPromise){
      dbPromise=new Promise((resolve,reject)=>{
        if(typeof indexedDB==='undefined'){reject(new Error('IndexedDB nicht verfügbar'));return;}
        const req=indexedDB.open(DB_NAME,DB_VERSION);
        req.onupgradeneeded=()=>{ if(!req.result.objectStoreNames.contains(STORE)) req.result.createObjectStore(STORE); };
        req.onsuccess=()=>resolve(req.result);
        req.onerror=()=>reject(req.error);
      });
    }
    return dbPromise;
  }
  return {
    async get(key){
      const db=await openDB();
      return new Promise((resolve,reject)=>{
        const tx=db.transaction(STORE,'readonly');
        const req=tx.objectStore(STORE).get(key);
        req.onsuccess=()=>{ const v=req.result; resolve(v!==undefined?{key,value:v}:null); };
        req.onerror=()=>reject(req.error);
      });
    },
    async set(key,value){
      const db=await openDB();
      return new Promise((resolve,reject)=>{
        const tx=db.transaction(STORE,'readwrite');
        const req=tx.objectStore(STORE).put(value,key);
        req.onsuccess=()=>resolve({key,value});
        req.onerror=()=>reject(req.error);
      });
    },
    async delete(key){
      const db=await openDB();
      return new Promise((resolve,reject)=>{
        const tx=db.transaction(STORE,'readwrite');
        const req=tx.objectStore(STORE).delete(key);
        req.onsuccess=()=>resolve({key,deleted:true});
        req.onerror=()=>reject(req.error);
      });
    },
    _mode: 'indexeddb',
  };
})();

  monthFilter:'all', categoryFilter:'all', search:'',
  transactions:[], invoices:[], vendors:[], creditNotes:[],
  settings:{...DEFAULT_SETTINGS}, loading:true,
  pendingReceipts:[], _removedReceipts:[],
  settingsTab:'company', invoiceDraft:null,
  selectMode:false, selectedIds:new Set(),
  _dbxPending:false,
  // Sync-Status (nicht persistent)

};

async function loadAll(){
  try{const r=await appStorage.get('settings').catch(()=>null);if(r?.value)state.settings={...DEFAULT_SETTINGS,...JSON.parse(r.value)};}catch(e){}
  try{const r=await appStorage.get('transactions').catch(()=>null);if(r?.value)state.transactions=JSON.parse(r.value);}catch(e){state.transactions=[];}
  try{const r=await appStorage.get('invoices').catch(()=>null);if(r?.value)state.invoices=JSON.parse(r.value);}catch(e){state.invoices=[];}
  try{const r=await appStorage.get('vendors').catch(()=>null);if(r?.value)state.vendors=JSON.parse(r.value);}catch(e){state.vendors=[];}
  try{const r=await appStorage.get('creditNotes').catch(()=>null);if(r?.value)state.creditNotes=JSON.parse(r.value);}catch(e){state.creditNotes=[];}
  // Auth-Flow-Erkennung: wenn wir vor der Dropbox-Weiterleitung einen Marker gesetzt haben,
  // sofort in den Sync-Tab springen, damit der User den Code direkt einfügen kann.
  try{
    const r=await appStorage.get('_dbxAuthPending').catch(()=>null);
    if(r?.value==='1'){
      state._dbxPending=true;
      state.settingsTab='sync';
      await appStorage.delete('_dbxAuthPending');
      // Settings-Modal nach Render öffnen
      setTimeout(()=>openSettings('sync'), 100);
    }
  }catch(e){}
  state.loading=false;
  // Wenn Dropbox verbunden: Cloud-Daten prüfen und ggf. laden (im Hintergrund)
  if(dbxConnected()){
    setTimeout(async ()=>{
      await dbxLoadFromCloud();
      render();
    }, 200);
  }
}

/* ============================================================
   DROPBOX-SYNC
   PKCE-Flow mit offline-Scope für Refresh-Tokens.
   Kein Client-Secret nötig, sicher für Browser-Apps.
   ============================================================ */

const DBX_API = 'https://api.dropboxapi.com/2';
const DBX_CONTENT = 'https://content.dropboxapi.com/2';
const DBX_AUTH_URL = 'https://www.dropbox.com/oauth2/authorize';
const DBX_TOKEN_URL = 'https://api.dropboxapi.com/oauth2/token';

// --- PKCE Helpers ---
function dbxRandomString(len=64){
  const chars='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
  const arr=new Uint8Array(len); crypto.getRandomValues(arr);
  return Array.from(arr,b=>chars[b%chars.length]).join('');
}
async function dbxChallenge(verifier){
  const enc=new TextEncoder().encode(verifier);
  const hash=await crypto.subtle.digest('SHA-256',enc);
  const bytes=new Uint8Array(hash);
  let s=''; for(const b of bytes) s+=String.fromCharCode(b);
  return btoa(s).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}

// --- Start Auth Flow ---
async function dbxStartAuth(){
  const appKey=state.settings.dbxAppKey?.trim();
  if(!appKey){toast('Bitte App-Key eingeben');return;}
  // WICHTIG: window.open MUSS synchron im Klick-Handler passieren, sonst blockiert iOS.
  // Daher öffnen wir das Fenster sofort mit about:blank und setzen die URL erst später.
  const win=window.open('about:blank','_blank');
  try{
    const verifier=dbxRandomString(64);
    state.dbx.pkceVerifier=verifier;
    await appStorage.set('_dbxPkceVerifier', verifier);
    await appStorage.set('_dbxAuthPending', '1');
    const challenge=await dbxChallenge(verifier);
    const url=`${DBX_AUTH_URL}?client_id=${encodeURIComponent(appKey)}`
      +`&response_type=code&code_challenge=${challenge}&code_challenge_method=S256`
      +`&token_access_type=offline`;
    if(win && !win.closed){
      // Pop-up erfolgreich – URL nachträglich setzen
      win.location.href=url;
      toast('Dropbox in neuem Tab geöffnet. Nach dem Login den Code hier einfügen.');
    } else {
      // Blocker hat zugeschlagen – Fallback: gleicher Tab
      toast('Pop-ups blockiert – öffne Dropbox im gleichen Tab…');
      setTimeout(()=>{window.location.href=url;},1000);
    }
  }catch(e){
    if(win && !win.closed) win.close();
    toast('Fehler beim Vorbereiten: '+e.message);
  }
}

// --- Finish Auth: exchange code for refresh token ---
async function dbxFinishAuth(code){
  if(!code){toast('Bitte Autorisierungs-Code einfügen');return;}
  const appKey=state.settings.dbxAppKey?.trim();
  let verifier=state.dbx.pkceVerifier;
  if(!verifier){
    try{ const r=await appStorage.get('_dbxPkceVerifier'); if(r?.value) verifier=r.value; }catch(e){}
  }
  if(!verifier){toast('PKCE-Verifier verloren – bitte neu starten');return;}
  const body=new URLSearchParams({
    code:code.trim(), grant_type:'authorization_code',
    client_id:appKey, code_verifier:verifier,
  });
  try{
    const res=await fetch(DBX_TOKEN_URL,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body});
    if(!res.ok){const t=await res.text();throw new Error('Token-Tausch fehlgeschlagen: '+t);}
    const data=await res.json();
    if(!data.refresh_token){throw new Error('Kein Refresh-Token erhalten – App im "offline"-Modus registriert?');}
    state.settings.dbxRefreshToken=data.refresh_token;
    state.dbx.accessToken=data.access_token;
    state.dbx.accessTokenExpires=Date.now()+(data.expires_in||14400)*1000-60000;
    await saveSettings();
    try{ await appStorage.delete('_dbxPkceVerifier'); }catch(e){}
    state.dbx.pkceVerifier=null;
    toast('Dropbox verbunden! Lade Daten …');
    // Erst versuchen, Cloud-Daten zu laden (falls schon welche da sind)
    const loaded=await dbxLoadFromCloud();
    if(!loaded){
      // Keine Cloud-Datei vorhanden → aktuellen lokalen Stand hochladen
      await dbxSaveToCloud(true);
    }
    render();
  }catch(e){toast('Fehler: '+e.message);}
}

// --- Access Token holen (mit Refresh) ---
async function dbxGetAccessToken(){
  const now=Date.now();
  if(state.dbx.accessToken && state.dbx.accessTokenExpires>now) return state.dbx.accessToken;
  const appKey=state.settings.dbxAppKey?.trim();
  const rt=state.settings.dbxRefreshToken;
  if(!appKey||!rt) throw new Error('Nicht mit Dropbox verbunden');
  const body=new URLSearchParams({grant_type:'refresh_token',refresh_token:rt,client_id:appKey});
  const res=await fetch(DBX_TOKEN_URL,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body});
  if(!res.ok){const t=await res.text();throw new Error('Refresh fehlgeschlagen: '+t);}
  const data=await res.json();
  state.dbx.accessToken=data.access_token;
  state.dbx.accessTokenExpires=now+(data.expires_in||14400)*1000-60000;
  return state.dbx.accessToken;
}

function dbxConnected(){
  return !!(state.settings.dbxAppKey && state.settings.dbxRefreshToken);
}

// --- Build payload from current state ---
function dbxBuildPayload(){
  return {
    format:'hankebuch_sync_v1',
    savedAt:new Date().toISOString(),
    device:navigator.userAgent.includes('iPhone')?'iPhone':navigator.userAgent.includes('Mac')?'Mac':'Browser',
    settings:state.settings,
    transactions:state.transactions,
    invoices:state.invoices,
    vendors:state.vendors,
    creditNotes:state.creditNotes,
  };
}

// --- Upload to Dropbox ---
async function dbxSaveToCloud(force=false){
  if(!dbxConnected()) return false;
  if(state.dbx.syncStatus==='saving'&&!force) return false;
  state.dbx.syncStatus='saving'; state.dbx.lastError=null; updateSyncIndicator();
  try{
    const token=await dbxGetAccessToken();
    const payload=dbxBuildPayload();
    const body=new Blob([JSON.stringify(payload)],{type:'application/octet-stream'});
    const apiArg={path:state.settings.dbxPath||'/hankebuch-daten.json',mode:'overwrite',mute:true,autorename:false};
    const res=await fetch(`${DBX_CONTENT}/files/upload`,{
      method:'POST',
      headers:{'Authorization':'Bearer '+token,'Content-Type':'application/octet-stream','Dropbox-API-Arg':JSON.stringify(apiArg)},
      body,
    });
    if(!res.ok){const t=await res.text();throw new Error('Upload: '+t);}
    const data=await res.json();
    state.dbx.remoteRev=data.rev;
    state.dbx.lastSync=new Date().toISOString();
    state.dbx.syncStatus='idle';
    updateSyncIndicator();
    return true;
  }catch(e){
    state.dbx.syncStatus='error'; state.dbx.lastError=e.message;
    updateSyncIndicator();
    return false;
  }
}

// --- Download from Dropbox ---
async function dbxLoadFromCloud(){
  if(!dbxConnected()) return false;
  state.dbx.syncStatus='loading'; state.dbx.lastError=null; updateSyncIndicator();
  try{
    const token=await dbxGetAccessToken();
    const apiArg={path:state.settings.dbxPath||'/hankebuch-daten.json'};
    const res=await fetch(`${DBX_CONTENT}/files/download`,{
      method:'POST',
      headers:{'Authorization':'Bearer '+token,'Dropbox-API-Arg':JSON.stringify(apiArg)},
    });
    if(res.status===409){
      // Datei existiert nicht
      state.dbx.syncStatus='idle'; updateSyncIndicator();
      return false;
    }
    if(!res.ok){const t=await res.text();throw new Error('Download: '+t);}
    const metaStr=res.headers.get('dropbox-api-result');
    if(metaStr){try{const m=JSON.parse(metaStr); state.dbx.remoteRev=m.rev;}catch(e){}}
    const text=await res.text();
    const data=JSON.parse(text);
    if(data.format!=='hankebuch_sync_v1') throw new Error('Ungültiges Sync-Format');
    if(Array.isArray(data.transactions)) state.transactions=data.transactions;
    if(Array.isArray(data.invoices)) state.invoices=data.invoices;
    if(Array.isArray(data.vendors)) state.vendors=data.vendors;
    if(Array.isArray(data.creditNotes)) state.creditNotes=data.creditNotes;
    if(data.settings){
      // Settings nur teilweise übernehmen (nicht die eigenen Dropbox-Credentials überschreiben!)
      const preserve={dbxAppKey:state.settings.dbxAppKey,dbxRefreshToken:state.settings.dbxRefreshToken,dbxAutoSync:state.settings.dbxAutoSync,dbxPath:state.settings.dbxPath};
      state.settings={...DEFAULT_SETTINGS,...data.settings,...preserve};
    }
    // Lokal auch speichern
    await saveTransactions(); await saveInvoices(); await saveVendors(); await saveCreditNotes(); await saveSettings();
    state.dbx.lastSync=new Date().toISOString();
    state.dbx.syncStatus='idle';
    updateSyncIndicator();
    return true;
  }catch(e){
    state.dbx.syncStatus='error'; state.dbx.lastError=e.message;
    updateSyncIndicator();
    return false;
  }
}

// --- Debounced auto-save (1.5s after changes) ---
function dbxTriggerSave(){
  if(!dbxConnected()||!state.settings.dbxAutoSync) return;
  if(state.dbx.saveTimer) clearTimeout(state.dbx.saveTimer);
  state.dbx.saveTimer=setTimeout(()=>{dbxSaveToCloud();},1500);
}

// --- Disconnect ---
async function dbxDisconnect(){
  if(!confirm('Dropbox-Verbindung trennen? Deine Daten bleiben lokal und in Dropbox erhalten.'))return;
  state.settings.dbxRefreshToken='';
  state.dbx.accessToken=null;
  state.dbx.accessTokenExpires=0;
  state.dbx.remoteRev=null;
  state.dbx.lastSync=null;
  state.dbx.syncStatus='idle';
  await saveSettings();
  toast('Dropbox getrennt');
  render();
}

// --- UI update for sync indicator in header ---
function updateSyncIndicator(){
  const el=document.getElementById('sync-indicator');
  if(!el) return;
  const s=state.dbx.syncStatus;
  const last=state.dbx.lastSync;
  let content='';
  if(!dbxConnected()){ el.innerHTML=''; return; }
  if(s==='saving')    content='<span style="color:var(--gold)">↑ speichert …</span>';
  else if(s==='loading') content='<span style="color:var(--gold)">↓ lädt …</span>';
  else if(s==='error')   content=`<span style="color:var(--terra)" title="${escapeAttr(state.dbx.lastError||'')}">⚠ Sync-Fehler</span>`;
  else if(last){
    const ago=Math.round((Date.now()-new Date(last))/60000);
    const t=ago<1?'gerade':ago<60?`vor ${ago} Min`:`vor ${Math.round(ago/60)} Std`;
    content=`<span style="color:var(--green)">✓ ${t}</span>`;
  } else content='<span style="color:var(--ink-muted)">synct …</span>';
  el.innerHTML=content;
}

async function saveReceipt(txId,file){
  let blob=file;
  if(file.type.startsWith('image/')&&file.type!=='image/heic'){try{blob=await compressImage(file);}catch(e){}}
  const base64=await blobToBase64(blob);
  const id='rcpt_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
  const record={id,txId,filename:file.name,mime:blob.type||file.type,size:blob.size||file.size,data:base64,uploadedAt:new Date().toISOString()};
  await appStorage.set('receipt:'+id,JSON.stringify(record));
  return record;
}
async function loadReceipt(id){try{const r=await appStorage.get('receipt:'+id);return r?.value?JSON.parse(r.value):null;}catch(e){return null;}}
async function deleteReceiptStore(id){try{await appStorage.delete('receipt:'+id);}catch(e){}}
async function compressImage(file,maxWidth=1600,quality=0.82){
  return new Promise((resolve,reject)=>{
    const img=new Image();const url=URL.createObjectURL(file);
    img.onload=()=>{URL.revokeObjectURL(url);
      const scale=Math.min(1,maxWidth/img.width);
      const c=document.createElement('canvas');
      c.width=Math.round(img.width*scale);c.height=Math.round(img.height*scale);
      const ctx=c.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,c.width,c.height);
      ctx.drawImage(img,0,0,c.width,c.height);
      c.toBlob(b=>b?resolve(b):reject(new Error('Komprimierung fehlgeschlagen')),'image/jpeg',quality);
    };
    img.onerror=()=>{URL.revokeObjectURL(url);reject(new Error('Bild konnte nicht gelesen werden'));};
    img.src=url;
  });
}
function blobToBase64(blob){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=()=>rej(r.error);r.readAsDataURL(blob);});}

function uid(p='tx'){return p+'_'+Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function fmtEUR(n,opts={}){const{signed=false,decimals=2}=opts;const abs=Math.abs(n);const s=new Intl.NumberFormat('de-DE',{minimumFractionDigits:decimals,maximumFractionDigits:decimals}).format(abs);const sign=n<0?'−':(signed&&n>0?'+':'');return `${sign}${s}\u00A0€`;}
function fmtDate(iso){if(!iso)return'';const[y,m,d]=iso.split('-');return `${d}.${m}.${y}`;}
function todayISO(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function monthName(i){return['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'][i];}
function monthShort(i){return['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'][i];}
function quarterOf(iso){return Math.floor((parseInt(iso.slice(5,7),10)-1)/3)+1;}
function calcVat(gross,rate){const net=gross/(1+rate/100);return{net:round2(net),vat:round2(gross-net),gross:round2(gross)};}
function round2(n){return Math.round((n+Number.EPSILON)*100)/100;}
function parseAmount(s){if(typeof s==='number')return s;const c=String(s).replace(/\s/g,'').replace(/\./g,'').replace(',','.');const n=parseFloat(c);return isNaN(n)?0:n;}
function greeting(){const h=new Date().getHours();if(h<5)return'Gute Nacht';if(h<11)return'Guten Morgen';if(h<18)return'Guten Tag';return'Guten Abend';}
function daysBetween(a,b){return Math.round((new Date(b)-new Date(a))/86400000);}
function escapeHtml(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function escapeAttr(s){return escapeHtml(s).replace(/"/g,'&quot;');}
function fmtSize(b){if(b<1024)return b+' B';if(b<1024*1024)return(b/1024).toFixed(0)+' KB';return(b/(1024*1024)).toFixed(1)+' MB';}
function quoteOfTheDay(){const now=new Date();const day=Math.floor((now-new Date(now.getFullYear(),0,0))/86400000);return QUOTES[(day+now.getFullYear())%QUOTES.length];}
function shouldShowReminderNudge(){if(!state.settings.biweeklyReminder)return false;if(!state.transactions.length)return true;const latest=state.transactions.reduce((m,t)=>{const d=t.createdAt||(t.date+'T00:00:00');return d>m?d:m;},'');if(!latest)return true;return daysBetween(latest,new Date().toISOString())>=14;}
function nextInvoiceNumber(){const prefix=state.settings.invoicePrefix||'';const year=new Date().getFullYear();const num=state.settings.invoiceCounter||1;return `${prefix}${year}-${String(num).padStart(4,'0')}`;}
function addDays(iso,n){const d=new Date(iso);d.setDate(d.getDate()+n);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}

function renderDashboard(){

  const q=quoteOfTheDay();
  const monthTx=state.transactions.filter(t=>{const[y,m]=t.date.split('-').map(Number);return y===cy&&(m-1)===cm;});
  const yearTx=state.transactions.filter(t=>t.date.startsWith(String(state.year)));
  const monthIncome=sumNet(monthTx.filter(t=>t.type==='income'));
  const monthExpense=sumNet(monthTx.filter(t=>t.type==='expense'));
  const yearIncome=sumNet(yearTx.filter(t=>t.type==='income'));
  const yearExpense=sumNet(yearTx.filter(t=>t.type==='expense'));
  const yearProfit=yearIncome-yearExpense;
  const recent=[...state.transactions].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);
  const ust=calcVatBalance(yearTx);
  const showNudge=shouldShowReminderNudge();
  const openInv=state.invoices.filter(i=>i.status==='sent').length;

  return `
    <div class="greeting">
      <div class="eyebrow">${fmtDate(todayISO())}</div>
      <h1>${greeting()},<br><i>${escapeHtml(state.settings.businessName||'Hankemacht')}</i></h1>
    </div>
    <div class="quote-card"><div class="eyebrow">Gedanke des Tages</div>
      <blockquote>${escapeHtml(q.text)}</blockquote><cite>${escapeHtml(q.author)}</cite></div>
    ${showNudge?`<div class="nudge"><div class="icon">📝</div><div class="text"><div class="t">Zeit für deine Buchführung</div><div class="s">Trag die letzten zwei Wochen ein, bevor sich der Berg auftürmt.</div></div><button class="btn btn-sm btn-primary" data-action="new-income">Los geht's</button></div>`:''}
    <div class="section-title">Dieser Monat · ${monthName(cm)}</div>
    <div class="kpi-grid">
      <div class="kpi income"><div class="k-label">Einnahmen</div><div class="k-value">${fmtEUR(monthIncome)}</div><div class="k-sub">${monthTx.filter(t=>t.type==='income').length} Buchungen</div></div>
      <div class="kpi expense"><div class="k-label">Ausgaben</div><div class="k-value">${fmtEUR(monthExpense)}</div><div class="k-sub">${monthTx.filter(t=>t.type==='expense').length} Buchungen</div></div>
      <div class="kpi kpi-profit"><div class="k-label">Gewinn Jahr ${state.year}</div><div class="k-value">${fmtEUR(yearProfit,{signed:true})}</div><div class="k-sub">Einnahmen ${fmtEUR(yearIncome)} · Ausgaben ${fmtEUR(yearExpense)}</div></div>
    </div>
    <div class="quick-actions">
      <button class="quick income" data-action="new-income"><span class="plus">+</span><span class="t">Einnahme</span><span class="s">Erfassen & buchen</span></button>
      <button class="quick expense" data-action="new-expense"><span class="plus">+</span><span class="t">Ausgabe</span><span class="s">Beleg, Einkauf …</span></button>
      <button class="quick invoice" data-action="new-invoice"><span class="plus">📄</span><span class="t">Rechnung schreiben</span><span class="s">${openInv?openInv+' offen':'PDF erzeugen'}</span></button>
    </div>
    ${!state.settings.kleinunternehmer?`<div class="card"><div class="section-title">USt-Status Jahr ${state.year}</div>
      <div class="row">
        <div><div style="font-size:13px;color:var(--ink-muted)">Vereinnahmte USt</div><div class="num" style="font-size:17px;margin-top:2px">${fmtEUR(ust.collected)}</div></div>
        <div><div style="font-size:13px;color:var(--ink-muted)">Vorsteuer</div><div class="num" style="font-size:17px;margin-top:2px">${fmtEUR(ust.paid)}</div></div>
        <div style="text-align:right"><div style="font-size:13px;color:var(--ink-muted)">Zahllast</div><div class="num" style="font-size:17px;margin-top:2px;color:${ust.balance>0?'var(--terra)':'var(--green)'}">${fmtEUR(ust.balance,{signed:true})}</div></div>
      </div></div>`:''}
    <div class="card" style="margin-top:14px"><div class="section-title">Letzte Buchungen <button class="btn btn-ghost btn-sm" data-view-goto="${recent[0]?.type||'income'}">alle ansehen</button></div>
      ${recent.length?`<div class="list">${recent.map(renderTxItem).join('')}</div>`:`<div class="empty"><div class="big">Noch keine Buchungen</div><div class="small">Leg mit der ersten Einnahme oder Ausgabe los.</div></div>`}
    </div>`;
}

function renderTransactionList(type){
  const all=state.transactions.filter(t=>t.type===type&&t.date.startsWith(String(state.year)));
  let f=all;
  if(state.monthFilter!=='all'){
    if(typeof state.monthFilter==='number')f=f.filter(t=>parseInt(t.date.slice(5,7),10)-1===state.monthFilter);
    else if(state.monthFilter.startsWith('q')){const q=parseInt(state.monthFilter.slice(1));f=f.filter(t=>quarterOf(t.date)===q);}
  }
  if(state.categoryFilter!=='all')f=f.filter(t=>t.category===state.categoryFilter);
  if(state.search.trim()){const q=state.search.toLowerCase();f=f.filter(t=>(t.description||'').toLowerCase().includes(q)||(t.contact||'').toLowerCase().includes(q)||(t.invoiceNumber||'').toLowerCase().includes(q));}
  f.sort((a,b)=>b.date.localeCompare(a.date));
  const totalNet=sumNet(f);const totalGross=sumGross(f);
  const cats=type==='income'?INCOME_CATEGORIES:EXPENSE_CATEGORIES;
  const lbl=type==='income'?'Einnahmen':'Ausgaben';
  return `
    <div class="row" style="margin-bottom:16px">
      <h1 style="font-size:28px;font-style:italic;font-weight:500"><b>${lbl}</b> ${state.year}</h1>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn" data-action="toggle-select">${state.selectMode?'Fertig':'Auswählen'}</button>
        <button class="btn ${type==='income'?'btn-green':'btn-terra'}" data-action="new-${type}">${ICON.plus} Neu</button>
      </div>
    </div>
    <div class="filter-bar">
      <select class="pill" id="month-filter">
        <option value="all" ${state.monthFilter==='all'?'selected':''}>Ganzes Jahr</option>
        <optgroup label="Quartale">${[1,2,3,4].map(q=>`<option value="q${q}" ${state.monthFilter==='q'+q?'selected':''}>Q${q}</option>`).join('')}</optgroup>
        <optgroup label="Monate">${Array.from({length:12},(_,i)=>`<option value="${i}" ${state.monthFilter===i?'selected':''}>${monthName(i)}</option>`).join('')}</optgroup>
      </select>
      <select class="pill" id="cat-filter">
        <option value="all" ${state.categoryFilter==='all'?'selected':''}>Alle Kategorien</option>
        ${cats.map(c=>`<option value="${c}" ${state.categoryFilter===c?'selected':''}>${c}</option>`).join('')}
      </select>
      <input type="text" class="search" id="search-input" placeholder="Suchen…" value="${escapeAttr(state.search)}">
    </div>
    ${state.selectMode?`
      <div class="card" style="margin-bottom:12px;padding:10px 14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:var(--bg-sunk)">
        <button class="btn btn-sm" data-action="select-all">Alle auswählen${f.length?` (${f.length})`:''}</button>
        <div style="flex:1;font-size:13px;color:var(--ink-muted)">${state.selectedIds.size} ausgewählt</div>
        <button class="btn btn-sm" data-action="clear-selection" ${state.selectedIds.size===0?'disabled':''}>Auswahl aufheben</button>
        <button class="btn btn-sm" style="background:var(--terra);color:#fff;border-color:var(--terra)" data-action="bulk-delete" ${state.selectedIds.size===0?'disabled':''}>${ICON.trash} ${state.selectedIds.size} löschen</button>
      </div>
    `:''}
    <div class="card">
      ${f.length?`<div class="list">${f.map(renderTxItem).join('')}</div>
        <div style="display:flex;justify-content:space-between;padding-top:14px;margin-top:10px;border-top:1px solid var(--ink);font-weight:600">
          <div>Summe (${f.length})</div>
          <div class="num">${fmtEUR(totalNet)} <span style="color:var(--ink-muted);font-weight:400;font-size:12px">netto · ${fmtEUR(totalGross)} brutto</span></div>
        </div>`:`<div class="empty"><div class="big">Nichts gefunden.</div><div class="small">Keine Buchungen für diese Filter.</div></div>`}
    </div>`;
}
function renderTxItem(t){
  const has=(t.receiptIds||[]).length>0;
  const isSelected=state.selectedIds.has(t.id);
  const cb=state.selectMode?`<div class="tx-check"><input type="checkbox" data-select-tx="${t.id}" ${isSelected?'checked':''}></div>`:'';
  return `<div class="tx-item ${t.type} ${state.selectMode?'select-mode':''} ${isSelected?'selected':''}" data-edit="${t.id}">
    ${cb}
    <div class="tx-dot"></div>
    <div class="tx-main">
      <div class="tx-desc">${escapeHtml(t.description||'(Ohne Beschreibung)')}${has?`<span class="paperclip">${ICON.paper}${t.receiptIds.length}</span>`:''}</div>
      <div class="tx-meta"><span>${fmtDate(t.date)}</span><span class="sep">·</span><span class="cat-chip">${escapeHtml(t.category)}</span>${t.contact?`<span class="sep">·</span><span>${escapeHtml(t.contact)}</span>`:''}</div>
    </div>
    <div class="tx-amount">${fmtEUR(t.gross,{signed:t.type==='income'})}<span class="sub">${t.vatRate>0?`${fmtEUR(t.net)} + ${t.vatRate}% USt`:(state.settings.kleinunternehmer?'Kleinunt.':'ohne USt')}</span></div>
  </div>`;
}

/* INVOICES */
function renderInvoiceList(){
  const yearInv=state.invoices.filter(i=>(i.invoiceDate||'').startsWith(String(state.year)));
  const sorted=[...yearInv].sort((a,b)=>(b.invoiceDate||'').localeCompare(a.invoiceDate||''));
  const open=sorted.filter(i=>i.status==='sent');
  const paid=sorted.filter(i=>i.status==='paid');
  const draft=sorted.filter(i=>i.status==='draft');
  const totalPaid=round2(paid.reduce((s,i)=>s+(i.totalGross||0),0));
  const totalOpen=round2(open.reduce((s,i)=>s+(i.totalGross||0),0));
  const totalSent=round2(sorted.filter(i=>i.status!=='draft').reduce((s,i)=>s+(i.totalGross||0),0));
  const stammdatenOk=state.settings.ownerName&&state.settings.street&&state.settings.zip&&state.settings.city&&(state.settings.taxNumber||state.settings.vatId);
  return `
    <div class="row" style="margin-bottom:16px">
      <h1 style="font-size:28px;font-style:italic;font-weight:500"><b>Rechnungen</b> ${state.year}</h1>
      <button class="btn btn-primary" data-action="new-invoice">${ICON.plus} Rechnung</button>
    </div>
    ${!stammdatenOk?`<div class="nudge"><div class="icon">⚠️</div>
      <div class="text"><div class="t">Stammdaten unvollständig</div><div class="s">Für rechtskonforme Rechnungen brauchst du Name, Adresse und Steuer- oder USt-IdNr.</div></div>
      <button class="btn btn-sm btn-primary" data-open-settings="invoice">Einstellungen</button></div>`:''}
    <div class="kpi-grid">
      <div class="kpi"><div class="k-label">Bezahlt</div><div class="k-value" style="color:var(--green)">${fmtEUR(totalPaid)}</div><div class="k-sub">${paid.length} Rechnungen</div></div>
      <div class="kpi"><div class="k-label">Offen</div><div class="k-value" style="color:var(--gold)">${fmtEUR(totalOpen)}</div><div class="k-sub">${open.length} versendet</div></div>
      <div class="kpi"><div class="k-label">Gesamt fakturiert</div><div class="k-value">${fmtEUR(totalSent)}</div><div class="k-sub">brutto, ohne Entwürfe</div></div>
    </div>
    ${draft.length?`<div class="card"><div class="section-title">Entwürfe (${draft.length})</div><div class="list">${draft.map(renderInvRow).join('')}</div></div>`:''}
    <div class="card"><div class="section-title">Alle Rechnungen ${state.year}</div>
      ${sorted.filter(i=>i.status!=='draft').length?`<div class="list">${sorted.filter(i=>i.status!=='draft').map(renderInvRow).join('')}</div>`:`<div class="empty"><div class="big">Noch keine Rechnungen.</div><div class="small">Schreib deine erste mit dem Knopf oben.</div></div>`}
    </div>`;
}
function renderInvRow(i){
  const wooBadge=i.wooOrderId?` <span style="display:inline-block;padding:1px 6px;background:#96588a14;color:#96588a;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:0.04em;margin-left:4px;vertical-align:1px">WC</span>`:'';
  return `<div class="inv-row" data-edit-invoice="${i.id}">
    <div>
      <div class="inv-num">${escapeHtml(i.number||'(neu)')}${wooBadge}</div>
      <div class="inv-customer">${escapeHtml(i.customer?.name||'—')}</div>
      <div class="inv-meta">${fmtDate(i.invoiceDate||todayISO())}${i.dueDate?` · fällig ${fmtDate(i.dueDate)}`:''}</div>
    </div>
    <div class="inv-amount">${fmtEUR(i.totalGross||0)}</div>
    <div class="inv-status ${i.status||'draft'}">${({draft:'Entwurf',sent:'Versendet',paid:'Bezahlt'}[i.status||'draft'])}</div>
  </div>`;
}

function openInvoiceModal(invoiceId=null){
  let inv=invoiceId?state.invoices.find(i=>i.id===invoiceId):null;
  if(!inv){
    const d=defaultDateForEntry();
    inv={
      id:uid('inv'), number:nextInvoiceNumber(), _isNew:true, status:'draft',
      invoiceDate:d, serviceDate:d,
      dueDate:addDays(d,state.settings.paymentTermsDays||14),
      customer:{name:'',street:'',zip:'',city:'',country:'Deutschland',email:''},
      items:[{description:'',qty:1,unit:'Stk.',unitPrice:0,vatRate:state.settings.kleinunternehmer?0:state.settings.defaultVatRate}],
      introText:'',
      footerNote:state.settings.invoiceFooterText||'',
      paymentTerms:`Bitte überweisen Sie den Rechnungsbetrag innerhalb von ${state.settings.paymentTermsDays} Tagen ohne Abzug.`,
      rightsTransfer:state.settings.rightsTransferText || DEFAULT_RIGHTS_TEXT,
      rightsEnabled:false,
      rightsProductionCompany:'',
      rightsProductionName:'',
      includeKleinunternehmerNotice:state.settings.kleinunternehmer,
    };
  } else {
    inv=JSON.parse(JSON.stringify(inv));
  }
  state.invoiceDraft=inv;
  renderInvoiceModal();
}

function renderInvItemRow(it,idx){
  const units=['Stk.','Std.','Tag','Pauschal','km','m','m²','kg','l','Min.','Woche','Monat'];
  const unitVal=it.unit||'Stk.';
  const isCustom=!units.includes(unitVal);
  return `<div class="inv-item" data-item-idx="${idx}">
    <input type="text" class="i-desc" placeholder="z. B. Webdesign Stunden" value="${escapeAttr(it.description||'')}">
    <input type="text" inputmode="decimal" class="i-qty num-input" value="${String(it.qty||0).replace('.',',')}" placeholder="1">
    <div class="i-unit-wrap">
      <select class="i-unit-select" data-unit-select>
        ${units.map(u=>`<option value="${u}" ${u===unitVal?'selected':''}>${u}</option>`).join('')}
        <option value="__custom__" ${isCustom?'selected':''}>Eigene…</option>
      </select>
      <input type="text" class="i-unit" value="${escapeAttr(unitVal)}" style="${isCustom?'':'display:none'}" placeholder="Einheit">
    </div>
    <select class="i-vat">${VAT_RATES.map(r=>`<option value="${r}" ${r===it.vatRate?'selected':''}>${r}%</option>`).join('')}</select>
    <input type="text" inputmode="decimal" class="i-price num-input" value="${String(it.unitPrice||0).replace('.',',')}" placeholder="0,00">
    <button class="del-line" data-del-item="${idx}">${ICON.close}</button>
  </div>`;
}

function bindInvoiceForm(){
  document.querySelectorAll('.modal input,.modal textarea,.modal select').forEach(el=>{
    el.addEventListener('input',collectInvoiceDraft);
    el.addEventListener('change',collectInvoiceDraft);
  });
  // Einheit-Select: "Eigene…" blendet Freitextfeld ein, sonst wird Wert übernommen
  document.querySelectorAll('[data-unit-select]').forEach(sel=>{
    sel.addEventListener('change',e=>{
      const row=sel.closest('.inv-item');
      const txt=row.querySelector('.i-unit');
      if(sel.value==='__custom__'){
        txt.style.display='';
        txt.focus();
      } else {
        txt.value=sel.value;
        txt.style.display='none';
        collectInvoiceDraft();
      }
    });
  });
  // Rechteübertragung-Checkbox: Felder ein-/ausblenden
  const rightsEn=document.getElementById('inv-rights-enabled');
  if(rightsEn){
    rightsEn.addEventListener('change',()=>{
      const box=document.getElementById('inv-rights-fields');
      if(box) box.style.display=rightsEn.checked?'':'none';
    });
  }
  document.querySelectorAll('[data-del-item]').forEach(b=>b.addEventListener('click',e=>{
    const idx=parseInt(b.dataset.delItem);
    collectInvoiceDraft();
    state.invoiceDraft.items.splice(idx,1);
    if(state.invoiceDraft.items.length===0){
      state.invoiceDraft.items.push({description:'',qty:1,unit:'Stk.',unitPrice:0,vatRate:state.settings.defaultVatRate});
    }
    renderInvoiceModal();
  }));
}

function collectInvoiceDraft(){
  const inv=state.invoiceDraft;
  inv.number=document.getElementById('inv-number').value.trim();
  inv.status=document.getElementById('inv-status').value;
  inv.invoiceDate=document.getElementById('inv-date').value;
  inv.serviceDate=document.getElementById('inv-service').value;
  const periodEl=document.getElementById('inv-period'); if(periodEl) inv.servicePeriod=periodEl.value.trim();
  inv.dueDate=document.getElementById('inv-due').value;
  inv.customer={
    name:document.getElementById('cust-name').value.trim(),
    street:document.getElementById('cust-street').value.trim(),
    zip:document.getElementById('cust-zip').value.trim(),
    city:document.getElementById('cust-city').value.trim(),
    country:document.getElementById('cust-country').value.trim(),
    email:document.getElementById('cust-email').value.trim(),
  };
  inv.introText=document.getElementById('inv-intro').value;
  inv.paymentTerms=document.getElementById('inv-terms').value;
  inv.footerNote=document.getElementById('inv-footer').value;
  const rightsEl=document.getElementById('inv-rights'); if(rightsEl) inv.rightsTransfer=rightsEl.value;
  const rightsEn=document.getElementById('inv-rights-enabled'); if(rightsEn) inv.rightsEnabled=rightsEn.checked;
  const rightsCo=document.getElementById('inv-rights-company'); if(rightsCo) inv.rightsProductionCompany=rightsCo.value;
  const rightsPr=document.getElementById('inv-rights-production'); if(rightsPr) inv.rightsProductionName=rightsPr.value;
  const k=document.getElementById('inv-klein');
  if(k)inv.includeKleinunternehmerNotice=k.checked;
  inv.items=Array.from(document.querySelectorAll('.inv-item')).map(row=>({
    description:row.querySelector('.i-desc').value,
    qty:parseAmount(row.querySelector('.i-qty').value),
    unit:row.querySelector('.i-unit').value,
    vatRate:parseInt(row.querySelector('.i-vat').value,10),
    unitPrice:parseAmount(row.querySelector('.i-price').value),
  }));
  const totals=computeInvoiceTotals(inv);
  const totEl=document.querySelector('.inv-totals');
  if(totEl){
    totEl.innerHTML=`
      <div class="tot-row"><span>Zwischensumme (netto)</span><span class="num">${fmtEUR(totals.totalNet)}</span></div>
      ${totals.vatBreakdown.map(v=>`<div class="tot-row"><span>USt ${v.rate}% auf ${fmtEUR(v.base)}</span><span class="num">${fmtEUR(v.vat)}</span></div>`).join('')}
      <div class="tot-row grand"><span>Gesamtbetrag</span><span class="num">${fmtEUR(totals.totalGross)}</span></div>`;
  }
}

function computeInvoiceTotals(inv){
  const klein=state.settings.kleinunternehmer&&inv.includeKleinunternehmerNotice;
  const lines=(inv.items||[]).map(it=>{
    const lineNet=round2((it.qty||0)*(it.unitPrice||0));
    const rate=klein?0:(it.vatRate||0);
    const lineVat=round2(lineNet*rate/100);
    return {...it,lineNet,rate,lineVat,lineGross:round2(lineNet+lineVat)};
  });
  const totalNet=round2(lines.reduce((s,l)=>s+l.lineNet,0));
  const totalVat=round2(lines.reduce((s,l)=>s+l.lineVat,0));
  const totalGross=round2(totalNet+totalVat);
  const grouped={};
  lines.forEach(l=>{if(!grouped[l.rate])grouped[l.rate]={rate:l.rate,base:0,vat:0};grouped[l.rate].base=round2(grouped[l.rate].base+l.lineNet);grouped[l.rate].vat=round2(grouped[l.rate].vat+l.lineVat);});
  const vatBreakdown=Object.values(grouped).filter(v=>v.rate>0).sort((a,b)=>a.rate-b.rate);
  inv.totalNet=totalNet;inv.totalVat=totalVat;inv.totalGross=totalGross;inv.lines=lines;inv.vatBreakdown=vatBreakdown;
  return {totalNet,totalVat,totalGross,vatBreakdown,lines};
}

async function saveInvoice(){
  collectInvoiceDraft();
  const inv=state.invoiceDraft;
  if(!inv.customer.name||!inv.customer.street||!inv.customer.city){toast('Bitte Kundenadresse vollständig angeben');return null;}
  if(!inv.items.length||!inv.items.some(i=>i.description&&i.unitPrice>0)){toast('Bitte mindestens eine gültige Position');return null;}
  computeInvoiceTotals(inv);
  if(inv._isNew){
    state.settings.invoiceCounter=(state.settings.invoiceCounter||1)+1;
    await saveSettings();
    delete inv._isNew;
  }
  const idx=state.invoices.findIndex(i=>i.id===inv.id);
  if(idx>=0)state.invoices[idx]=inv;else state.invoices.push(inv);
  if(inv.status==='paid'&&!inv.txId){
    const txId=uid();
    state.transactions.push({
      id:txId,type:'income',date:inv.invoiceDate,
      description:`Rechnung ${inv.number} · ${inv.customer.name}`,
      contact:inv.customer.name,invoiceNumber:inv.number,
      category:INCOME_CATEGORIES[0],
      gross:inv.totalGross,net:inv.totalNet,vat:inv.totalVat,
      vatRate:inv.vatBreakdown[0]?.rate||0,
      notes:`Automatisch aus Rechnung ${inv.number} erzeugt`,
      createdAt:new Date().toISOString(),
    });
    inv.txId=txId;
    await saveTransactions();
  }
  await saveInvoices();
  toast('Rechnung gespeichert');
  return inv;
}

async function deleteInvoice(){
  const inv=state.invoiceDraft;
  if(!inv||inv._isNew){closeModal();return;}
  if(!confirm('Rechnung wirklich löschen? Wenn sie schon versendet wurde, sollte sie aus rechtlichen Gründen storniert statt gelöscht werden.'))return;
  if(inv.txId){state.transactions=state.transactions.filter(t=>t.id!==inv.txId);await saveTransactions();}
  state.invoices=state.invoices.filter(i=>i.id!==inv.id);
  await saveInvoices();
  toast('Rechnung gelöscht');
  closeModal();render();
}

function resolveRightsTransferText(inv){
  // Liefert fertig-gerenderten Text (oder leeren String)
  const showNew=inv.rightsEnabled;
  const showLegacy=!inv.rightsEnabled && inv.rightsTransfer && inv.rightsTransfer!==state.settings.rightsTransferText && inv.rightsTransfer.trim();
  if(!showNew && !showLegacy) return '';
  // Fallback-Kette: inv.rightsTransfer → settings.rightsTransferText → hartkodierter Default
  let text=inv.rightsTransfer || state.settings.rightsTransferText || DEFAULT_RIGHTS_TEXT;
  if(!text.trim()) text=DEFAULT_RIGHTS_TEXT;
  if(showNew){
    text=text.replace(/\[NAME\/PRODUKTIONSFIRMA\]/g, inv.rightsProductionCompany||'[NAME/PRODUKTIONSFIRMA]');
    text=text.replace(/\[PRODUKTIONSNAME\]/g, inv.rightsProductionName||'[PRODUKTIONSNAME]');
  }
  return text;
}

/* SETTINGS modal */
function openSettings(targetTab){
  if(targetTab)state.settingsTab=targetTab;
  document.getElementById('modal-root').innerHTML=renderSettingsModal();
  bindModal();
  document.querySelectorAll('.tabs button').forEach(b=>b.addEventListener('click',()=>{state.settingsTab=b.dataset.tab;openSettings();}));
  const fi=document.getElementById('import-file');if(fi)fi.addEventListener('change',e=>{if(e.target.files[0])importJSON(e.target.files[0]);});
  const woo=document.getElementById('woo-file');if(woo)woo.addEventListener('change',e=>{if(e.target.files[0])importWooCommerce(e.target.files[0]);});
  const bulk=document.getElementById('bulk-file');if(bulk)bulk.addEventListener('change',e=>{if(e.target.files.length)handleBulkUpload(Array.from(e.target.files));});
}

/* EÜR & USt EXPORT */
function exportEUER(year){
  const list=state.transactions.filter(t=>t.date.startsWith(String(year)));
  const income=list.filter(t=>t.type==='income');
  const expense=list.filter(t=>t.type==='expense');
  const incomeByCat=groupByCategory(income);
  const expenseByCat=groupByCategory(expense);
  const totalIn=sumNet(income);const totalEx=sumNet(expense);
  const profit=round2(totalIn-totalEx);
  const ust=calcVatBalance(list);
  const rows=[];
  rows.push(['EÜR-Auswertung '+year]);
  rows.push(['Erstellt am',new Date().toLocaleString('de-DE')]);
  rows.push(['Unternehmen',state.settings.businessName||state.settings.ownerName]);
  rows.push(['Steuernummer',state.settings.taxNumber||'']);
  rows.push([]);
  rows.push(['BETRIEBSEINNAHMEN (netto)']);
  rows.push(['Kategorie','Netto in €']);
  Object.entries(incomeByCat).sort((a,b)=>b[1]-a[1]).forEach(([cat,amt])=>rows.push([cat,toCsvNum(amt)]));
  rows.push(['Summe Einnahmen',toCsvNum(totalIn)]);
  rows.push([]);
  rows.push(['BETRIEBSAUSGABEN (netto)']);
  rows.push(['Kategorie','Netto in €']);
  Object.entries(expenseByCat).sort((a,b)=>b[1]-a[1]).forEach(([cat,amt])=>rows.push([cat,toCsvNum(amt)]));
  rows.push(['Summe Ausgaben',toCsvNum(totalEx)]);
  rows.push([]);
  rows.push(['ERGEBNIS']);
  rows.push(['Gewinn / Verlust (vor Steuern)',toCsvNum(profit)]);
  if(!state.settings.kleinunternehmer){
    rows.push([]);
    rows.push(['UMSATZSTEUER '+year]);
    rows.push(['Vereinnahmte USt',toCsvNum(ust.collected)]);
    rows.push(['Gezahlte Vorsteuer',toCsvNum(ust.paid)]);
    rows.push(['Zahllast / Erstattung',toCsvNum(ust.balance)]);
  }
  const csv=rows.map(r=>r.map(csvCell).join(';')).join('\r\n');
  download(`euer_${year}.csv`,'\uFEFF'+csv,'text/csv;charset=utf-8');
}

function exportUstVoranmeldung(year){
  const cycle=state.settings.vatCycle;
  const periods=[];
  if(cycle==='monthly'){
    for(let m=0;m<12;m++)periods.push({key:`${year}-${String(m+1).padStart(2,'0')}`,label:`${monthName(m)} ${year}`,filter:t=>parseInt(t.date.slice(5,7),10)-1===m});
  } else {
    for(let q=1;q<=4;q++)periods.push({key:`${year}-Q${q}`,label:`Q${q} ${year}`,filter:t=>quarterOf(t.date)===q});
  }
  const yearTx=state.transactions.filter(t=>t.date.startsWith(String(year)));
  const rows=[];
  rows.push(['Umsatzsteuer-Voranmeldungen '+year]);
  rows.push(['Erstellt am',new Date().toLocaleString('de-DE')]);
  rows.push(['Zyklus',cycle==='monthly'?'Monatlich':'Quartalsweise']);
  rows.push(['Steuernummer',state.settings.taxNumber||'']);
  rows.push(['USt-IdNr.',state.settings.vatId||'']);
  rows.push([]);
  rows.push(['Zeitraum','Bemessungsgrundlage 19% (netto)','USt 19%','Bemessungsgrundlage 7% (netto)','USt 7%','Steuerfreie Umsätze (0%)','USt gesamt','Vorsteuer','Zahllast / Erstattung','Abgabefrist']);
  let totalCollected=0,totalPaid=0;
  periods.forEach(p=>{
    const pTx=yearTx.filter(p.filter);
    const inc=pTx.filter(t=>t.type==='income');
    const exp=pTx.filter(t=>t.type==='expense');
    const base19=round2(inc.filter(t=>t.vatRate===19).reduce((s,t)=>s+t.net,0));
    const vat19=round2(inc.filter(t=>t.vatRate===19).reduce((s,t)=>s+t.vat,0));
    const base7=round2(inc.filter(t=>t.vatRate===7).reduce((s,t)=>s+t.net,0));
    const vat7=round2(inc.filter(t=>t.vatRate===7).reduce((s,t)=>s+t.vat,0));
    const base0=round2(inc.filter(t=>t.vatRate===0).reduce((s,t)=>s+t.net,0));
    const collected=round2(vat19+vat7);
    const paid=round2(exp.reduce((s,t)=>s+(t.vat||0),0));
    const balance=round2(collected-paid);
    totalCollected=round2(totalCollected+collected);
    totalPaid=round2(totalPaid+paid);
    let due='';
    if(cycle==='monthly'){
      const m=parseInt(p.key.slice(5,7),10);const dy=m===12?year+1:year;const dm=m===12?1:m+1;
      due=`10.${String(dm).padStart(2,'0')}.${dy}`;
    } else {
      const q=parseInt(p.key.slice(-1));const dueMonths={1:[4,year],2:[7,year],3:[10,year],4:[1,year+1]};
      due=`10.${String(dueMonths[q][0]).padStart(2,'0')}.${dueMonths[q][1]}`;
    }
    rows.push([p.label,toCsvNum(base19),toCsvNum(vat19),toCsvNum(base7),toCsvNum(vat7),toCsvNum(base0),toCsvNum(collected),toCsvNum(paid),toCsvNum(balance),due]);
  });
  rows.push([]);
  rows.push(['Jahressumme','','','','','',toCsvNum(totalCollected),toCsvNum(totalPaid),toCsvNum(totalCollected-totalPaid),'']);
  rows.push([]);
  rows.push(['Hinweis: Diese Werte sind als Ausgangsmaterial für die ELSTER-Voranmeldung gedacht.']);
  rows.push(['Sie ersetzen NICHT die Einreichung über ELSTER.']);
  const csv=rows.map(r=>r.map(csvCell).join(';')).join('\r\n');
  download(`ust_voranmeldung_${year}.csv`,'\uFEFF'+csv,'text/csv;charset=utf-8');
}

function sumNet(l){return round2(l.reduce((s,t)=>s+(t.net||0),0));}
function sumGross(l){return round2(l.reduce((s,t)=>s+(t.gross||0),0));}
function calcVatBalance(l){const c=round2(l.filter(t=>t.type==='income').reduce((s,t)=>s+(t.vat||0),0));const p=round2(l.filter(t=>t.type==='expense').reduce((s,t)=>s+(t.vat||0),0));return{collected:c,paid:p,balance:round2(c-p)};}
function groupByCategory(l){return l.reduce((a,t)=>{a[t.category]=round2((a[t.category]||0)+(t.net||0));return a;},{});}
function availableYears(){
  const current=new Date().getFullYear();
  const y=new Set();
  for(let year=2021;year<=current;year++) y.add(year);
  state.transactions.forEach(t=>y.add(parseInt(t.date.slice(0,4))));
  state.invoices.forEach(i=>y.add(parseInt((i.invoiceDate||todayISO()).slice(0,4))));
  return[...y].sort((a,b)=>b-a);
}
function defaultDateForEntry(){
  const cy=new Date().getFullYear();
  if(state.year===cy) return todayISO();
  // Rückwirkend: 1. Januar des gewählten Jahres als Start; Nutzer kann im Datum-Feld anpassen
  return `${state.year}-01-01`;
}

// Generiert die nächste Gutschrift-Nummer im Format GS-YYYY-NNNN
function nextCreditNoteNumber(){
  const year=new Date().getFullYear();
  const existing=state.creditNotes.filter(c=>c.number&&c.number.startsWith(`GS-${year}-`));
  const maxNum=existing.reduce((max,c)=>{
    const match=(c.number||'').match(/GS-\d{4}-(\d+)/);
    return match?Math.max(max,parseInt(match[1],10)):max;
  },0);
  return `GS-${year}-${String(maxNum+1).padStart(4,'0')}`;
}

// Findet alle Einnahmen-Transaktionen, die einem Anbieter in einem Zeitraum zugeordnet sind.
// Für die Zuordnung nutzen wir die Product-Vendor-Metadaten in der Transaktion,
// die beim WooCommerce-Import aus dem "vendors"-Array der Bestellung übernommen wurden.
function findVendorEarnings(vendorId, from, to){
  const v=state.vendors.find(x=>x.id===vendorId);
  if(!v)return [];
  const vendorCommissionPct=typeof v.commissionPct==='number'?v.commissionPct:0;
  const lines=[];
  state.transactions.forEach(t=>{
    if(t.type!=='income')return;
    if(t.date<from||t.date>to)return;
    if(!t.wooVendors||!Array.isArray(t.wooVendors))return;
    t.wooVendors.forEach(wv=>{
      if(wv.vendor_id!==v.productVendorId)return;
      // Plattform-Provision ermitteln:
      // 1. Wenn Plugin einen Wert > 0 liefert → verwenden
      // 2. Sonst Hankebuch-Stammdaten-Wert anwenden
      const pluginPct=wv.items?.[0]?.commission_pct||0;
      const pluginCommission=wv.commission||0;
      let effectivePct, effectiveCommission, effectiveShare;
      if(pluginPct>0||pluginCommission>0){
        effectivePct=pluginPct;
        effectiveCommission=pluginCommission;
        effectiveShare=wv.vendor_share;
      } else if(vendorCommissionPct>0){
        // Fallback: Satz aus Anbieter-Stammdaten in Hankebuch
        effectivePct=vendorCommissionPct;
        effectiveCommission=round2(wv.line_total_net*vendorCommissionPct/100);
        effectiveShare=round2(wv.line_total_net-effectiveCommission);
      } else {
        // Keine Provision definiert → 0 % Plattform-Anteil, Anbieter bekommt alles
        effectivePct=0;
        effectiveCommission=0;
        effectiveShare=wv.line_total_net;
      }
      if(effectiveShare<=0)return;
      lines.push({
        txId:t.id,
        date:t.date,
        orderNumber:t.invoiceNumber||t.wooOrderNumber||'',
        description:(t.description||'').replace(/^[^·]*·\s*/,''),
        grossSale:wv.line_total_net+wv.line_total_tax,
        netSale:wv.line_total_net,
        commission:effectiveCommission,
        vendorShare:effectiveShare,
        commissionPct:effectivePct,
      });
    });
  });
  lines.sort((a,b)=>a.date.localeCompare(b.date));
  return lines;
}

  if(v.productVendorId==null){

        ${!v.kleinunternehmer?`
          <div>zzgl. USt ${vatRate}%</div>
          <div class="num" style="font-variant-numeric:tabular-nums">+${fmtEUR(vatAmount)}</div>
        `:`
          <div style="font-size:11px;font-style:italic;color:var(--ink-muted)">Gemäß §19 UStG keine Umsatzsteuer</div>
          <div></div>
        `}
        <div style="font-weight:700;color:var(--green);border-top:1px solid var(--ink);padding-top:4px">Auszahlungsbetrag</div>
        <div class="num" style="font-weight:700;color:var(--green);border-top:1px solid var(--ink);padding-top:4px;font-variant-numeric:tabular-nums">${fmtEUR(payoutGross)}</div>
      </div>
    </div>

      <summary style="cursor:pointer;font-size:12px;color:var(--ink-muted);margin-bottom:8px">Einzelne Bestellungen (${lines.length})</summary>
      <div style="font-size:12px;max-height:240px;overflow:auto">
        ${lines.map(l=>`<div style="padding:4px 0;border-bottom:1px solid var(--line);display:grid;grid-template-columns:70px 1fr auto;gap:8px">

}

async function saveCreditNoteFromGenerator(){
  const vendorId=document.getElementById('cn-vendor').value;
  const from=document.getElementById('cn-from').value;
  const to=document.getElementById('cn-to').value;
  if(!vendorId||!from||!to)return;
  const v=state.vendors.find(x=>x.id===vendorId);
  if(!v){toast('Anbieter nicht gefunden');return;}
  const lines=findVendorEarnings(vendorId,from,to);
  if(!lines.length){toast('Keine Positionen im Zeitraum');return;}

  const vatRate=v.kleinunternehmer?0:(state.settings.defaultVatRate||19);
  const totalNet=round2(lines.reduce((s,l)=>s+l.vendorShare,0));
  const totalVat=round2(totalNet*vatRate/100);
  const totalGross=round2(totalNet+totalVat);

  const cn={
    id:uid('cn'),
    number:nextCreditNoteNumber(),
    createdAt:new Date().toISOString(),
    vendorId:v.id,
    vendorSnapshot:{
      name:v.name, company:v.company, street:v.street, zip:v.zip, city:v.city, country:v.country,
      email:v.email, phone:v.phone,
      taxNumber:v.taxNumber, vatId:v.vatId,
      iban:v.iban, bic:v.bic, bankName:v.bankName,
      kleinunternehmer:!!v.kleinunternehmer,
      commissionPct:v.commissionPct,
    },
    periodFrom:from,
    periodTo:to,
    issueDate:todayISO(),
    status:'draft', // draft | sent | paid
    paymentDate:null,
    lines:lines,
    vatRate,
    totalNet,
    totalVat,
    totalGross,
    notes:'',
  };
  state.creditNotes.push(cn);
  await saveCreditNotes();
  toast(`Gutschrift ${cn.number} erstellt`);
  closeModal();
  state.view='creditNotes';
  render();
}

async function deleteCreditNote(id){
  const cn=state.creditNotes.find(c=>c.id===id);
  if(!cn)return;
  // Prüfen ob Ausgabe verknüpft ist
  const linkedExpense=state.transactions.find(t=>t.creditNoteId===cn.id);
  let deleteExpense=false;
  if(linkedExpense){
    const msg=`Gutschrift ${cn.number} ist mit einer Ausgabe (${fmtEUR(linkedExpense.gross)} am ${fmtDate(linkedExpense.date)}) verknüpft.\n\nGutschrift UND Ausgabe löschen? Wenn du "Abbrechen" wählst, wird nichts gelöscht.`;
    if(!confirm(msg))return;
    deleteExpense=true;
  } else {
    if(!confirm(`Gutschrift ${cn.number} wirklich löschen?`))return;
  }
  state.creditNotes=state.creditNotes.filter(c=>c.id!==id);
  if(deleteExpense && linkedExpense){
    state.transactions=state.transactions.filter(t=>t.id!==linkedExpense.id);
    await saveTransactions();
  }
  await saveCreditNotes();
  toast(deleteExpense?'Gutschrift und Ausgabe gelöscht':'Gutschrift gelöscht');
  closeModal();render();
}

async function markCreditNotePaid(id){
  const cn=state.creditNotes.find(c=>c.id===id);
  if(!cn)return;
  // Prüfen ob für diese Gutschrift schon eine Ausgabe existiert
  const existingExpense=state.transactions.find(t=>t.creditNoteId===cn.id);
  if(existingExpense){
    // Schon gebucht – nur Status setzen
    cn.status='paid';
    if(!cn.paymentDate)cn.paymentDate=todayISO();
    await saveCreditNotes();
    toast('Als bezahlt markiert (Ausgabe war schon gebucht)');
    closeModal();render();
    return;
  }
  // Dialog öffnen: Soll Ausgabe gebucht werden?
  openCreditNotePaidDialog(cn);
}

async function confirmPaidWithExpense(id){
  const cn=state.creditNotes.find(c=>c.id===id);
  if(!cn)return;
  const paymentDate=document.getElementById('cnp-date')?.value||todayISO();
  const category=document.getElementById('cnp-category')?.value||'Anbieter-Auszahlungen (Marketplace)';
  const v=state.vendors.find(x=>x.id===cn.vendorId);
  const vName=v?.name||cn.vendorSnapshot?.name||'Anbieter';

  // Ausgabe-Transaktion anlegen
  const expense={
    id:uid('tx'),
    type:'expense',
    date:paymentDate,
    description:`${cn.number} · ${vName}`,
    contact:vName,
    invoiceNumber:cn.number,
    category,
    gross:cn.totalGross,
    net:cn.totalNet,
    vat:cn.totalVat,
    vatRate:cn.vatRate,
    notes:`Marketplace-Auszahlung für Zeitraum ${fmtDate(cn.periodFrom)} – ${fmtDate(cn.periodTo)}. Automatisch aus Gutschrift gebucht.`,
    receiptIds:[],
    creditNoteId:cn.id,
    createdAt:new Date().toISOString(),
  };
  state.transactions.push(expense);

  // Gutschrift als bezahlt markieren und Verknüpfung speichern
  cn.status='paid';
  cn.paymentDate=paymentDate;
  cn.expenseTxId=expense.id;

  await saveTransactions();
  await saveCreditNotes();
  toast(`Gutschrift bezahlt & Ausgabe ${fmtEUR(cn.totalGross)} gebucht`);
  closeModal();render();
}

async function confirmPaidWithoutExpense(id){
  const cn=state.creditNotes.find(c=>c.id===id);
  if(!cn)return;
  const paymentDate=document.getElementById('cnp-date')?.value||todayISO();
  cn.status='paid';
  cn.paymentDate=paymentDate;
  await saveCreditNotes();
  toast('Als bezahlt markiert');
  closeModal();render();
}

async function markCreditNoteSent(id){

}

function renderCreditNotesView(){
  const yearCN=state.creditNotes.filter(c=>(c.issueDate||'').startsWith(String(state.year)));
  const sorted=[...yearCN].sort((a,b)=>(b.issueDate||'').localeCompare(a.issueDate||''));
  const open=sorted.filter(c=>c.status!=='paid');
  const paid=sorted.filter(c=>c.status==='paid');
  const totalOpen=round2(open.reduce((s,c)=>s+(c.totalGross||0),0));
  const totalPaid=round2(paid.reduce((s,c)=>s+(c.totalGross||0),0));
  return `
    <div class="row" style="margin-bottom:16px">
      <h1 style="font-size:28px;font-style:italic;font-weight:500"><b>Gutschriften</b> ${state.year}</h1>
      <button class="btn btn-primary" data-action="new-credit-note">${ICON.plus} Gutschrift</button>
    </div>
    ${sorted.length?`
      <div class="kpi-grid">
        <div class="kpi"><div class="k-label">Offen</div><div class="k-value" style="color:var(--gold)">${fmtEUR(totalOpen)}</div><div class="k-sub">${open.length} Gutschriften</div></div>
        <div class="kpi"><div class="k-label">Bezahlt</div><div class="k-value" style="color:var(--green)">${fmtEUR(totalPaid)}</div><div class="k-sub">${paid.length} Gutschriften</div></div>
        <div class="kpi"><div class="k-label">Gesamt</div><div class="k-value">${fmtEUR(round2(totalOpen+totalPaid))}</div><div class="k-sub">${sorted.length} insgesamt</div></div>
      </div>
    `:''}
    <div class="card">
      ${sorted.length?`<div class="list">${sorted.map(renderCreditNoteRow).join('')}</div>`:`
        <div class="empty">
          <div class="big">Noch keine Gutschriften.</div>
          <div class="small">Erzeuge hier Gutschriften für deine Anbieter – automatisch aus den Bestellungen, die du aus WooCommerce importiert hast.</div>
          <button class="btn btn-primary" data-action="new-credit-note" style="margin-top:14px">${ICON.plus} Erste Gutschrift erstellen</button>
        </div>
      `}
    </div>
  `;
}

  const subject=`Gutschrift ${cn.number} von ${state.settings.businessName||'Hankemacht'}`;
  const body=`Hallo ${v.name||''},

Bitte das PDF der Gutschrift als Anhang mitsenden – lade es dafür kurz herunter (Button "PDF anzeigen / drucken" in Hankebuch) und häng es hier an diese Mail an.

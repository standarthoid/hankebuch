function showTestInvoice(){
  const fake={id:'test',number:nextInvoiceNumber(),invoiceDate:todayISO(),serviceDate:todayISO(),dueDate:addDays(todayISO(),14),
    customer:{name:'Beispielkunde GmbH',street:'Musterstraße 7',zip:'80331',city:'München',country:'Deutschland'},
    items:[{description:'Beratungsleistung',qty:8,unit:'Std.',unitPrice:120,vatRate:19},{description:'Konzepterstellung',qty:1,unit:'Pauschal',unitPrice:450,vatRate:19}],
    introText:'wie besprochen erlaube ich mir, folgende Leistungen zu berechnen:',
    paymentTerms:`Bitte überweisen Sie den Rechnungsbetrag innerhalb von ${state.settings.paymentTermsDays} Tagen ohne Abzug.`,
    footerNote:state.settings.invoiceFooterText,includeKleinunternehmerNotice:state.settings.kleinunternehmer};
  const html=renderInvoicePdfHTML(fake);
  const root=document.getElementById('viewer-root');
  root.innerHTML=`<div class="viewer-overlay" data-close-viewer><div class="viewer-head"><div class="vname">Test-Vorschau</div><button class="viewer-close" data-close-viewer>${ICON.close}</button></div><div class="viewer-content" style="overflow:auto;max-height:90vh" onclick="event.stopPropagation()">${html}</div></div>`;
  root.querySelectorAll('[data-close-viewer]').forEach(el=>el.addEventListener('click',e=>{if(e.currentTarget===e.target||e.currentTarget.classList.contains('viewer-close'))closeViewer();}));
}
function closeViewer(){document.getElementById('viewer-root').innerHTML='';}

function openTxModal(type,editId=null){
  let existing=null;if(editId)existing=state.transactions.find(t=>t.id===editId);
  state.pendingReceipts=[];state._removedReceipts=[];
  const useType=existing?.type||type;
  document.getElementById('modal-root').innerHTML=renderTxModal(useType,existing);
  bindModal();
  document.querySelectorAll('[data-settype]').forEach(btn=>btn.addEventListener('click',()=>{
    const newType=btn.dataset.settype;const curr=collectTxForm();curr.type=newType;
    if(existing&&existing.id)curr.id=existing.id;curr.receiptIds=existing?.receiptIds||[];
    document.getElementById('modal-root').innerHTML=renderTxModal(newType,curr.gross||existing?curr:null);
    bindModal();attachTxModalExtras(existing?.id||null);
  }));
  attachTxModalExtras(editId);hydrateReceiptThumbs();
}

function renderTxModal(type,existing=null){
  const isEdit=!!existing;
  const t=existing||{type,date:defaultDateForEntry(),description:'',contact:'',invoiceNumber:'',category:type==='income'?INCOME_CATEGORIES[0]:EXPENSE_CATEGORIES[5],gross:'',net:'',vatRate:state.settings.kleinunternehmer?0:state.settings.defaultVatRate,vat:0,notes:'',receiptIds:[]};
  const categories=t.type==='income'?INCOME_CATEGORIES:EXPENSE_CATEGORIES;
  const attached=(t.receiptIds||[]).map(id=>({id,loading:true}));
  const pending=state.pendingReceipts;
  return `<div class="modal-overlay" data-close-modal><div class="modal" onclick="event.stopPropagation()">
    <div class="modal-head"><h2>${isEdit?'Buchung bearbeiten':'Neue Buchung'}</h2><button class="modal-close" data-close-modal>${ICON.close}</button></div>
    <div class="type-switch">
      <button class="${t.type==='income'?'active income':''}" data-settype="income">Einnahme</button>
      <button class="${t.type==='expense'?'active expense':''}" data-settype="expense">Ausgabe</button>
    </div>
    <div class="stack">
      <div class="field"><label>Beschreibung</label><input type="text" id="f-desc" value="${escapeAttr(t.description)}" placeholder="z. B. Webdesign Projekt" autofocus></div>
      <div class="field-row">
        <div class="field"><label>Datum</label><input type="date" id="f-date" value="${t.date}"></div>
        <div class="field"><label>Kategorie</label><select id="f-category">${categories.map(c=>`<option value="${escapeAttr(c)}" ${c===t.category?'selected':''}>${c}</option>`).join('')}</select></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Betrag (brutto)</label><input type="text" inputmode="decimal" class="num-input" id="f-gross" value="${t.gross?String(t.gross).replace('.',','):''}" placeholder="0,00"><div class="hint">Endbetrag inkl. USt</div></div>
        <div class="field"><label>USt-Satz</label><select id="f-vat" ${state.settings.kleinunternehmer?'disabled':''}>${VAT_RATES.map(r=>`<option value="${r}" ${r===t.vatRate?'selected':''}>${r} %</option>`).join('')}</select>${state.settings.kleinunternehmer?'<div class="hint">Kleinunternehmer</div>':''}</div>
      </div>
      <div class="field-row">
        <div class="field"><label>Geschäftspartner</label><input type="text" id="f-contact" value="${escapeAttr(t.contact)}"></div>
        <div class="field"><label>Beleg-/Rechnungsnummer</label><input type="text" id="f-invoice" value="${escapeAttr(t.invoiceNumber)}"></div>
      </div>
      <div class="field"><label>Notizen</label><textarea id="f-notes">${escapeHtml(t.notes||'')}</textarea></div>
      <div class="field"><label>Belege</label>
        <div class="receipt-zone" id="drop-zone">
          <div class="rz-big">Belege hier ablegen oder antippen</div>
          <div class="rz-small">Fotos, Scans oder PDF · automatisch komprimiert</div>
          <input type="file" id="receipt-file" accept="image/*,application/pdf" multiple style="display:none">
        </div>
        <div class="receipt-grid" id="receipt-grid">${[...attached,...pending].map((r,i)=>renderReceiptThumb(r,i,pending.includes(r))).join('')}</div>
      </div>
      <div id="tx-preview" style="background:var(--bg-sunk);border-radius:10px;padding:12px 14px;font-size:13px;display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap"></div>
      <div style="display:flex;gap:8px;margin-top:4px">
        ${isEdit?`<button class="btn" data-action="delete-tx" data-id="${t.id}" style="color:var(--terra);border-color:var(--terra)">${ICON.trash}</button>`:''}
        <button class="btn btn-primary btn-block" data-action="save-tx" ${isEdit?`data-id="${t.id}"`:''}>${isEdit?'Speichern':'Buchen'}</button>
      </div>
    </div>
  </div></div>`;
}
function renderReceiptThumb(r,idx,isPending){
  if(r.loading)return `<div class="receipt-thumb" data-receipt-id="${r.id}"><div class="pdf-ico" style="color:var(--ink-muted)"><span class="label">…</span></div></div>`;
  const isPdf=(r.mime||'').includes('pdf');
  const del=isPending?`<button class="rthumb-del" data-remove-pending="${idx}">${ICON.close}</button>`:`<button class="rthumb-del" data-remove-receipt="${r.id}">${ICON.close}</button>`;
  const content=isPdf?`<div class="pdf-ico">${ICON.paper}<span class="label">PDF</span></div>`:`<img src="${r.data}" alt="${escapeAttr(r.filename)}">`;
  return `<div class="receipt-thumb" data-view-receipt="${r.id||''}" data-view-pending="${isPending?idx:''}">${content}${del}<div class="rthumb-name">${escapeHtml(r.filename)}</div></div>`;
}
async function hydrateReceiptThumbs(){const grid=document.getElementById('receipt-grid');if(!grid)return;
  const loading=grid.querySelectorAll('[data-receipt-id]');
  for(const el of loading){const id=el.dataset.receiptId;if(!id)continue;const r=await loadReceipt(id);if(!r){el.remove();continue;}el.outerHTML=renderReceiptThumb(r,0,false);}
  bindReceiptGridEvents();
}
function bindReceiptGridEvents(){
  document.querySelectorAll('[data-remove-pending]').forEach(btn=>btn.addEventListener('click',e=>{e.stopPropagation();const idx=parseInt(btn.dataset.removePending);state.pendingReceipts.splice(idx,1);refreshReceiptGrid();}));
  document.querySelectorAll('[data-remove-receipt]').forEach(btn=>btn.addEventListener('click',async e=>{e.stopPropagation();const id=btn.dataset.removeReceipt;state._removedReceipts=state._removedReceipts||[];state._removedReceipts.push(id);btn.closest('.receipt-thumb').remove();toast('Beleg wird beim Speichern entfernt');}));
  document.querySelectorAll('[data-view-receipt]').forEach(el=>el.addEventListener('click',e=>{if(e.target.closest('[data-remove-receipt],[data-remove-pending]'))return;const id=el.dataset.viewReceipt;const pIdx=el.dataset.viewPending;if(id)openReceiptViewer(id);else if(pIdx!=='')openPendingViewer(parseInt(pIdx));}));
}
function refreshReceiptGrid(){const grid=document.getElementById('receipt-grid');if(!grid)return;
  const attachedIds=Array.from(document.querySelectorAll('[data-view-receipt]')).map(el=>el.dataset.viewReceipt).filter(Boolean);
  const pending=state.pendingReceipts;
  grid.innerHTML=[...attachedIds.map(id=>({id,loading:true})),...pending.map(r=>r)].map((r,i)=>{const isPending=pending.includes(r);return renderReceiptThumb(r,i-attachedIds.length,isPending);}).join('');
  hydrateReceiptThumbs();
}
async function openReceiptViewer(id){const r=await loadReceipt(id);if(!r){toast('Beleg nicht gefunden');return;}showReceiptViewer(r);}
function openPendingViewer(idx){const r=state.pendingReceipts[idx];if(!r)return;showReceiptViewer(r);}
function showReceiptViewer(r){
  const root=document.getElementById('viewer-root');const isPdf=(r.mime||'').includes('pdf');
  root.innerHTML=`<div class="viewer-overlay" data-close-viewer><div class="viewer-head"><div class="vname">${escapeHtml(r.filename)} · ${fmtSize(r.size)}</div><button class="viewer-close" data-close-viewer>${ICON.close}</button></div><div class="viewer-content">${isPdf?`<iframe src="${r.data}"></iframe>`:`<img src="${r.data}" alt="${escapeAttr(r.filename)}">`}</div></div>`;
  root.querySelectorAll('[data-close-viewer]').forEach(el=>el.addEventListener('click',closeViewer));
}

function attachTxModalExtras(editId){
  const gross=document.getElementById('f-gross');const vat=document.getElementById('f-vat');
  if(gross)gross.addEventListener('input',updateTxPreview);if(vat)vat.addEventListener('change',updateTxPreview);updateTxPreview();
  const delBtn=document.querySelector('[data-action="delete-tx"]');if(delBtn)delBtn.addEventListener('click',()=>deleteTx(editId));
  const saveBtn=document.querySelector('[data-action="save-tx"]');if(saveBtn)saveBtn.addEventListener('click',()=>saveTxFromModal(editId));
  const zone=document.getElementById('drop-zone');const fi=document.getElementById('receipt-file');
  if(zone&&fi){zone.addEventListener('click',()=>fi.click());fi.addEventListener('change',e=>handleReceiptFiles(Array.from(e.target.files)));zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('drag');});zone.addEventListener('dragleave',()=>zone.classList.remove('drag'));zone.addEventListener('drop',e=>{e.preventDefault();zone.classList.remove('drag');const files=Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('image/')||f.type==='application/pdf');handleReceiptFiles(files);});}
  bindReceiptGridEvents();
}
async function handleReceiptFiles(files){
  for(const file of files){if(file.size>8*1024*1024){toast(`${file.name} zu groß`);continue;}
    let blob=file;if(file.type.startsWith('image/')&&file.type!=='image/heic'){try{blob=await compressImage(file);}catch(e){}}
    const base64=await blobToBase64(blob);
    state.pendingReceipts.push({id:'pending_'+state.pendingReceipts.length,filename:file.name,mime:blob.type||file.type,size:blob.size||file.size,data:base64,_blob:blob,_originalFile:file});
  }
  refreshReceiptGrid();toast(files.length+' Beleg(e) hinzugefügt');
}
async function handleBulkUpload(files){
  toast(`Verarbeite ${files.length} Belege …`);closeModal();let count=0;
  for(const file of files){try{if(file.size>8*1024*1024)continue;
    const txId=uid();const record=await saveReceipt(txId,file);
    state.transactions.push({id:txId,type:'expense',date:todayISO(),description:`(Entwurf) ${file.name.replace(/\.[^.]+$/,'')}`,contact:'',invoiceNumber:'',category:EXPENSE_CATEGORIES[5],gross:0,net:0,vat:0,vatRate:state.settings.kleinunternehmer?0:state.settings.defaultVatRate,notes:'Aus Stapel-Upload',receiptIds:[record.id],createdAt:new Date().toISOString(),isDraft:true});
    count++;}catch(e){console.error(e);}}
  await saveTransactions();toast(`${count} Entwürfe erstellt`);state.view='expense';render();
}

function bindModal(){
  document.querySelectorAll('[data-close-modal]').forEach(el=>el.addEventListener('click',e=>{if(e.currentTarget===e.target||e.currentTarget.classList.contains('modal-close'))closeModal();}));
  document.querySelectorAll('#modal-root [data-action]').forEach(el=>el.addEventListener('click',handleAction));
}
function closeModal(){document.getElementById('modal-root').innerHTML='';state.pendingReceipts=[];state._removedReceipts=[];state.invoiceDraft=null;}

function updateTxPreview(){const el=document.getElementById('tx-preview');if(!el)return;
  const gross=parseAmount(document.getElementById('f-gross').value);const rate=parseInt(document.getElementById('f-vat').value||'0',10);
  if(!gross){el.innerHTML='<span style="color:var(--ink-muted)">Gib einen Betrag ein …</span>';return;}
  const{net,vat}=calcVat(gross,rate);
  el.innerHTML=`<div><span style="color:var(--ink-muted)">Netto</span> <span class="num" style="margin-left:6px">${fmtEUR(net)}</span></div><div><span style="color:var(--ink-muted)">USt ${rate}%</span> <span class="num" style="margin-left:6px">${fmtEUR(vat)}</span></div><div><span style="color:var(--ink-muted)">Brutto</span> <span class="num" style="margin-left:6px;font-weight:600">${fmtEUR(gross)}</span></div>`;
}

function collectTxForm(){
  const get=id=>document.getElementById(id)?.value||'';
  const type=document.querySelector('[data-settype].active')?.dataset.settype||'expense';
  const gross=parseAmount(get('f-gross'));const rate=parseInt(get('f-vat')||'0',10);const calc=calcVat(gross,rate);
  return{type,date:get('f-date')||todayISO(),description:get('f-desc').trim(),category:get('f-category'),gross:calc.gross,net:calc.net,vat:calc.vat,vatRate:rate,contact:get('f-contact').trim(),invoiceNumber:get('f-invoice').trim(),notes:get('f-notes').trim()};
}
async function saveTxFromModal(editId){
  const data=collectTxForm();
  if(!data.gross||data.gross<=0){toast('Bitte Betrag eingeben');return;}
  if(!data.description){toast('Bitte Beschreibung eingeben');return;}
  let targetId=editId;
  if(editId){const idx=state.transactions.findIndex(t=>t.id===editId);
    if(idx>=0){state.transactions[idx]={...state.transactions[idx],...data,updatedAt:new Date().toISOString()};
      if((state._removedReceipts||[]).length){state.transactions[idx].receiptIds=(state.transactions[idx].receiptIds||[]).filter(id=>!state._removedReceipts.includes(id));for(const rid of state._removedReceipts)await deleteReceiptStore(rid);}
      delete state.transactions[idx].isDraft;}
    toast('Aktualisiert');
  } else {targetId=uid();state.transactions.push({id:targetId,receiptIds:[],...data,createdAt:new Date().toISOString()});toast(data.type==='income'?'Einnahme gebucht':'Ausgabe gebucht');}
  if(state.pendingReceipts.length){const txIdx=state.transactions.findIndex(t=>t.id===targetId);const list=state.transactions[txIdx].receiptIds||[];
    for(const pr of state.pendingReceipts){const file=pr._originalFile||new File([pr._blob||await(await fetch(pr.data)).blob()],pr.filename,{type:pr.mime});const record=await saveReceipt(targetId,file);list.push(record.id);}
    state.transactions[txIdx].receiptIds=list;}
  await saveTransactions();closeModal();render();
}
async function deleteTx(id){if(!id)return;if(!confirm('Buchung wirklich löschen?'))return;
  const tx=state.transactions.find(t=>t.id===id);if(tx?.receiptIds)for(const rid of tx.receiptIds)await deleteReceiptStore(rid);
  state.transactions=state.transactions.filter(t=>t.id!==id);await saveTransactions();toast('Gelöscht');closeModal();render();
}

async function saveSettingsFromModal(){
  const get=id=>document.getElementById(id);
  const tab=state.settingsTab;
  if(tab==='company'){
    state.settings.businessName=get('s-name').value.trim();
    state.settings.ownerName=get('s-owner').value.trim();
    state.settings.street=get('s-street').value.trim();
    state.settings.zip=get('s-zip').value.trim();
    state.settings.city=get('s-city').value.trim();
    state.settings.country=get('s-country').value.trim();
    state.settings.email=get('s-email').value.trim();
    state.settings.phone=get('s-phone').value.trim();
    state.settings.website=get('s-website').value.trim();
    state.settings.bankName=get('s-bank').value.trim();
    state.settings.iban=get('s-iban').value.trim();
    state.settings.bic=get('s-bic').value.trim();
  } else if(tab==='tax'){
    state.settings.kleinunternehmer=get('s-kleinunt').checked;
    state.settings.taxNumber=get('s-stnr').value.trim();
    state.settings.vatId=get('s-ustid').value.trim();
    state.settings.hasTaxAdvisor=get('s-advisor').checked;
    state.settings.biweeklyReminder=get('s-reminder').checked;
    if(get('s-cycle'))state.settings.vatCycle=get('s-cycle').value;
    if(get('s-vat'))state.settings.defaultVatRate=parseInt(get('s-vat').value,10);
  } else if(tab==='invoice'){
    state.settings.invoicePrefix=get('s-iprefix').value.trim();
    state.settings.invoiceCounter=parseInt(get('s-icounter').value||'1',10);
    state.settings.paymentTermsDays=parseInt(get('s-payterm').value||'14',10);
    state.settings.invoiceFooterText=get('s-footer').value;
    state.settings.invoiceTheme=get('s-theme').value;
    state.settings.invoiceAccent=get('s-accent').value;
  } else if(tab==='sync'){
    if(get('s-dbxauto')) state.settings.dbxAutoSync=get('s-dbxauto').checked;
    if(get('s-dbxkey')) state.settings.dbxAppKey=get('s-dbxkey').value.trim();
    if(get('s-dbxpath')) state.settings.dbxPath=get('s-dbxpath').value.trim()||'/hankebuch-daten.json';
  }
  await saveSettings();toast('Einstellungen gespeichert');closeModal();render();
}

async function clearAllData(){if(!confirm('Wirklich alle Daten löschen?'))return;if(!confirm('Ganz sicher? Vorher Backup!'))return;
  try{for(const tx of state.transactions)for(const rid of(tx.receiptIds||[]))await deleteReceiptStore(rid);
    await appStorage.delete('transactions');await appStorage.delete('invoices');await appStorage.delete('settings');}catch(e){}
  state.transactions=[];state.invoices=[];state.settings={...DEFAULT_SETTINGS};toast('Alles gelöscht');closeModal();render();
}

let toastTimer;
function toast(msg){const root=document.getElementById('toast-root');root.innerHTML=`<div class="toast show">${escapeHtml(msg)}</div>`;clearTimeout(toastTimer);toastTimer=setTimeout(()=>{root.innerHTML='';},2400);}

(async()=>{await loadAll();render();setInterval(updateSyncIndicator,30000);})();
</script>
</body>
